body:
  text: 罽賓沙門佛陀多羅譯震旦沙門弘麗羅峯著神州沙門弘贊在犙較二該果淨觀方便開二一序述菩薩興問開二一序問躡次於是此序顯圓覺菩薩從因行斷證淨覺方便菩薩世尊興問承答廣説已盡末世衆生直可依教修行成就圓覺唯道場安居修觀首初方便未聞聖旨恐末世衆生因之迷悶不獲饒益於此法會所彰了義法門有所興問希佛教益令末世衆生知前修方便得能成修究竟該果徹因於自性覺海二序問周三開二一序述儀音開二一序問威儀圓覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言句釋例前二述請教益開二一慶聞現益大悲世尊為我等輩廣説淨覺種種方便令末世衆生有大增益當文三句慶聞現益大悲世尊一句為我云云一句令末云云一句種種方便者該前答問十菩薩所示教理此句讚教大增益者成就大乘修習方便此句彰益二申請後益開二一請初方便世尊我等今者已得開悟若佛滅後末世衆生未得悟者云何安居修此圓覺清淨境界此圓覺中三種淨觀以何為首當文五句請初方便世尊一句我等云云一句若佛云云一句云何云云一句此圓云云一句我等句彰在久習若佛句悲念初修云何句問安居方便此圓句問修觀方便此二方便之所須問者以修圓覺在離我人諸相及不著緣覺聲聞境界故須佛示安居之不繫徒衆與請十方如來諸大菩薩之為伴侶以圓覺三觀本圓攝法無有終始恐末世衆生迷所從入故須佛示三觀前修方便以為軌則二資答結益惟願大悲為諸大衆及末世衆生施大饒益當文一句資答結益合文上科共成申請後益科竟前合慶聞現益科攝屬述請教益科竟連合序問威儀科管於序述儀音科竟二序結終始作是語已五體投地如是三請終而復始句釋例前前含序述儀音科攝屬序問周三科竟連合序問躡次科入總序述菩薩興問科竟二序述世尊垂答開二一長行列示開二初序讚許開二一讚請教益爾時世尊告圓覺菩薩言善哉善哉善男子汝等乃能問於如來如是方便以大饒益施諸衆生當文四句讚請教益通例二句汝等云云一句以大云云一句二許答囑受開二一囑令諦聽汝今諦聽當為汝説句釋例前二受教默然時圓覺菩薩奉教歡喜及諸大衆默然而聽句釋例前合文上科共成許答囑受科竟前合讚請教益科攝屬初序讚許科竟次述正答開二一示教方便開二一安居方便開二一修自性覺開二一例見常修善男子一切衆生若佛住世若佛滅後若法末時有諸衆生具大乘性信佛祕密大圓覺心欲修行者若在伽藍安處徒衆有緣事故隨分思察如我已説當文七句例見常修善男子一句一切衆生一句若佛云云一句有諸云云一句若在云云一句有緣云云一句如我云云一句若佛住世者化緣未畢若佛滅後者雙林唱寂若法末時者二千歲後此句一時齊修有諸句簡性樂修若在句靜無繫屬伽藍梵語此翻衆園有緣句動不脫離如我句例指前示二詳示限修開二一標法開二一立期安居開二一修期念佛開二一修期日數若復無有他事因緣即建道場當立期限若立長期百二十日中期百日下期八十安置淨居當文三句修期日數若復云云一句若立云云一句安置淨居一句他事因緣者菩薩利他之事即建道場者無緣利他即行自利建於道場為轉穢土成淨土之因當立期限者剋時精進破除億劫顛倒之想此句圓覺世界因果長期百二十日云云者乃初中後三番修證之期初期多中期二十日中期多後期二十日以初期有前三七日懺悔求示定輪頓漸修習後乃正入道場懺悔求哀得遇善境中期唯正懺悔之三七日不更有求定輪之懺悔故少二十日後期則前經兩番懺悔已除事理遮障唯直攝念不更有懺悔之三七日故又少二十日大都三期正修俱八十日當三八二十四之漸輪數十日一輪者一輪具十方法界一日一方法界故一輪具修十日此句圓覺定輪期數安置者安住不離淨居者即所建之道場此句示不離道場宴坐攝念二念佛正觀若佛現在當正思惟若佛滅後施設形像心存目想生正憶念還同如來當住之日懸諸幡華當文三句念佛正觀若佛云云一句若佛云云一句還同云云一句當正思惟者不以三十二相見如來而於聲於色求之也此句誡於佛在無起常想施設形像者彰佛儀容心存者心王回向目想者心所回向以目即心故不言見而言想當正思惟者不以寂滅相見如來而沉空滯寂求之也此句誡於佛滅無生斷想還同如來常住之日者達像性等虗空同於生佛懸諸幡華者幡以却塵華以發覺表遮照二用成就莊嚴此句冥除斷見如法供養合文上科共成修期念佛科竟二懺悔攝念開二一懺悔清淨經三七日稽首十方諸佛名字求哀懺悔遇善境界得心輕安當文二句懺悔清淨經三云云一句遇善云云一句經三七日釋準前稽首者以頭至地遲留徐起十方者圓覺法界諸佛名字者稱名如覩攝念淨覺求哀懺悔釋準前此句除染遇善境界者解脫徵應得心輕安者煩惱心伏此句獲淨二攝念無生過三七日一向攝念當文三句攝念無生過三七日者在正修之八十日一向攝念者攝念攀緣遠離幻妄成淨覺心之前方便此句示圓成性覺之清淨心建三觀之無礙行乃道場之正修習合文上科共成懺悔攝念科竟前合修期念佛科攝屬立期安居科竟二經夏安居開二一示遠二乘若經夏首三月安居當為清淨菩薩止住心離聲聞不假徒衆當文二句示遠二乘若經云云一句當為云云一句若經者設遇也夏首者僧例安居在於初夏之月三月者九旬禁足之期此句標指二乘安居時月以菩薩行雖不同事必共制故齊夏月當為云云者示知別行心離聲聞者離聲聞所期之證心入理無礙之法界不假徒衆者假借也聲聞安居假他作法故須徒衆菩薩不爾為修無上妙覺入事無礙法界故於佛前作法以大圓覺為伽藍是乃所為菩薩之清淨者此句示無濫同二乘所作失菩薩事理無礙之止住二顯修妙覺開二一彰辭顯法至安居日即於佛前作如是言我比丘比丘尼優婆塞優婆夷某甲踞菩薩乘修寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智涅槃自性無繫屬故當文八句彰辭顯法至安居日一句即於云云一句踞菩薩乘一句修寂滅行一句同入云云一句以大云云一句身心云云一句涅槃云云一句至安居日者四月十六日此句標時同禁即於佛前者直資果證別異二乘從僧依止作如是言者在下之言比丘者梵語此含三義一破惡受戒三羯磨成發善律儀破惡律儀二怖魔以能破惡魔羅驚怖出己界域化己眷屬空己宮殿三乞士乞財資身成自清德為世福田乞法修心成自慧行為世導師比丘尼者尼女也受具戒之女優婆塞優婆夷者梵語此翻近事男近事女謂受三歸五戒之男女堪近比丘比丘尼為承事故某甲者各自稱名行異二乘故兼俗衆此句因果圓即踞菩薩乘者入覺因行別異二乘迷覺果證修寂滅行者圓覺普照別異二乘不覺無明此二句修習覺心同入者無於立所熾然之異清淨實相者根塵遍滿無壞雜性住持者圓照淨光總持不動以大云云者實相住持之所從建此二句乃轉五八識為成所作智大圓鏡智以該果海身心安居者行想陰盡生基清擾性入元澄如波瀾滅化為澄水平等性智者七轉識名涅槃自性者無分別智無繫屬故者以無分別故絶攀緣此二句乃轉六七識為平等性智妙觀察智以徹因原通合四句乃成就覺心二彰辭請友今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故不繫徒衆當文三句彰辭請友不依聲聞者不共二乘同因此句簡小當與者決定與也十方如來及大菩薩云云者平等法會同居主伴因果自他一道感應此句顯大修菩薩云云者圓滿果德大因緣故者修證妙覺乃究竟淨覺因緣令盡虗空法界衆生同入大寂滅海是莫大之因緣不繫徒衆者徒衆稱謂乃聲聞法衆圓覺法會一切衆生皆本成佛平等住持雖因果雙彰還因果圓即冥情聖凡誰為徒衆在今不繫者即不依聲聞也故以無上妙覺大因緣故發明之此句釋明所以不依聲聞之故合文上科共成經夏安居科竟前合立期安居科攝屬標法科竟二結名善男子此名菩薩示現安居過三期日隨往無礙當文三句結名善男子一句此名云云一句過三云云一句此者指上所標之法示現安居者菩薩因行無非度生故云示現此句彰菩薩祕果行因過三期日者初中後期修習已畢隨往無礙者遍滿隨順此句彰修習成就無礙前合釋相科共成詳示限修科竟連合例見常修科攝屬修自性覺科竟二離名言境善男子若彼末世修行衆生求菩薩道入三期者非彼所聞一切境界終不可取當文三句離名言境善男子一句若彼云云一句非彼云云一句若彼句標指大乘修人非彼所聞者圓覺境界言語道斷有何所聞一切境界者戲論諸法終不可取者免生妄惑乃令曉於異因以絶非果此句示斷無明煩惱前合修自性覺科共成安居方便科竟以答云何安居修覺之問二修觀方便開二一示修開三一修奢摩他開二一修自性覺開二初順覺行善男子若諸衆生修奢摩他先取至靜不起思念靜極便覺如是初靜從於一身至一世界覺亦如是當文六句初順覺行善男子一句若諸云云一句先取云云一句靜極便覺一句如是云云一句覺亦如是一句若諸句標所修先取至靜者依不生滅心不起思念者依湛旋於虗妄分別此句依覺生定靜極者永離分別念寂無生便覺者得圓明覺此句定成覺顯如是初靜者成定之初從於一身者無自身相至一世界者無世界相此句示相定成覺亦如是者覺顯一身以至顯一世界蓋所謂靜者乃照寂義所謂覺者即寂照義故有云靜極光通達寂照含虗空此句合覺隨定顯次顯覺相善男子若覺遍滿一世界者一世界中有一衆生起一念者皆悉能知百千世界亦復如是當文三句次顯覺相善男子一句若覺云云一句百千云云一句若覺句示覺遍滿相世界中衆生起念之能知者即如鏡中像之顯現於諸世界如來心一義百千句示定成就量亦復如是者如能知於一世界之一衆生起念也合文上科共成修自性覺科竟二離名言境非彼所聞一切境界終不可取當文一句離名言境釋準前前合修自性覺科共成修奢摩他科竟二修三摩鉢提科開二一修自性覺開二一依覺觀幻善男子若諸衆生修三摩鉢提先當憶想十方如來十方世界一切菩薩依種種門漸次修行勤苦三昧當文四句依覺觀幻善男子一句若諸云云一句先當云云一句依種云云一句若諸句標所修先當憶想者起觀幻之心十方如來者遍滿覺心十方世界者遍滿覺相一切菩薩者遍滿覺行此句示從覺之體相用三法非即非離以觀幻本依種種門者起諸幻法漸次修行者成就幻化勤苦者度生功用三昧者堪忍不動此句示從體相用出生諸幻以觀幻用二發願起幻廣發大願自熏成種當文一句發願起幻廣發大願者菩薩度生之清淨大願自熏成種者由悲生智現幻利生合文上科共成修自性覺科竟二離名言境非彼所聞一切境界終不可取句釋例前前合修自性覺科共成修三摩鉢提科竟三修禪那開二一修自性覺開二一身心識觀善男子若諸衆生修於禪那先取數門心中了知生住滅念分劑頭數如是周遍四威儀中分別念數無不了知當文四句身心識觀善男子一句若諸云云一句先取云云一句如是云云一句若諸句標所修先取數門者取數息門了唯識境心王心所生起之數心中了知者淨覺照心元明了知生住滅念者八識見分之三細無明業相屬生轉現相屬住六粗無明智相屬異智言異者異業轉現之明了故相續相屬滅相續言滅者以有滅斯相續故文中略異字者攝滅字中以先異後滅故此生住異滅乃無明妄心故云念分劑者生住滅念之邊際頭數者生住滅念之顯出然必分劑不混而後頭數彰顯是則為於明了此句是知心識數如是周遍云云者如是生住滅念之了知周遍了知於身之四威儀所有分別念數分別念數者從身相出生之執取計名字造業業苦俱妄心識乃八識相分所有無明心數無不了知者分劑頭數之了了明知也此句知身識數二世界識觀漸次增進乃至得知百千世界一滴之雨猶如目覩所受用物當文二句世界識觀漸次增進一句乃至云云一句漸次增進者從知身心漸知世界從知一世界漸知多世界此句示知心識數量乃至得知云云者三界唯心萬法唯識世界因何建立諸法何家生滅雖積百千世界滴雨頭數無不是無明心念頭數故得了知猶如云云者以近況遠發明於所得知非妄想測度之知乃圓明現量之知此句示知心識數相合文上科共成修自性覺科竟二離名言境非彼所聞一切境界終不可取句釋例前前合修自性覺科共成修禪那科竟連合修三摩鉢提奢摩他科攝屬示修科竟二結名是名三觀初首方便當文一句結名三言觀者定成照寂慧成觀幻中成覺識皆順圓覺普照淨性成行初首者修觀之初方便者從於取靜憶想取數成修三觀覺行前合示修科共成修觀方便科竟以答三觀以何為首之問連合安居方便科入總示教方便科竟二示益修習開二一圓修頓證若諸衆生遍修三種勤行精進即名如來出現於世當文二句圓修頓證若諸云云一句即名云云一句遍修者圓修也勤行者心心圓照精進者念念圓寂此句示圓修習即名如來云云者三觀圓修得同如來之寂滅隨順清淨覺行故即是於如來出現世間非以三十二相為如來也此句示成頓證二隨修漸證開二先斷妄業若後末世鈍根衆生心欲求道不得成就由昔業障當勤懺悔常起希望先斷憎愛嫉妬諂曲求勝上心當文四句先斷妄業若後云云一句心欲云云一句當勤云云一句先斷云云一句初句標根二句示障三句示懺常起希望者希望障斷道成也有此希望益勤懺悔故令常起四句斷業求勝上心者增上慢心合憎愛等乃六根本無明次隨修習三種淨觀隨學一事此觀不得復習彼觀心不放捨漸次求證當文三句次隨修習三種云云一句此觀云云一句心不云云一句初句單修二句復修不得者不得入覺成就也三句輪修漸次求證者漸次修觀求證淨覺也合文上科共成示益修習科竟前合示教方便科攝屬次述正答科竟連合初序讚許科入總長行列示科竟二重頌總挈開二一序欲重宣爾時世尊欲重宣此義而説偈言句釋例前二述説偈言開二一挈旨示教方便開二一挈旨安居方便圓覺汝當知一切諸衆生欲求無上道先當結三期懺悔無始業經於三七日然後正思惟非彼所聞境畢竟不可取二挈旨修觀方便奢摩他至靜三摩正憶持禪那明數門是名三淨觀二挈旨示益修習開二一挈旨圓修頓證若能勤修習是名佛出世二挈旨隨修漸證鈍根未成者常當勤心懺無始一切罪諸障若消滅佛境便現前重頌文竟前合長行共成序述世尊垂答科竟連合序述菩薩興問科攝屬該果淨觀方便科竟接合徹因斷證清淨科入總正宗分竟三流通分開二一別詳問答開二一序述菩薩興問開二一序問躡次於是此序顯賢善首菩薩從十一菩薩各各興問圓覺教理徹因該果義已終了唯在奉持流通饒益末世衆生所當知者經教名字修習功德與夫護持經人流布教地有所興問成就奉持流通二序問周三開二一序述儀音開二一序問威儀賢善首菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言句釋例前二述請教益開二一慶前聞法大悲世尊廣為我等及末世衆生開悟如是不思議事當文二句慶前聞法大悲世尊一句廣為云云一句不思議事者圓覺境界非思惟測度之所能知二申請四事世尊此大乘教名字何等云何奉持衆生修習得何功德云何使我護持經人流布此教至於何地當文五句申請四事世尊一句此大云云一句名字奉持衆生云云一句修習功德云何云云一句護持經人流布云云一句流布教地合文上科共成述請教益科竟前合序問威儀科攝屬序述儀音科竟二序結終始作是語已五體投地如是三請終而復始句釋例前前合序述儀音科共成序問周三科竟連合序問躡次科入總序述菩薩與問科竟二序述世尊垂答開二初序讚許開二一讚所申請爾時世尊告賢善首菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是經教功德名字當文三句讚所申請通例二句汝等云云一句略讚前二該攝後二二許答囑受開二一囑令諦聽汝今諦聽當為汝説句釋例前二受教默然時賢善首菩薩奉教歡喜及諸大衆默然而聽句釋例前合文上科共成許答囑受科竟連合讚所申請科攝屬初序讚許科竟次述正答開四一名字奉持開二先彰經體善男子是經百千萬億恆河沙諸佛所説三世如來之所守護十方菩薩之所歸依十二部經清淨眼目當文五句先彰經體善男子一句是經云云一句三世云云一句十方云云一句十二云云一句諸佛所説者圓覺乃諸佛海諸佛接因皆顯説圓覺三世如來者過現未三世之所守護者過去如來入圓覺涅槃現在如來闡圓覺彰化未來如來本圓覺起因此二句一句諸佛利他一句諸佛自利為諸佛寶菩薩歸依者順圓覺教化此句為聖僧寶十二部經者一契經諸經之長行二祇夜經諸經之重頌重頌長行直説者亦云應頌應長行之文有所偈句三授記經諸經中授諸菩薩緣覺聲聞等作佛記四偈經諸經之孤起偈句非重頌長行者亦云諷頌五句經諸經中無問自説者六因緣經諸經中因問有説者七本生經諸經中如來説自行因本曾為事八本事經諸經中説如他前世昔所作事九方廣經諸經中軌則修行包含道理正理為方富有名廣十未曾有經諸經中説三寶等甚希有事及諸弟子讚歎如來希有功德十一譬喻經諸經中設立譬喻開顯旨趣十二論議經諸經中分別所説義設為問答明釋廣解者此總標如來所有言説之十二門清淨眼目者如來一代時教總為衆生開示圓覺圓覺明悟如人有目日光明照得見一切乃萬行之本此句為妙法寶後列經名是經名大方廣圓覺陀羅尼亦名修多羅了義亦名祕密王三昧亦名如來決定境界亦名如來藏自性差別汝當奉持當文六句後列經名名經五句汝當奉持一句初句總持二句絶詮餘釋準前三句大定祕密者非思議境王三昧者為三昧之王諸定之首四句不異決定境界者本成佛覺隨緣不變五句不一自性差別者如法界性不變隨緣汝當奉持者知名識體是所奉持合文上科共成名字奉持科竟二流布教地開二一果極佛海善男子是經唯顯如來境界唯佛如來能盡宣説若諸菩薩及末世衆生依此修行漸次增進至於佛地當文四句果極佛海善男子一句是經云云一句唯佛云云一句若諸云云一句是經句理本唯佛句教主若諸句行進蓋唯理本教主唯佛如來無他能所故乃修行增進直至佛地二因周法界善男子是經名為頓教大乘頓機衆生從此開悟亦攝漸修一切群品譬如大海不讓小流乃至蚊虻及阿修羅飲其水者皆得充滿當文四句因周法界善男子一句是經云云一句亦攝云云一句譬如云云一句是經句顯正亦攝句示兼所以兼者修習大乘未入究竟覺心不無差別果證譬如句喻明兼義不讓小流者不讓其潤濟之利蚊虻修羅飲水之得克滿正見海之不讓偏小溪流蚊虻腹小喻小根衆生修羅腹大喻大根衆生蓋蚊虻飲小流水而取足充滿飲海流水更無不得取足充滿修羅飲海流水而取足充滿飲小流水或有不得取足充滿故並以為喻令見大海能不讓於小流小流不能不讓於大海猶頓教能攝漸修漸修之不能攝於頓教也合文上科共成流布教地科竟三修習功德開二一彰劣顯勝開二一因度勝劣善男子假使有人純以七寶積滿三千大千世界以用布施不如有人聞此經名及一句義當文三句因度勝劣善男子一句假使云云一句不如云云一句假使者設比之辭純以者不雜他物七寶者一金二銀三琉璃四頗璃五硨磲六碼瑙七珍珠積滿者豎高橫遍三千大千世界者千日月千須彌山之世界為一小千世界如是小千為一世界又千世界為一中千世界如是中千為一世界又千世界乃一大千世界是則有千小世界千小千世界千中千世界之三千世界為一大千世界共有萬億日月須彌四洲總名為一娑婆界也以用布施者行檀波羅蜜也然雖積界寶施皆身外之物不能滿足檀度此句施劣聞此經名者因名而得體及一句義者解義而悟心皆能成就般若滿足菩提此句慧勝二果證勝劣假使有人教百恆河沙衆生得阿羅漢果不如有人宣説此經分別半偈當文二句果證勝劣假使云云一句不如云云一句二乘果證無明圓覺教彰淨性故如彼之多教證不如此之略宣説以此宣説乃佛果自性故爾殊勝半偈者隨舉一偈分別其半所有理趣合文上科共成彰劣顯勝科竟二極勝顯勝善男子若復有人聞此經名信心不惑當知是人非於一佛二佛種諸福慧如是乃至盡恆河沙一切佛所種諸善根聞此經教當文三句極勝顯勝善男子一句若復云云一句當知云云一句信心不惑者聞經名圓覺即信是己本心一切清淨更無疑念隨順修習此句顯聞一佛二佛者報化身佛種諸福慧者如來福慧二輪具足供養親近如來之人無不種所福慧恆沙佛所種諸善根者入圓覺性海親近供養滿足圓覺如來此句顯勝蓋能親近供養一佛如來已非他福可較今乃直劣一二佛之種福慧而云恆沙佛所之種善根其勝功德非可容於思議者前合彰劣顯勝科共成修習功德科竟四護持經人開二一囑示護持汝善男子當護末世是修行者無令惡魔及諸外道惱其身心令生退屈當文三句囑示護持汝善男子一句當護云云一句無令云云一句汝善男子者非止呼召當機乃直囑於在會諸衆此句付衆是修行者修行圓覺之人此句囑護惡魔者愛樂生死外道者計著邪見惱其身心者魔以神力令於身不安於心暗昧外道以計取令於身執著於心續妄令生退屈者退不精進屈失佛道此句示護二衆稟護持開二一道場衆開二一稟命威儀爾時會中有火首金剛摧碎金剛尼藍婆金剛等八萬金剛并其眷屬即從座起頂禮佛足右繞三匝而白佛言當文三句稟命威儀爾時云云一句八萬云云一句即從云云一句爾時會中者圓覺法會如法界性故道場衆世界衆總入會中火首者以頭有火𦦨又云此力士觀火性得道故以為名乃化多淫心成智慧火由昔發願於諸佛成道親為力士降伏魔怨者金剛即彼所執寶杵之名以稱其神尼藍婆梵語義翻強猛又翻離結縛以勇進故能離諸結縛此句序上首神名八萬句序衆多上首眷屬即從句序禮敬威儀例釋準前二陳辭護持世尊若後末世一切衆生有能持此決定大乘我當守護如護眼目乃至道場所修行處我等金剛自領徒衆晨夕守護令不退轉其家乃至永無災障疫病消滅財寶豐足常不乏少當文五句陳辭護持世尊一句若後云云一句我當云云一句乃至云云一句其家云云一句有能持此者慶幸之辭決定大乘者圓覺法門究竟清淨了義修習此句慶逢盛修如護眼目者圓覺修人本法界慧目群盲藉導故護之誠切如護己眼此句護持修人道場守護令不退轉者此句護持住處蓋住處不安亦使退故須護持其家句護持眷屬及諸資具此則攝在家修衆災障者魔作疫病者鬼作財寶豐足者四事足備常不乏少者釋明豐足之義以眷屬資具或遭災病以及缺少皆足以惱亂修心故盡護持合文上科共成道場衆科竟二世界衆開二一諸天祐護開二一稟命威儀爾時大梵天王二十八天王并須彌山王護國天王等即從座起頂禮佛足右繞三匝而白佛言當文二句稟命威儀爾時云云一句即從云云一句大梵天王者娑婆世界主二十八天王者總舉三界之天王欲界有六色界十八無色具四共二十八天天各一王須彌山王者即欲界地居天主乃帝釋也護國天王者即欲界初天四王守護國界者此句乃列三界天王皆悉護持而大梵帝釋四王別標者以其掌權世界為世間主故即從句禮敬威儀例釋準前二陳辭護持世尊我亦守護是持經者常令安隱心不退轉當文二句陳辭護持世尊一句我亦云云一句常令安隱者善祐護持合文上科共成諸天祐護科竟二諸鬼折護開二一稟命威儀爾時有大力鬼王名吉槃荼與十萬鬼王即從座起頂禮佛足右繞三匝而白佛言當文二句稟命威儀爾時云云一句即從云云一句吉槃茶者亦云鳩槃茶此云甕形即厭魅鬼其形可畏變化多端住於林野領諸鬼衆是乃上首故號為王與十萬鬼王者同是上首此句例諸鬼王護持即從句禮敬威儀例釋準前二陳辭護持世尊我亦守護是持經人朝夕侍衛令不退屈其人所居一由旬內若有鬼神侵其境界我當使其碎如微塵當文三句陳辭護持世尊一句我亦云云一句其人云云一句令不退屈者無障難故此句護持修人一由旬內者四十里界侵其境界者入四十里內居止遊行碎如微塵者以威折伏此句折伏惡鬼合文上科共成諸鬼折護科竟前合諸天祐護科攝屬世界衆科竟連合道場衆科管於衆稟護持科竟接合囑示護持科該在護持經人科竟綸合修習功德流布教地名字奉持三科統歸次述正答科竟貫合初序讚許科支出序述世尊垂答科竟并合序述菩薩興問科入總別詳問答科竟二通結信受佛説此經已一切菩薩天龍鬼神八部眷屬及諸天王梵王等一切大衆聞佛所説皆大歡喜信受奉行當文三句通結信受佛説此經已一句一切菩薩云云一句一切大衆云云一句前合別詳問答科入總流通分竟圓覺經句釋正白跋語余往執橐𮧨開幕湞韶獲拜羅峯和尚於日親山蒙師悲愍惑溺接引多方一語當機頓開心徑自是以來輪刀上陳恍如有見皆師慈誨妙力也曾幾何時而師已般涅槃豁未謝塵緣屬有樓船之役掃塔末由嗟夫慈雲遠逝法雨潛滋浮根四塵依然垢障偶於穗城晤師上足宗符首座詢師遺法座曰和尚箋注盈笥其未流傳者有圓覺句釋此吾師獨出手眼拈提脈絡覿面示人如從十二菩薩會上親承旨授蓋翻圭峯之案而別得未曾有者余受而讀之手迹宛然逢師面諭披卷未終根塵廓清不覺踴身投地曰善哉此正師所以闡揚曹洞宗風者也何啻初祖以楞伽而顯佛心宗哉祖庭秋晚教法陵夷人多迷指況復得月今師於晴空中霹𮦷欲人豁然蘇醒亟宜廣傳之以惠來學會有西來尊者在犙禪師於師為至友蓋同源合派心目一如此經奧旨曾面相參證者靜慮之餘細加較訂誠為共手琵琶音玄絶調欲獲玄音要得圓聞一落意窩劍去久矣既卒業豫捐金購梨將三百片付剞劂俾印布焉使大地人人奉持各證如來因地法行以滿師悲願此一舉也佛言之吾師詮之在師較之其上足宗師守之通豁梓而行之法界衆得而持之同歸大圓覺中矣敬為跋新安歸戒弟子通豁江起龍和南謹識圓覺經連珠愚庵俍亭淨挺著收于閲經十二種之第五故不載於此
