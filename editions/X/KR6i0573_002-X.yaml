body:
  text: 罽賓沙門佛陀多羅譯震旦沙門弘麗羅峯著神州沙門弘贊在犙較經題經題如來廣彰有五今舉前二仍略陀羅尼三字蓋以大方廣圓覺者法之宗修多羅了義者詮之絕標宗絕詮經義見矣末世眾生或以獲聞經名開悟自性圓覺或以先聞經名不昧向後敷宣得於佛所彰名曉了真實有斯饒益不嫌廣略所謂大方廣者乃圓覺自性常所獨露不遷遍至之也非大之外別有方廣大之獨露也以唯一也既唯一焉復何所遷是為方也既唯一焉豈不遍逢是為廣也亦非方之外別有廣大方之不遷也以恒在也既恒在焉即乃遍逢是為廣也既恒在焉即乃獨露是為大也亦非廣之外別有方大廣之遍至也以無外也普無外焉即乃恒在是為方也普無外焉即乃獨露是為大也法本非一非三而即一即三者也如斯契會方得圓覺自性之所為大方廣者修多羅梵語此翻契經所謂契理契機之聖教也了義者乃極宣之謂於理於事無不究竟顯了全彰一實不涉餘詮猶純醍醐不襍他味經之一言訓常訓法乃貫乃攝貫彼極宣之言攝持所化之機塵劫同遵非可改易是為修多羅了義經也一序分開二一通序開三一指重宣法如是當文二字指重宣法如者圓包之辭是者當指之辭蓋前已標經題顯有成述故今直圓包當指全經教理文句綸貫宣說二表己述聞我聞當文二字表己述聞稱述我聞表非己語三分時別聞一時當文二字分時別聞尊者多聞荷命流通法藏今在結集別別宣說宜分聞時成立別述防疑生信然一切經首置斯六言乃佛般涅槃時教敕尊者凡諸經首先唱斯句是為通序今在當經順文消釋則為如是圓覺教理文句我所得聞此之一時合三科文共成通序科竟二別序開三一尊號顯法婆伽婆當文一句尊號顯法此即薄伽梵殊音唐言無翻乃梵語五不翻中含多義不翻之一謂自在熾盛端嚴名稱吉祥尊貴含斯六義俱稱佛德翻攝不盡故存梵音為如來之果號尊稱果號彰顯圓覺教理文句乃果體如來清淨法身全該報化住持如來藏中發揮宣說者以見當經為無上教法二標處彰佛開二一迴身性土入於神通大光明藏當文一句迴身性土入於者稱顯如來逆流盡源該果徹因究竟底至圓覺自性之辭神通大光明藏者即圓覺自性應用一切曰神通包裹法界曰大非晦昧之空結暗之色曰光明深無以測富有難思曰藏二現行性土開二一該果徹因開二一該果光嚴三昧正受一切如來光嚴住持當文一句該果光嚴三昧梵語此翻正定即神通大光明藏之無生滅動搖清淨平等正受是於正定中不受諸受名為正受此之四言心境清淨雙彰三昧無生心之境正受無生境之心一切全該之辭如來稱於諸佛如法界性圓應法界無其增減者光嚴稱於諸佛圓照覺相永斷無明成本佛道者住持稱於諸佛圓覺海慧圓合一切無離覺性者通文一句三昧四字如海凝波一切八字如波澄海波海不別不共凝澄非一非二全彼得此全此得彼二徹因本際是諸眾生清淨覺地身心寂滅平等本際當文一句徹因本際是者指實之辭諸眾生者以妄執妄集緣生性之稱清淨覺地者無能所性身心寂滅者離諸幻垢平等本際者本覺因心此句文與三昧句語氣連貫乃是序顯婆伽婆所得正受于一切如來之光嚴住持者即是於諸眾生之清淨覺地徹其平等本際耳諸如來非別有所住持婆伽婆亦別無所正受總以彰性土如來之果徹因心非證聖有增而處凡有減者也合文上科共成證果徹因科竟二接因迴土開二一徧行隨順圓滿十方二不隨順當文一句遍行隨順圓滿者如法界性應現無方十方者法界全量不二者融通自他妙冥凡聖隨順者無諸縛脫即離取捨一切留礙此如珠光映色隨方各現妙無違拒隨順一切二現土教授於不二境現諸淨土當文一句現土教授於從也不二境者無能所境現諸淨土者能所情忘愛憎境寂無方清淨隨之顯發合文上科共成接因迴土科竟前合該果徹因科攝屬現行性土科竟連合迴身性土管於標處彰佛科竟蓋以三身說法居士不同故當標處彰顯法說何身三列眾顯因開二初佛與俱開二一彰數同因與大菩薩摩訶薩十萬人俱當文二句彰數同因與大云云一句十萬人俱一句與同也方便教授已令得入實相住持菩薩摩訶薩梵語存略具云菩提薩埵菩提此翻覺薩埵此翻有情義兼自他度自性之眾生度法界之眾生俱云覺有情摩訶此翻大合下薩埵云大有情信大法解大義趣大果修大行證大道之大心眾生也此句機大十萬人俱者圓覺自性心王心所眷屬法數也此句眾普蓋乃序顯性土如來無邊教授現土同居唯諸大菩薩圓因該果無復有聲聞緣覺差別修證二稱名揚德其名曰文殊師利菩薩普賢菩薩普眼菩薩金剛藏菩薩彌勒菩薩清淨慧菩薩威德自在菩薩辨音菩薩淨諸業障菩薩普覺菩薩圓覺菩薩賢善首菩薩等而為上首當文十四句稱名揚德十二菩薩名十二句等字一句而為上首一句文殊師利梵語此翻妙吉祥本智破無明有常樂妙德立稱普賢經論通名徧吉本行證實相平等清淨立稱普眼如眼光圓照得無憎愛立稱金剛藏證法實性包含法界堅固不壞立稱彌勒此翻慈氏如圓覺慧圓合一切無違拒性立稱清淨慧無妄覺明諸礙知見發本明耀立稱威德自在常寂常滅隨順無礙立稱辨音離名言境圓慧圓修立稱淨諸業障斷業智依明了知性立稱普覺覺心平等無有不覺立稱圓覺常覺不住徧滿總持立稱賢善首覺用智先本成佛師立稱夫呼名蓋以召體十二菩薩總於圓覺自性行因該果體用性相所有斷證乃彰名號若離圓覺無於菩薩無於體性即無呼名故在稱名屬揚嘉德等者未盡之辭時在會上首菩薩不能備舉蓋以圓覺自性本具一切智德今首舉此以該一切然俱各有所眷屬而此十二菩薩為之上首上首綱領也合文上科共成初佛與俱科竟次眾入住與諸眷屬皆入三昧同住如來平等法會當文二句次眾入住與諸云云一句同住云云一句與諸眷屬者菩薩同事攝化隨類現身教授純熟一切頓機眾生皆入三昧者反流全一住清淨覺平等本際此句眾入同住如來平等法會者住此覺地覺齊佛覺乃融自他依正不二履佛現土平等安居此句眾住前合初佛與俱科共成列眾顯因科竟顯因有二一顯行因二顯法因法因者必三昧之皆入斯成於如來之法會平等同住此十二菩薩所以為末世眾生啟教圓覺行因者惟三昧之皆入已成於如來之法會平等同住乃能啟教圓覺饒益末世眾生前合標處尊號科攝屬別序科竟連合通序科入總序分科竟是為六種成就一法二聞三時四主五處六侶凡經序分例必兼該者白如是二正宗分開二一徹因斷證清淨開二一在斷智行清淨開二一智斷顯真清淨開二一序述菩薩興問開二一序問躡次於是此序顯文殊菩薩從同住法會平等本際一時主伴果則徹乃因心因則該於果地無二種性可得當名菩薩眾生唯一佛覺究竟遍滿有所興問希佛垂教開悟末世菩薩眾生二序問周三開二一序述儀音開二一序問威儀文殊師利菩薩在大眾中即從座起頂禮佛足右遶三匝長跪叉手而白佛言當文三句序問威儀文殊云云一句頂禮云云一句長跪云云一句菩薩名義準前釋在大眾中者自他一境中即從座起者平等法會各住法位自冥他寂今有興問為利眾生彰他境界故從己座先現起儀此句起問頂禮佛足者自他感應因果道交徹因之頂至果之足故必己頂禮承佛足方即事理存不二自他成於感應右遶者如日流性南盈西北晦東明三匝者環周三世去現未凝是乃趨歸果位順行而至之義此句禮敬長跪者身則半豎膝乃雙屈此彰己體因行未徹卑劣果德豎極之容叉手者指不開舒手不成用此彰己體方便未具狹隘果用橫該之相而白佛言者直心達意無於飾言綺語求佛開示本起遠離清淨得果徹因了因方便此句陳辭二述請教益開二一請教因行開二一請教徹因大悲世尊願為此會諸來法眾說於如來木起清淨因地法行當文二句請教徹因大悲世尊一句願為云云一句大悲者稱佛無始度生無緣深慈世尊者德嚴十號法界宗仰此句讚佛願者言己意欲為者邀佛方便此會者現土同居諸來法眾者皆入三昧住法會眾說於如來者徹因之果本起清淨者所本起之清淨因地法行者該果之因此句正請示教徹因蓋求證果唯務徹因不知因地法行所本起之清淨則無從徹因原無以圓成果證故於法會法眾求佛示教因行本起令知清淨不迷果證是云徹因二請教了因及說菩薩於大乘中發清淨心遠離諸病當文一句請教了因欲證徹因須先了因故云及說大乘中者一佛乘中發清淨心者顯發本成佛覺無生滅心願令一切眾生入究竟覺遠離諸病者開悟圓覺無取覺者一切我人諸相此則得果地覺心無生滅性於因地發心是云了因合文上科共成請教因行科竟二結益末世能使未來世眾生求大乘者不墮邪見當文一句結益能使末世者請所開示菩薩了因如來徹因昭明修習方便有益末世功能不墮邪見者了達因果不求果外之因因外之果無於計取分別諸顛倒見前合請教因行科共成述請教益科竟連合序問威儀科攝屬序述儀音科竟二序結終始作是語已五體投地如是三請終而復始當文三句序結終始作是語已一句結述白佛之辭五體投地一句殞身求誨五體者頭面手足五支身分投地者全布於地此葢彰願隱沒在己卑劣狹隘之身顯現同佛尊特圓滿之身如是云云一句如是者包指長跪叉手白言投地再請之儀三請者列序長跪叉手白言投地申請之極所以三請者願隱沒之卑劣狹隘有其體相用之三希顯現之尊特圓滿亦有其體相用之三故請則極於三終而復始者詳出長跪叉手白言投地具足以請之式此句例結前合序述儀音科共成序問周三科竟連合序問躡次科入總序述菩薩興問科竟二序述世尊垂答開二一長行列示開二初序讚許開二一讚請教益開二一讚教因行爾時世尊告文殊師利菩薩言善哉善哉善男子汝等乃能為諸菩薩諮詢如來因地法行當文三句讚教因行爾時云云一句善男子一句汝等云云一句爾時者彼時也菩薩三請當終之時善哉善哉者重言詠讚示乃諦審深許之意此句述讚善男子者已表成人具足身相有大德用之稱此句呼召與語汝等乃能者同居法眾行無優劣智無高下一人請教眾人同心故以等能齊之諮詢如來云云者本起遠離之清淨總屬如來之因行乃諸菩薩之所由以徹因該果者此句讚所請教二讚益末世及為末世一切眾生求大乘者得正住持不墮邪見當文二句讚益末世及為云云一句不墮邪見一句及兼至也葢知於如來因行清淨即知大乘之所由求無二理致故云及此與請語能使口氣相為照應亦屬連貫上文為義得正住持者入圓覺海徧滿總持此句證真不墮邪見者究竟清淨無妄能所計取知見此句絕妄雖證真之外無絕妄絕妄之外無證真然證真乃絕妄之本故世尊推本不墮邪見於得正住持雙複善其所請合文上科共成讚請教益科竟二許答囑受開二一囑令諦聽汝今諦聽當為汝說當文二句囑令諦聽汝今諦聽句如於諦理而聽乃能因指看月當為汝說句當應也可也如諦而聽則非唯益多聞斯當可於開示二受教默然時文殊師利菩薩奉教歡喜及諸大眾默然而聽當文二句受教默然時文云云一句及諸云云一句時者世尊許答囑聽之時奉教歡喜者喜得聞所教益於諸菩薩眾生此句自受教默然而聽者靜慧湛持圓聞不住有斯默然乃能如諦而聽此句偕他受教合文上科其成許答囑受科竟前合讚請教益科攝屬初序讚許科竟次述正答開二一示教因行開二一如來因行開二一本起清淨開二一示所本起開二一標本唯覺善男子無上法王有大陀羅尼門名為圓覺當文三句標本唯覺善男子一句無上法王一句有大云云一句無上法王者稱本法性如來此句示圓覺教主有大陀羅尼門者稱本性覺該通內外大別異旁小陀羅尼梵語此翻總持門通出入不遺內外具總持相用然必非旁門小竇斯無不出入一切該通故先標大總持以彰其用後標門以顯其相名為圓覺者當指相用呼名以召真體此句示圓覺法相二標起唯覺流出一切清淨真如菩提涅槃及波羅蜜教授菩薩當文二句標起唯覺流出云云一句教授菩薩一句一切清淨者無能斷所斷能證所證染污因果真如云云者稱佛三德果證真如法身果菩提般若果涅槃梵語此翻圓寂解脫果及波羅蜜者波羅蜜梵語此翻彼岸到彼岸佛土也到證也證佛土嚴佛果滿足成就中含無量清淨法門故云及此句彰諸行起性悉本圓覺教授菩薩者如來顯果現土總以教授菩薩悟本清淨自性覺行得乃該果之因此句彰圓覺被機唯菩薩性合文上科共成示所本起科竟二示所清淨開二初標斷妄開二一示能斷照一切如來本起因地皆依圓照清淨覺相永斷無明方成佛道當文三句示能斷照一切云云一句皆依云云一句方成佛道一句一切如來者從於果位追論起因本起因地者此本起與上本起異上乃言起因所本此乃言最初發覺得清淨因心菩薩地時之始起初因此句從果顯因皆依者諸佛道同無或殊異圓照者常覺不住清淨覺相者諸法實相無能所性永斷無明者寂滅無二究竟清淨此句示所徹因方成佛道者修證成就得無修證圓滿覺心此句示所成果文中圓照二字標指斷妄關要非有功用行乃根性現量圓光不失現量境即得清淨覺境無諸妄覺明所是故無明永斷苟或照不圓現即乃因明立所同異熾然成立無明無明者無圓照之明若其不依圓照而能斷彼無明無有是處二示所斷妄開二一徵釋開二初徵云何無明當文一句初徵云何者言指何者謂之無明雖乃徵名實乃責相故下釋相結名次釋開二一釋妄性相開二一妄性迷真開二一出諸妄性善男子一切眾生從無始來種種顛倒當文二句出諸妄性善男子一句一切云云一句從者自也無始者根本無明體性虗妄無有本始指彼無明業相來者由此無本始之虗妄迷生虗妄歷塵劫以至今日指彼無明之轉現相種種顛倒者見相惑亂織妄昏濁自他依正迷己逐物認物為己指彼無明智相續執取名字造業業苦之六麤妄性二喻顯迷真猶如迷人四方易處當文一句喻顯迷真猶如者譬喻之辭迷人者迷一法界之人四方易處者惑東為西惑南為北常住自本己方而生客作他鄉之想此喻覺明之明了知性於本自心相惑妄計取立所生能見有異同起愛憎心性成立種子現行無明猶如迷人迷己本方之東南西北乃生易處之東南西北合文上科共成妄性迷真科竟二妄相本妄開二一出諸妄相妄認四大為自身相六塵緣影為自心相當文二句出諸妄相妄認云云一句六塵云云一句妄認者所立照亡之妄能性此即業轉現後之智識四大者地水火風為自身相者迷有和合立己相分成於色法不悟四大性本各離無實和合此句迷妄有身六塵者色聲香味觸法緣影者由塵所發之知乃即攀緣五門落謝塵影之緣慮心識為自心相者迷乃光耀立己見分成於心法不悟緣影黏妄發光非本明耀此句迷妄有心是為眾生無始生死色心二法所由立相總皆出彼妄認非實有性二喻顯本妄譬彼病目見空中華及第二月當文三句喻顯本妄譬彼病目一句見空中華一句及第二月一句譬者比方也彼者指病目人病目者有眚之目此句喻無明業識見者即彼妄認智識空中華者本無華相相出病目此句喻執身相第二月者于彼真月見有重輪此句喻執心相言及者有見空華之病目即有見於二月勢必雙顯非見空華之病目能無見於二月故云及此喻有妄認之身相即有心相與根本無明為三苦輪轉之生死所以華相喻身二月喻心者以華相從虗空幻影一期病目對彼常住虗空無有滅空華見之時除目復清明與暗室黑夜同羣盲等皆有見於華相足當身相非一期壽盡及離分段生死無有捨執之地二月從真月幻影一期病目於彼真月隱現不定成對出生二月之相時或緣集則見重輪時或緣離即乃冥觀足當心相對境生起因緣無定之性合文上科共成妄相本妄科竟前合妄性迷真科攝屬釋妄性相科竟二釋妄因果開二一迷真因果開二一迷實相因善男子空實無華病者妄執當文二句迷實相因善男子一句空實云云一句空實無華者覺相如空徧滿清淨病者病目人也妄執者不悟虗空無有出生華相以己病目於清淨虗空見有亂起亂滅之空華相執以為實不悟清淨實相此句是迷真因此中不及月喻者眾生所認之心相執為在於身內華相當身心乃從攝故不兼出二迷真性果由妄執故非唯惑此虗空自性亦復迷彼實華生處當文二句迷真性果由妄云云一句亦復云云一句由妄執故者由於執虗妄相乃迷實相非唯者唯獨也猶云不獨虗空自性者清淨實相之性此句迷相迷性亦復者兼及也實華生處者究竟正覺心華發明之處此句迷心葢以實相由淨性顯清淨相性本覺心發明若迷於相則迷於性此不待言即乃失本成佛覺遍滿清淨寂滅隨順平等自心故有非唯亦復之辭科云迷真性果者以覺成就處乃清淨性究竟處故名曰果合文上科共成迷真因果科竟二立妄因果由此妄有輪轉生死當文一句立妄因果由此者以迷清淨相性因果乃受虗妄相性因果妄有者空華二月也輪轉生死者本末無明種子起現行現行成種子新熏舊熟如輪環轉生生死死死死生生無有斷時前合迷真因果科共成釋妄因果科竟連合釋妄性相科攝屬次釋科竟二結名故名無明當文一句結名故名者原上文句結示之辭以斯故立斯名也無明者一切眾生總以無始迷無失明照性有上無明性相因果乃二生佛是故無有眾生但有無明無明斷盡即成佛道前合徵釋科共成示所斷妄科竟連合示能斷照科文攝屬初標斷妄科竟次彰清淨開二一無明本虗開二一非實有體開二一標顯善男子此無明者非實有體當文二句標顯善男子一句此無云云一句此無明者指上當名無明之性相因果非實有體者體該性相因果於四無異騐體真實今四全虗體何有實二喻明開二一喻生無體如夢中人夢時非無及至於醒了無所得當文二句喻生無體如夢云云一句及至云云一句如者合樣之辭夢中人者夢境所現之人或自身變現異本有身或自身不變接多他身俱夢中人喻彼無明住地夢時非無者夢人在夢作用宛然喻彼無明現行此句喻無明生相及至於醒者形開寤爽之際喻時復圓明照了無所得者夢人夢事渾全無狀非無竟無喻彼住行本空此句喻無明無體二喻滅無體如眾空華滅於虗空不可說言有定滅處當文二句喻滅無體如眾云云一句不可云云一句如眾空華者自他依正業行因果種種非一滅於虗空者復本虗空自性遍滿清淨此句喻無明滅不可說言有定滅處者空本無華何有滅華之處如斯幻滅何有滅相此句喻滅無體合文上科共成喻明科竟前合標顯科攝屬非實有體科竟二本無生處何以故無生處故當文二句本無生處何以故一句無生處故一句初句徵問無明如夢人空華非實有體之故次句釋明眾生自性唯淨圓覺如法界性徧滿平等為實華生處更何有處生彼無明故乃無於實體以本無於生處前合非實有體科共成無明本虗科竟葢於無明達體非實則無諸妄身心達生無處則無諸妄境界身境妄相俱無無明當體全虗成於開顯二生死唯名一切眾生於無生中妄見生滅是故說名輪轉生死當文二句生死唯名一切云云一句是故云云一句一切眾生者四生九有於無生中者夢人空華妄見生滅者夢人空華本無生滅眾生見生見滅非實有見此句指眾生生死是故者妄見非實之故說名輪轉生死者善惡因苦樂果染淨依正一切輪迴總唯意識境俱乃名言境但有言說都無實義此句示生死唯名此唯名彰妄因果清淨前本虗彰妄性相清淨性相因果清淨即乃一切清淨前合無明本虗科共成次彰清淨科竟連合初標斷妄科攝屬所清淨科竟接合示所本起科管於本起清淨科竟二因地法行開一二標所修法善男子如來因地修圓覺者當文二句標所修法善男子一句如來云云一句如來因地者指己成佛前居因地中修圓覺者修於自性圓覺令得平等清淨徧滿成就更無他法以當修習二示能修行開二一達妄照覺開二一達妄本空開二一妄能所淨開二一所執妄淨知是空華即無輪轉當文二句所執妄淨知是空華一句即無輪轉一句初句達無生滅性二句遠離妄境二能執妄淨亦無身心受彼生死當文一句能執妄淨是遠離和合性常自照蘊空當念無能執永離於業縛合文上科共成妄能所淨科竟二妄本性空非作故無本性無故當文二句妄本性空非作故無一句本性無故一句初句非加功用行無諸妄能所次句無明無自性無法立能所原本悉清淨究竟無生滅前合妄能所淨科共成達妄本空科竟二照覺如空開二一照覺實相彼知覺者猶如虗空知虗空者即空華相當文二句照覺實相彼知云云一句知虗云云一句彼知者彼修圓覺之人自心了達之知覺者己本性覺猶如虗空者性覺清淨如虗空相此句圓照覺相如虗空者了達實相即空華相者泯諸妄相此句證入實相二照覺淨性亦不可說無知覺性當文一句照覺淨性亦不可說云云者修圓覺人自知於不可說無乃增進開悟顯發清淨究竟遍滿平等覺性合文上科共成照覺如空科竟前合達妄本空科攝屬達妄照覺科竟二順覺成行開二一順覺遍滿開二一遣惑順覺有無俱遣是則名為淨覺隨順當文二句遣惑順覺有無俱遣一句是則云云一句有無俱遣者通達實相清淨不執空華幻影以遣於有究竟淨性遍滿得乃正覺住持以遣於無此句性相圓明是則者此則也指上俱遣之辭猶云是此則此非此則不此矣令知必俱遣乃成順覺名為淨覺隨順者了悟性相寂滅現前無有不覺名為淨覺一覺遍滿圓合一切無異同性名為順覺此句修習成就二釋遣成順何以故虗空性故常不動故如來藏中無起滅故無知見故如法界性究竟圓滿遍十方故當文六句釋遣成順何以故一句虗空性故一句常不動故一句如來云云一句無知見故一句如法云云一句初句徵問必俱遣斯成順說之故二句虗空性故者釋覺乃實相性無不清淨故有之當遣三句常不動故者釋覺平等住持常自現前故無之當遣合此二句釋覺離於有無所以當有無之俱遣如來藏中者清淨覺也無起滅者無妄能所此句一相清淨無知見者無妄覺明此句一性清淨合此二句釋覺清淨所以離於有無故當有無之俱遣乃得名為淨覺如法界性者顯發虗空包裹無外究竟圓滿者圓滿慧性圓合一切遍十方故者唯一覺境不一不異此句釋覺常住所以離於有無故當有無之俱遣乃得名為隨順合文上科共成順覺遍滿科竟二結名成行是則名為因地法行當文一句結名成行是則者指淨覺隨順之辭必得名為淨覺隨順斯得名為因地法行葢得名為淨覺隨順以有無之俱遣是乃圓照覺相是乃永斷無明故得名為因地法行而有其成於佛道者此兩是則與前皆依相呼照應標指如來因地法行唯一淨覺之隨順圓攝究竟諸妙方便前合順覺徧滿科共成順覺成行科竟連合達妄照覺科攝屬示能修行科竟接合標所修法科管於因地法行科竟綸合本起清淨科該在如來因行科竟二菩薩發心菩薩因此於大乘中發清淨心當文一句菩薩發心因此者因淨覺隨順之因地法行大乘發心釋準前前合如來因行科共成示教因行科竟二示益末世末世眾生依此修行不墮邪見當文一句示益末世依此者依猶因也於如來之淨覺法行準則以修行也不墮邪見釋準前此與菩薩發心一同指歸如來因行者以興問如來因行本為示教菩薩以益末世眾生令善修學大乘徹因該果故此標指前合示教因行科入總長行列示科竟二重頌總挈開二一序欲重宣爾時世尊欲重宣此義而說偈言當文一句序欲重宣前已詳示今更約語彰其要義為益將來俾易開曉二述說偈言開二一挈旨示教因開二一挈旨如來因行開二一挈旨本起清淨開二一挈旨示所本起文殊汝當知一切諸如來從於本因地皆以智慧覺二挈旨示所清淨了達於無明知彼如空華即能免流轉又如夢中人醒時不可得二挈旨因地法行開二一挈旨示所修法覺者如虗空平等不動轉二挈旨示能修行覺遍十方界即得成佛道眾幻滅無處成道亦無得本性圓滿故二挈旨菩薩發心菩薩於此中能發菩提心二挈旨示益末世末世諸眾生修此免邪見重頌文竟前合長行攝屬序述世尊垂答科竟連合序述菩薩興問科入總智斷顯真清淨科竟蓋以佛道之成在無明之永斷無明之永斷在覺相之圓照無不圓之照斯無不清淨之覺相而永斷於無明成乃佛道矣是云智斷顯真清淨言以智斷妄則顯於真之清淨也又本文云如來因地修圓覺者知是空華即無流轉夫但知即無此顯於真之清淨也無所染污屬本智斷然有智斷即有行斷智斷未彰行斷何立故此章科智斷顯真存合下四章科行斷絕妄以總成在斷智行清淨之因地法行也
