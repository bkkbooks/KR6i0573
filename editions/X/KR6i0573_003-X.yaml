識吸塵染污塵乃縛脫無二與根同源因次清淨故前雖已從根次識今仍不於識推故而於根推故者有以也此句塵相圓寂色清淨之聲塵清淨者色相都無聲響何自此句從色聲生起之因次示清淨之因次香味觸法之亦復如是者匪風聲境氣息誰宣離依緣氣將誰恬淡不有味著何明合離若冥合離誰當分別此句例相因生起之相因清淨所云清淨者各顯實相平等不動無他即離如如自性而六皆云塵者具相分故二大色清淨善男子六塵清淨故地大清淨地清淨故水大清淨火大風大亦復如是當文四句大色清淨善男子一句六塵云云一句地清云云一句火大云云一句六塵清淨之地大清淨者六塵總色法同源地大故清淨相次此句無別無總地大及水大者地水同見分又身分之地大從父母精血凝實世界之地大從阿那毗羅風吹水立故地大之清淨即水大之清淨此句無所無能水大之次火大者情器界水俱火變化性炎烝潤出火大之次風大者火風同相分又情器界火俱無明照相情器界風俱無明動相照從動出亦復如是者各相類從各相清淨為之因次此句無體性無相用清淨釋準前六塵四俱名大者四各徧滿故合文上科共成所淨因次科竟前合能淨因次科攝屬列次淨因科竟二總彰淨因善男子四大清淨故十二處十八界二十五有清淨當文二句總彰淨因善男子一句四大云云一句四大清淨云云者情器世間處界有法皆依四大發明四大歸元如空清淨則根塵之處十二根塵識之界十八四洲四惡趣梵王六欲天無想五淨居四空及四禪之有二十五無不清淨前合列次淨因科共成凡法染淨科竟此科所因總彰能因列次者所本能生之總相故一所清淨一切能清淨當於總彰能出立所之別相一能清淨未定一切所清淨當於列次又必總列雙彰者不列次不見能之清淨之究竟不總彰不知所之清淨之並包故染能所當斯總列二聖法淨淨彼清淨故十力四無所畏四無礙智佛十八不共法三十七助道品清淨如是乃至八萬四千陀羅尼門一切清淨當文二句聖法淨淨彼清云云一句如是云云一句彼清淨故者該指凡法染淨十力者一知是處非處力二業智力三定力四根力五欲力六性力七至處道力八宿命力九天眼力十漏盡力此乃諸佛所得如實智用了達一切無能壞無能勝故俱名為力四無所畏者一一切智二漏盡三說障道四說盡苦道此四俱名無所畏者如來於一切眾中廣說自他智斷以決定無失故無微畏恐懼之相四無礙智者一義二法三辭四樂說此四俱名無礙智者菩薩智慧捷疾分別了達無滯故十八不共法者一身無失二口無失三念無失四無異想五無不定心六無不知已捨七欲無減八精進無減九念無減十慧無減十一解脫無減十二解脫知見無減十三身業隨智慧行十四口業隨智慧行十五意業隨智慧行十六智慧知過去十七智慧知未來十八智慧知現在此乃極地之法不與凡夫二乘菩薩共有故通言不共三十七助道品者四念處之身念處觀身不淨受念處之觀受是苦心念處之觀心無常法念處之觀法無我四正勤之已生惡法為斷除未生惡法不令生已善法為增長未生善法為熏生四如意足之欲如意足念如意足精進如意足思惟如意足如意足者謂所修法如願滿足五根之信根精進根念根定根慧根言根者如物生有根日能長發五力之信力精進力念力定力慧力言力者能成辦善法破眾惡法之謂七覺支之擇法覺支精進覺支喜覺支除覺支捨覺支定覺支念覺支支者分也謂支分所修之法是真是偽八正道之正見正思惟正語正業正命正精進正念正定言正者不依偏邪道者通至涅槃之謂合此七科三四二五隻七單八共為三十七資助入道淺深之氣類故通名助道品此句對治染法之聖法如是者指諸聖用清淨乃至者包舉多法三身四智五眼六通等八萬四千陀羅尼門者此乃諸佛菩薩所得法門名義皆不與二乘共然法門無量今但齊此以對治一切塵勞八萬四千煩惱賢劫經中具明法數此句翻染成淨之聖法葢以本對凡迷彰聖智離染法成淨法乃至種種法門若己染法清淨更何顯為淨法無染法無淨法即染法即淨法是為清淨是同清淨然此亦在總彰清淨者以凡法為所淨聖法為能淨一所清淨眾能清淨法爾如然前合凡法染淨科共成染淨一如科竟二依正不二開二一正徹自他善男子一切實相性清淨故一身清淨一身清淨故多身清淨多身清淨故如是乃至十方眾生圓覺清淨當文四句正徹自他善男子一句一切云云一句一身云云一句多身云云一句一切實相性清淨者即指上凡聖染淨清淨葢清淨染淨諸法乃通達諸法之實相如虗空性無其起滅華相顯現清淨一身清淨者顯現一切實相之法性身此身本無染污但以迷於相用有凡聖法之染淨乃不證此身之清淨今既於凡聖染淨諸法一切還本實相清淨即得此身之清淨故隨次顯此句化身清淨一身清淨之多身清淨者法性身不一自他不二自他不一故自一多不二故同清淨此句報身清淨多身清淨之如是乃至云云者徹見於法性身之不一不二同歸清淨復何有其幻垢身之眾生是故盡眾生界盡圓覺界盡圓覺界盡清淨界矣此非可以推及故以如是乃至包舉之十方者法界十方也此句法身清淨是云正徹自他二依融一多善男子一世界清淨故多世界清淨多世界清淨故如是乃至盡於虗空圓裹三世一切平等清淨不動當文三句依融一多善男子一句一世云云一句多世云云一句一世界清淨故者即指圓覺清淨以本非世非界唯一圓覺眾生迷圓覺清淨乃有世界染污既證於眾生之圓覺清淨即乃世界之清淨是故隨之彰顯多世界清淨者世界皆圓覺世界皆清淨此句性土常寂如是者如一多世界之清淨乃至者包舉無窮無盡之多世界盡於虗空者盡充滿虗空之世界此言於內之無不清淨圓裹三世者盡無有今古之虗空此言於外之無不清淨一切者合內合外該盡之辭平等者同歸一相清淨者無諸異相不動者永離生滅此句性土常住合文上科共成依正不二科竟前合染淨一如科攝屬圓明實相科竟二圓明妙性開二一妙性圓即開二一徹性即相開二一徹性即空善男子虗空如是平等不動當知覺性平等不動當文三句徹性即空善男子一句虗空云云一句當知云云一句虗空者諸相之一大總相此即指圓裹之虗空之虗空圓裹圓裹何物還圓裹於諸清淨之虗空依正染淨不遷三世自性法相故有如是云云如是者在染在淨一多依正一切諸相無不悉本虗空相平等者無不虗空之相無不相之虗空清淨者無出生之相無斷滅之空不動者究竟唯相究竟唯空無於變異此句出相當知覺性平等不動者無邊虗空本覺所發在發之相有此平等不動必所發之性由來平等不動是故當知此句出性然此示總一實相之真空性下乃示一切實相之妙有性空有雙徹方明圓即二徹性即有四大不動故當知覺性平等不動如是乃至八萬四千陀羅尼門平等不動當知覺性平等不動當文二句徹性即有四大云云一句如是云云一句四大不動故者四大清淨乃大大徧滿大大常住大大不相到大大不相知之為清淨清淨四大本即是平等不動法相故今直云不動當知覺性云云者無方清淨本覺所顯在顯之相有此平等不動必其所顯之性如之平等不動是故當知此句於染徹性如是者如四大之不動乃至者包舉十力四無所畏一切淨法當知云云者準前句釋此句於淨徹性合上科文共成徹性即相科竟二徹相即性善男子覺性徧滿清淨不動圓無際故當知六根徧滿法界根徧滿故當知六塵徧滿法界塵徧滿故當知四大徧滿法界如是乃至陀羅尼門徧滿法界當文五句徹相即性善男子一句覺性云云一句根徧云云一句塵徧云云一句如是云云一句覺性徧滿者真空妙有門中一切實相俱覺顯發故徧故滿清淨不動者即指真空妙有門中之諸實相法圓無際者法本即空即有如珠圓轉徧滿法界覺性之徧滿亦即空即有無有雜異故者推本於性之徧滿令知於相之徧滿當知者可應知也根徧滿法界者根即覺故先根句次塵句次大句次陀羅尼門句者根挾見相成立屬親相分塵大全相分本疎相分陀羅門等屬聖淨法本對治染法出生故相次應知於一相徧滿得一切相徧滿相徧滿義者以無分性之相唯全性之相相相全性故相相徧滿餘釋準前合文順釋則云觀本覺性如一切空之不動如一切有之不動如斯徧滿於清淨不動之一切法中圓徹無際之故乃知本一切諸相由覺顯發性無二相之故夫無二相之性豈有外性之相是可當知全相全性全性全相性既徧滿相亦徧滿云云前合徹性即相科共成妙性圓即科竟二妙性圓離開二初法說善男子由彼妙覺性遍滿故根性塵性無壞無雜根塵無壞故如是乃至陀羅尼門無壞無雜當文三句初法說善男子一句由彼妙云云一句根塵云云一句由彼妙覺性徧滿故者無不相之性無不性之相根性塵性無壞無雜者如性之無生滅和合一切徧滿此句染法無礙根塵之無壞如是乃至云云者一切凡法全如於性一切聖法亦唯全如於性非有所壞滅雜和以為聖法此句淨法無礙葢乃發明由全性全相故全相全性即凡染即聖淨各各徧滿各各清淨無有留礙成於壞雜得乃圓離次喻顯如百千燈光照一室其光徧滿無壞無雜當文二句喻顯如百云云一句其光云云一句百千燈喻一切法光喻一切法性照一室喻徧滿法界此句舉喻其光句釋明喻意在光徧滿以光相含真空妙有二門故徧滿故無壞雜令於真空妙有得相得性安住覺境然此須喻開曉者以一切染淨諸法徧滿法界無於壞雜非入住三昧受用性境者不能曉了故借千燈之光照一室燈燈徧滿一室各各住位各各無礙以成彰顯合文上科共成妙性圓離科竟前合妙性圓即科攝屬圓明妙性科竟連合圓明實相科管於於覺圓明科竟二於覺成就開二一成因覺行開二一標清淨行開二一一自因果善男子覺成就故當知菩薩不與法縛不求法脫不厭生死不愛涅槃當文四句一自因果善男子一句覺成就故一句當知云云一句不厭云云一句覺成就者圓明性相無於他物唯一妙覺徧滿隨順無壞無雜故者起下當知之辭此句以菩薩順覺為行非成就淨覺有其隨順者不能通達故此推原當知者必定知也不與法縛者不為一切染淨法縛乃冥於境不求法脫者不求一切染淨法脫乃冥於心此句示行自在不厭生死者無苦集諦不愛涅槃者無滅道諦此句示報等觀二一他人法不敬持戒不憎毀禁不重久習不輕初學當文二句一他人法不敬云云一句不重云云一句不敬持戒者達無持性不憎毀禁者達無犯性此句冥法染淨不重久習者達無菩薩性不輕初學者達無眾生性此句冥人聖凡合文上科共成標清淨行科竟二顯隨順覺開二一法說覺行何以故一切覺故當文二句法說覺行何以故句徵問菩薩所以能於不與不求等之故一切覺故句釋明菩薩乃以順覺成行此即圓照覺相之清淨法行也一切覺有二指一指諸法以是法相皆覺相故菩薩唯見覺而不見法一指菩薩以菩薩常覺不迷故無與求於諸法二喻明覺行開二初喻顯譬如眼光曉了前境其光圓滿得無憎愛當文一句初喻顯眼光指現量圓明清淨見精以喻淨行菩薩曉了前境指同時明了以喻菩薩隨順其光圓滿指剎那圓照簡非分別明了以剎那圓照時有同時明了故曉了前境未起意地分別故其光圓滿以喻菩薩圓照成喻在此四字得無憎愛者周目一切無趨避於好醜以喻菩薩不與不求等次徵明何以故光體無二無憎愛故當文二句徵明何以故一句光體云云一句何以故者徵問圓滿見光得無憎愛之故光體無二者一光具圓無二立照故冥能所無憎愛故者以無二故無起於憎愛以無二故無當於憎愛無起由無能無當由無所方足喻顯一切覺故之旨此句釋明合文上科共成喻明覺行科竟前合法說覺行科攝屬顯隨順覺科竟連合標清淨行科管於成因覺行科竟二成果覺心開二一成果修證開二一得本無修開二一標指無修善男子此菩薩及末世眾生修習此心得成就者於此無修亦無成就當文三句標指無修善男子一句此菩云云一句於此云云一句此菩薩者指順覺菩薩及末世眾生者成就順覺之眾生修習此心者修習圓滿無二覺心一切如如隨順寂滅得成就者得圓滿無二之成就此句標修成就於此者於得成就之圓滿無修者了因同果亦無成就者了果同因此句示所成就葢圓滿覺心因果一如能所冥寂何修何成故得成就者必得於無修無成如此標指葢令修習覺心之菩薩眾生知所成就不迷中道以當究竟二彰顯無修開二一在能無二圓覺普照寂滅無二當文一句在能無二圓覺普照者覺體照用自性冥即以圓而普以普而圓寂滅無二者覺寂照滅自相一如即寂而滅即滅而寂此句有上半句得下半句有下半句顯上半句要必有圓普之覺照斯有無二之寂滅在所寂滅之無二則屬下顯此特標所成就之覺心照澄元妙二在所無二開二一世界量滅開二一極數冥量於中百千萬億阿僧祇不可說恒河沙諸佛世界當文一句極數冥量於中者於圓普覺照中百千萬億阿僧祇云云者阿僧祇梵語此云無數十大數之第一數不可說亦數稱十大數之第九數包攝第二無量第三無邊第四無等第五不可數第六不可稱第七不可思第八不可量諸大數在中後舉恒河沙為數當第十大數之不可說不可說以極於數以冥於量葢恒河本阿耨達池東面象口流出周四十里金沙混流沙細如麵今在數如天人中能知算數者極數不能知是名一阿僧祇如一一名二二二名四三三名九十十名百十百名千十千名萬十萬名億千萬億名那由他千萬那由他名頻婆千萬頻婆名迦他過迦他名阿僧祇阿僧祇箇名無量無量箇名無邊無邊箇名無等無等箇名不可數不可數箇名不可稱不可稱箇名不可思不可思箇名不可量不可量箇名不可說不可說箇名恒河沙之沙數以為世界之數如何窮極諸佛世界者世界性本圓覺性圓覺性無別種性唯諸佛性故唯諸佛界二喻界常寂猶如空華亂起亂滅不即不離無縛無脫當文二句喻界常寂猶如空華一句亂起云云一句猶如空華者喻佛世界影現覺中本無生滅常恒寂滅此句舉喻亂起亂滅者喻諸佛世界隱現不定無實緣生無實緣滅不即不離者喻諸佛世界常起無所即常滅無所離無縛無脫者喻諸佛世界不即一切法常無於縛不離一切法常無於脫此句明喻合文上科共成世界量滅科竟二眾生惑淨開二一因淨始知眾生本來成佛當文一句因淨始知者由照徧諸佛世界如空華之起滅實無起滅以始其知此始知即是始覺眾生本來成佛者但是不得眾生相即是本來成佛非外有佛為本來成此本來成即是本覺葢迷本覺有不覺時以妄立世界交織成眾生故今始本合覺時以照徧世界如空華之無實起滅無諸即離縛脫即無所織妄之眾生得乃成佛於本來永斷無明無因立妄二果淨生死涅槃猶如昨夢當文一句果淨生死者眾生苦集涅槃者諸佛滅道眾生諸佛為因生死涅槃為果猶如昨夢者生死以無明發揮涅槃以無明斷證發揮無明如夢斷證無明如醒然在夢斯醒已醒則不更醒故今知於眾生之本來成佛則是常醒未夢何得有於生死涅槃故如昨夢以見今之永無也合文上科共成眾生惑淨科竟前合世界量滅科攝屬在所無二科竟連合在能無二科管於彰顯無修科竟接合標指無修科該在得本無修科竟二達本無證開二一證法本無開二一果法本無善男子如昨夢故當知生死及與涅槃無起無滅無來無去當文三句果法本無善男子一句如昨夢故一句當知云云一句如昨夢故者指夢令知此句推明當知云云者夢人夢事在夢非有醒得本無何有非有之生死而有起者滅者本無之涅槃而有來者去者此句彰果二因法本無其所證者無得無失無取無捨其能證者無作無止無任無滅當文二句因法本無其所云云一句其能云云一句其所證者在證之法無得云云者非有得於涅槃以失生死非有取於涅槃以捨生死為所證法其能證者在證之行無作云云者非有作以取涅槃止以捨生死非有任以得涅槃滅以失生死為能證心此在當科云因者以得失等從能所分能所是因法上科云果者以起滅等從生死涅槃立生死涅槃是果法二合科文共成證法本無科竟二如法無證於此證中無能無所畢竟無證亦無證者當文三句如法無證於此云云一句畢竟無證一句亦無證者一句於此證者證此之無證法中者該指無證法之全體無能者心能之本無無所者法所之本無乃直根證中中字說出此句疊前所標指之證法本無顯出無證之旨畢竟無證承上句說下葢有能所則有於證能所俱盡於何有證故畢竟無此句無法亦無證者承畢竟句說下葢有於證法則立取證心為之證者既證法之畢竟無於何立取證心有其證者故乃亦無此句無我前合證法本無科共成達本無證科竟連合得本無修科攝屬成果修證科竟二全開覺心一切法性平等不壞當文一句全開覺心一切法性者如法界量若依若正四大根塵諸所有法無生滅性平等不壞者法法徧滿法法常住此句正所謂山河並大地全露法王身者葢在上文之得無修達無證是乃無明究竟永斷是乃覺心究竟成就故得有此標指方彰無修無證之非同於斷滅前合成果修證科共成成果覺心科竟連合成因覺行科攝屬於覺成就科竟接合於覺圓明科管於顯覺開悟科竟綸合證滅開悟科該在離幻開悟科竟貫合離幻方便科統歸方便開悟科竟答所請說之方便開悟也并合修行成就科入總示教能修科竟二示益方便善男子彼諸菩薩如是修行如是漸次如是思惟如是住持如是方便如是開悟求如是法亦不迷悶當文九句示益方便善男子一句彼諸菩薩一句六如是六句求如云云一句六如是句者如於離幻以修行乃至離幻以開悟也求如是法者求於離幻修行開悟之徧滿覺性法亦不迷悶者得正方便思惟有其修行開悟成就於平等覺性也此以順覺因行全覺為修因果一致無別作之方便漸次故即所修行開悟即乃是法非修之外更別有證故一以如是決之前合示教能修科共成長行列示科竟二重頌總挈開二一序欲重宣爾時世尊欲重宣此義而說偈言句釋例前二述說偈言開二一挈旨示教能修開二一挈旨修行成就普眼汝當知一切諸眾生身心皆如幻身相屬四大心性歸六塵四大體各離誰為和合者如是漸修行一切悉清淨二挈旨方便開悟不動徧法界無作止任滅亦無能證者一切佛世界猶如虗空華三世悉平等畢竟無來去二挈旨示益方便初發心菩薩及末世眾生欲求入佛道應如是修習重頌文竟前合長行共成序述世尊垂答科竟連合序述菩薩興問科攝屬示法離幻科竟言示法者以菩薩問意在得正思惟之正方便以得乃覺心住持世尊答教恒念身心求於四大本各離相積聚緣氣歸散滅相無於身心得乃離幻方便成就覺心開悟末世眾生以能修於如來因行故云示法接合決疑離幻科入總離幻絕妄科竟清淨虗空覺所顯發圖當經圓覺目曰大方廣彰顯大方廣之覺體相用則在當章覺圓明故至盡於虗空圓裹三世此段經文是所謂覺顯發之無邊虗空無方清淨者也清淨無方用之廣也虗空無邊相之方也方者虗空平等不動之謂也皆覺所顯發體之大也是一切眾生所皆證而當前具足者也昧者因經列二十五有之清淨十力四無所畏等陀羅尼門之清淨實相性一身多身一界多界之清淨沒承當處遂高推聖境絕己分外未思如百千燈光照一室經喻具在何不取而自領燈光如身室空如界一燈光顯一室空千燈光顯千室空無億千燈光顯無億千室空若止一室空無千室空無億千室空則一室不能容千燈光與無億千燈光矣一身一界多身多界意義如斯秪此物無他物大方廣圓覺己分外物哉惟在當人識取所謂燈光耳是燈光也是諸佛之陀羅尼門是眾生之二十五有然有之清淨即門之清淨非生佛有二法也總一實相也總一身也總一界也多身多界皆不出乎此也眾生不得有之清淨故失門之清淨及實相身界之清淨然眾生分中所有色心諸法情器依正二十五有該盡矣得清淨焉是所謂滿照室之燈光也是人人可領取之圓覺大方廣也因搆為圖助證圓覺在經列次凡用極於四大今不取大並陀羅尼門而取有者大偏相分有兼性相且大即六塵總分無別大體已屬有家故有包盡凡用足舉並陀羅尼門之包盡聖用智者詳諸若在圖所書字樣則全彰當段經文覺者覺圓明也心識者心清淨識清淨也見根識色等者見清淨眼根清淨眼識清淨色塵清淨等也地水火風者四大清淨也有者二十五有也處界不具者攝有中也門者陀羅尼門也力等不具者攝門中也此以四大前之諸清淨經文俱列顯故備書後之諸清淨經文屬總顯故容攝相性者實相性也身者一多身也界者一多界也身界無異一多故不具列一多空者虗空圓裹也在書字有橫豎者豎彰列次橫顯總詳有內外向者心法外向色法內向本見相二分對待之義門有頂接者凡聖無殊用性相頂接者性相同一法然相對有性對門者微彰聖用全性凡用全相無殊用中之殊用也果能凡聖同用斯性相圓明入實相性之清淨也是作圖之從因也願觀者毋忽
