body:
  text: 罽賓沙門佛陀多羅譯震旦沙門弘麗羅峯著神州沙門弘贊在犙較二行斷絕妄清淨開二一離幻絕妄開二一決疑離幻開二一序述菩薩興問開四一序問躡次於是此序顯普賢菩薩從如來因行成於順覺悲念眾生迷無執有不能俱遣有無不得順覺無以修習如來因行有所興問希佛教益令不迷無乃不執有知所離幻成於順覺修習二序問周三開二一序述儀音開二一序問威儀普賢菩薩在大眾中即從座起頂禮佛足右遶三匝長跪叉手而白佛言句釋準前二述請教益開二一請教所修開二一正問離幻大悲世尊願為此會諸菩薩眾及為末世一切眾生修大乘者聞此圓覺清淨境界云何修行當文三句正問離幻大悲世尊一句願為云云一句聞此云云一句例釋準前圓覺清淨境界者有無圓離徧滿住持十方隨順如虗空性常不動搖無於起滅知見云何修行者請決圓離有無得於隨順修習此句直問所修二反彰離幻開二初幻滅難開二一設難同幻世尊若彼眾生知如幻者身心亦幻云何以幻還修於幻當文三句設難同幻世尊一句若彼云云一句云何云云一句若彼眾生者若擬辭知如幻者者字即人字言知如幻之人如幻指所緣境身心亦幻者言知幻人之身心亦塵緣影像無有實性此句指身心同幻云何者疑問之辭以幻者以幻身心為能修性還修於幻者遠離如幻之妄境此句彰疑幻不能離幻伏請世尊開示離幻妄之身心以成離幻二設難同滅若諸幻性一切盡滅則無有心誰為修行云何復說修行如幻當文二句設難同滅若諸云云一句云何云云一句若諸幻性者該指自他依正一切盡滅者幻性虗妄非常住法則無有心者如幻之心應同幻滅誰為修行者心為能修既無於心更誰為於修行此句彰滅無修云何復說修行如幻者說修行如幻則有於修行此之修行更屬誰為此句彰修非滅伏請世尊開示諸幻盡滅覺心不動為所修法合文上科共成初難幻滅科竟次迷修難若諸眾生本不修行於生死中常居幻化曾不了知如幻境界令妄想心云何解脫當文二句次迷修難若諸云云一句曾不云云一句本不修行者本由也由於迷妄不務遠離諸幻境界常居幻化者輪轉因果虗妄生滅此句生死所由曾不了知者無所從有其了知此以了知原始於心既幻滅無心即無所原始得曾有其了知如幻境界者能所緣境令妄想心者能所緣心云何解脫者了知幻妄則除攀緣無所分別息心達本得乃解脫既無了境幻妄之知則逐境生心益滋妄想何能息滅有其解脫出所輪迴此句解脫無因伏請世尊開示離諸身心之得無所離即除諸幻前合初難幻滅科共成反彰離幻科竟在初疑難同幻非所修同滅無所修次疑難同輪由迷幻以極彰顯諸幻妄法定非在所修習者伏請世尊開示離幻為順覺方便順覺乃因地法行是所修法連合正問離幻科攝屬請教所修科竟二請益得離願為末世一切眾生作何方便漸次修習令諸眾生永離諸幻當文二句請益得離願為云云一句令諸云云一句作何方便者教之以修何法成就離幻方便漸次修習者離於所離離乃能離緣塵幻垢增進清淨此句請有開示永離諸幻者不迷所修隨順淨覺得乃無離此句結益得離前合請教所修科共成述請教益科竟連合序問威儀科攝屬序述儀音科竟二序結終始作是語已五體投地如是三請終而復始句釋例前前合序述儀音科共成序問周三科竟連合序問躡次科入總序述菩薩興問科竟二序述世尊垂答開二一長行例示開二初序讚許開二一讚請教益開二一讚請所修爾時世尊告普賢菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生修習菩薩如幻三昧方便漸次當文三句讚請所修通列二句汝等云云一句如幻三昧者知一切法如幻體性則不迷輪得正住持二讚益得離令諸眾生得離諸幻當文一句讚益得離合文上科共成讚請教益科竟二許答囑受開二一囑令諦聽汝今諦聽當為汝說句釋例前二受教默然時普賢菩薩奉教歡喜及諸大眾默然而聽句釋例前合文上科共成許答囑受科竟前合讚請教益科共成初序讚許科竟次述正答開二一示教所修開二一幻滅覺顯開二一示幻生滅開二一幻生因覺開二初標善男子一切眾生種種幻化皆生如來圓覺妙心當文二句初標善男子一句一切云云一句皆生如來云云者示幻生所因顯幻滅所還令不疑幻滅無心迷於修習次喻猶如空華從空而有當文一句次喻空華雖從空有然無裂空之空華喻明幻化雖依覺生無有動覺之幻化合文上科共成幻生因覺科竟二幻滅還覺開二一即喻顯空幻華雖滅空性不壞當文一句即喻顯空空性不壞者無有隨空華滅之虗空二合喻彰覺眾生幻心還依幻滅諸幻盡滅覺心不動當文二句合喻彰覺眾生云云一句諸幻云云一句還依幻滅者境生心生境滅心滅一切心生由境幻生一切心滅由境幻滅非別有依何別有滅此句合明上喻空華滅句覺心不動者諸幻生非動覺生諸幻滅無動覺滅此句合明上喻空性不壞句以決幻性盡滅無心修行之疑合文上科共成幻滅還覺科竟前合幻生因覺科攝屬示幻生滅科竟二示覺隱顯開二一示覺由隱開二一隱成依幻依幻說覺亦名為幻當文一句隱成依幻依幻說覺者本幻影之身心生滅有無說於覺性有無亦名為幻者所說之覺總屬妄覺生滅知見故乃隨相生滅乍有乍無不得名覺總名為幻二釋明依幻若說有覺猶未離幻說無覺者亦復如是當文二句釋明依幻若說云云一句說無云云一句若說有覺者本幻現之身心說有覺知心性猶未離幻者身心幻垢總出無明妄計今執身心說有覺性豈不還依無明此句有幻說無覺者本幻滅之身心說無覺知心性亦復如是者如說有覺之未離幻葢身心既屬無明身心滅但是無明滅何關於覺今乃於身心滅說無於覺豈不迷無明以當覺性此則即是無明故未離幻此句無幻合文上科共成示覺由隱科竟二示覺緣顯是故幻滅名為不動當文一句示覺緣顯是故者依幻說覺未得離幻之故幻滅者於幻無依身心寂滅忘諸能所離於言說名為不動者能所清淨言語道斷即是實相住持前合示覺由隱科共成示覺隱顯科竟連合示幻生滅科攝屬幻滅覺顯科竟答所請問之云何修行於圓覺境界者二離幻除幻開二一標指應離開二一應離妄境善男子一切菩薩及末世眾生應當遠離一切幻化虗妄境界當文二句應離妄境善男子一句一切云云一句應當遠離者應宜也決示修習在於離幻一切幻化云云者該指自他依正所有色法二本離妄心開二一推本全一由堅執持遠離心故當文一句推本全一由者本也堅者八識堅住不變體性執持者八識含藏種子受熏名目遠離心者七識不緣外境無始時來唯執八識體性為我故者與由字義相呼應推明得遠離幻由於八七全一冥用不行以故六識無依不起分別隨順圓照遠離虗妄二詳次離用開二一離能幻用開二一離六分別心如幻者亦復遠離當文一句離六分別心如幻者六用意識分別妄心亦復遠離者六識逐境緣生既知境性虗妄斷攀緣想末那歸於種位即除對境分別六識用冥故乃遠離二離七執我遠離為幻亦復遠離當文一句離七執我遠離為幻者七為六依六離緣染依七執內自我緣念真如成性故七識即屬遠離心然七識所內執我屬八見分無自體性故名為幻亦復遠離者七緣六八為相六離緣染無於幻相七離外種半分末那內種半分末那所有執心亦漸虗明故乃遠離合文上科共成離能幻用科竟二離所幻用開二一離八妄性離遠離幻亦復遠離當文一句離八妄性離遠離幻者言離於遠離之幻以八識妄性屬根本無明非同七識依他又性唯無覆心具徧行於善惡染淨因緣平等無違拒非同七識不緣外境一類執八識見分為內自我又八識同五現量不同七識非量種種各別故與遠離七識異住為離幻者八識妄性迷心相有心相清淨迷有為妄無體依住安立相分故云幻亦復遠離者所妄生於八識能妄由七強執無七強執八即無於轉現相智相續相無所資熏滋妄種性故乃遠離二離性清淨得無所離即除諸幻當文一句離性清淨得無所離者斷本無明住自覺性照境不二即除諸幻者無二能所見相冥寂顯發清淨得無離性合文上科共成離所幻用科竟前合離能幻用科攝屬詳次離用科竟以識乃有為性屬生滅法故云用連合推本全一科管於本離妄心科竟接合應離妄境科該在標指應離科竟二喻顯得離開二初喻譬如鑽火兩木相因火出木盡灰飛烟滅當文二句初喻譬如鑽火一句兩木云云一句初句立喻次詳喻鑽火喻應離幻境兩木相因喻八七冥一火出喻離六分別木盡喻離七我執灰飛喻離八妄性烟滅喻離性清淨此中喻意漸次法因火從木出猶六依七根故火喻六木喻七灰雖木燼成本土質猶七冥性歸種八識故灰喻八烟本火出猶諸幻以分別見生故烟喻諸幻然常情法必烟先滅後乃灰飛今言灰飛烟滅者以灰存即土留礙有土留礙則木依根有木依根即火存熾有火存熾烟何得滅故必灰飛始得烟滅方足喻當離性清淨以離性清淨者離於離性則乃清淨離性是灰飛義清淨是烟滅義後合以幻修幻亦復如是諸幻雖盡不入斷滅當文二句後合以幻云云一句諸幻云云一句以幻合喻兩木相因修幻及亦復如是合喻火出木盡灰飛烟滅此句合明諸幻雖盡云云此句結顯以離幻除幻得乃淨覺常住故不入於斷滅葢堅執持遠離心是以幻離諸妄境妄心是修幻合文上科共成喻顯得離科竟前合標指應離科攝屬離幻除幻科竟答所請問云何以幻之諸疑難者連合幻滅覺顯科管於示教所修科竟二示益得離善男子知幻即離不作方便離幻即覺亦無漸次一切菩薩及末世眾生依此修行如是乃能永離諸幻當文四句示益得離善男子一句知幻云云一句離幻云云一句一切云云一句知幻即離者幻體無明知性覺照不相對立不作方便者決定知即決定離若有未離還由未知葢以幻從無明立知破無明性幻無依立故乃即離無功用行不別有其方便此句決之務知於幻以離於幻不須外覓方便答請作何方便之問離幻即覺者幻無體性迷覺建立不迷於覺斯離於幻既離於幻原住自覺何不即覺亦無漸次者全幻全覺無二住地彼離此即不異境界故乃即離即即無於漸次若未即覺還未離幻此句決之務離於幻以即於覺不須外覓漸次修習答請漸次修習之問依此者依於離知即覺之為修行如是者得能離知即覺以為修行乃能云云者則能離幻清淨得入正覺平等住持此句決修離幻前合示教所修科入總長行列示科竟二重頌總挈開二一序欲重宣爾時世尊欲重宣此義而說偈言例釋準前二述說偈言開二一挈旨所修開二一挈旨幻滅覺顯開二一挈旨幻生因覺普賢汝當知一切諸眾生無始幻無明皆從諸如來圓覺心建立猶如虗空華依空而有相二挈旨幻滅還覺空華若復滅虗空本不動幻從諸覺生幻滅覺圓滿覺心不動故二挈旨離幻除幻開二一挈旨標指應離若彼諸菩薩及末世眾生常應遠離幻諸幻悉皆離二挈旨喻顯得離如木中生火木盡火還滅二挈旨得離覺即無漸次方便亦如是方便亦如是者離即無方便也重頌文竟前合長行共成序述世尊垂答科竟連合序述菩薩興問科攝屬決疑離幻科竟言決疑者以菩薩問意在請決圓覺境界云何修行於幻垢身心申所疑難見諸幻妄非所修所世尊答教幻滅覺顯乃為決所修行二示法離幻開二一序述菩薩興問開二一序問躡次於是此序顯普眼菩薩從順覺因行有所修行在於離幻之得無所離悲念眾生無明癡暗無能知於離幻有其得無所離之即除諸幻乃為興問希佛教益令正思惟成就修行悟入圓覺二序問周三開二一序述儀音開二一序問威儀普眼菩薩在大眾中即從座起頂禮佛足右遶三匝長跪叉手而白佛言句釋例前二述請教益開二一請教能修開二一請思惟修大悲世尊願為此會諸菩薩眾及為末世一切眾生演說菩薩修行漸次云何思惟云何住持當文五句請思惟修大悲世尊一句願為云云一句演說云云一句云何思惟一句云何住持一句菩薩修行者離幻修習漸次者離幻始終此句總問云何思惟者分別離幻葢不得所分別了達於幻無以離幻此句承佛開示知幻即離知字興問云何住持者覺徧滿相葢不曉了覺徧滿相何能知於諸幻盡滅成就覺顯此句承佛開示離幻即覺覺字興問以有離之知斯有即之覺乃佛教菩薩之所依以修行者眾生恐有未知故又為於別問二請開悟修眾生未悟作何方便普令開悟當文一句請開悟修眾生未悟者未悟乃離幻思惟以即於覺作何方便者即請教示云何思惟普令開悟者得所即覺住持合文上科共成請教能修科竟二請益方便開二前述迷失世尊若彼眾生無正方便及正思惟聞佛如來說此三昧心生迷悶即於圓覺不能悟入當文四句前述迷失世尊一句若彼云云一句聞佛云云一句即於云云一句無正方便者無於離幻之離無正思惟者失乃離幻之覺此句述生前迷說此三昧者不動覺心心生迷悶者迷無離幻之知悶乃事理遮障此句述生中迷不能悟入者覺心不成開顯此句述生後迷所以如此前迷者欲得佛示正方便思惟簡別妄知邪思故以知性思心屬虗妄體相非淨覺實性用之修習在如鑽火因木期於火出木盡若其不知本取木盡收功永離諸幻則是以生滅因求不生滅果無有是處普眼菩薩深恐眾生迷悶於此失能修方便故為請益次請悲誨願興慈悲為我等輩及末世眾生假說方便當文二句次請悲誨願興慈悲一句為我云云一句願興慈悲者如來大悲原以眾生迷覺故今於生迷覺請佛興慈運悲此句求哀生迷假說方便者知性思心究如木盡今但因之離幻如但因木生火非執木為究竟法故云假說此句請有教益合文上科共成請益方便科竟前合請教能修科攝屬述請教益科竟連合序問威儀科管於序述儀音科竟二序結終始作是語已五體投地如是三請終而復始句釋例前前合序述儀音科共成序問周三科竟連合序問躡次科入總序述菩薩興問科竟二序述世尊垂答開二一長行列示開二初序讚許開二一讚請教益開二一讚教能修爾時世尊告普眼菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生問於如來修行漸次思惟住持當文四句讚教能修通例二句汝等云云一句思惟住持一句餘釋準前二讚益方便乃至假說種種方便當文一句讚益方便乃至者相因而至之辭以請教意本在得正思惟以得正住持恐眾生不能開悟於正思惟失正住持故兼請說方便是以如此加讚種種方便者說身心幻垢及說離諸幻垢開示非一合文上科共成讚請教益科竟二許答囑受開二一囑令諦聽汝今諦聽當為汝說句釋例前二受教默然時普眼菩薩奉教歡喜及諸大眾默然而聽句釋例前合文上科共成許答囑受科竟前合讚請教益科攝屬初序讚許科竟次述正答開二一示教能修開二一修行成就開二一標果求覺善男子彼新學菩薩及末世眾生欲求如來淨圓覺心當文二句標果求覺善男子一句彼新云云一句指新學菩薩者以請教意在云何思惟乃能得正住持是為初學菩薩興問故此標指欲求如來淨圓覺心者求本性覺不慕差別果證二示因離幻開二一修行漸次開二一離幻修行應當正念遠離諸幻當文一句離幻修行應當正念者中正其念不邪依倚前章之堅執持遠離心是為正念葢七八識心冥用全一斯能不隨境生心逐物遷轉中中流入有其正念遠離諸幻者幻境幻心一切遠離此該行因終始故標修行二離幻漸次先依如來奢摩他行堅持禁戒安處徒眾宴坐靜室當文三句離幻漸次先依云云一句安處徒眾一句宴坐靜室一句先依者修行本始奢摩他者梵語此翻止即定之初名是寂靜義能令三業諸惡煩惱成寂靜故故下文釋云至靜為行乃教先依此行次持戒以固之然定有大小邪正故標如來以別之若不依定持戒則不能為圓覺方便又即此能成定共戒故堅持禁戒者身口無犯是乃先心而後身口令三業俱寂而入定住此句離動相之漸次安處徒眾者各教靜攝不相對偶無於繫屬此句離人相之漸次宴坐靜室者不煩起作遠闠閙場令逸忘身此句離我相之漸次皆乃息緣攝身得以攝心除於事障漸伏理障得以遠離諸幻修佛菩提之所必先依者故云漸次合文上科共成修行漸次科竟二思惟住持開二一離幻思惟開二一思惟無身開二一諦審合離開二一審執和合恒作是念我今此身四大和合當文一句審執和合恒作是念者諦審諦思無乍忘時我今此身者指自身相四大和合者指自身相所依立處云大者地水火風四各周徧云和合者己身若唯地大無水大者如乾灰無團聚理若唯水大無地大者如濕油水無堅實性若唯地水無火大者如陰處肉團每自爛壞若惟地水火無風大者宜不增長無所動搖今皆不爾故見己身於彼四大和合為相然此乃迷妄身所成執處今將破執故先從審二審在各離所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離當文五句審在各離四皆歸四句四大各離一句所謂者審自身分又有其專名定目之所稱謂髮毛等之皆歸於地者以皆具質礙相不可指屬餘大此句地大離立唾涕等之皆歸於水者以皆具流動相不可指屬餘大此句水大離立暖氣歸火者以顯現炙熱相不可指屬餘大此句火大離立動轉歸風者以明見飄搖相不可指屬餘大此句風大離立四大各離者既本自歸何相和合故本各離此句總承上四明決各離得乃現在身相無其和合者於中水火二大云精氣暖氣者以氣有潤濕溫暖二相現二大形故成分指又精之在人身無定屬處男女欲火熏觸百骸暖氣生潤故有精出是精本屬氣分人身暖氣周徧一身遇觸摩處更見熱炙是暖亦屬氣分故云氣然氣本和合有尚見不相和合之大相四大無於和合誠可明決合文上科共成諦審合離科竟二通達虗幻開二一知處體虗今者妄身當在何處即知此身畢竟無體當文二句知處體虗今者云云一句即知云云一句今者妄身現前身相也當在何處者何處安立也此句求身無處語意與我今此身二句意相詳審以素執現前身相於四大和合為所立處今既四大咸各離相無和合處則現前此身成無安立即知者即無安立處知之也此身畢竟無體者有體必有立處既無於處則乃無體畢竟無體者徹底無有之辭也此句知乃體虗二了相同幻和合為相實同幻化當文一句了相同幻和合為相者現前身相實同幻化者雖有實無此以無處則無體無體宜無相今身無於體處有其形相此相何相與諸世間幻化之相以無體處有實為不異是乃了相虗妄得無身見幻垢迷執合文上科共成通達虗幻科竟前合諦審合離科攝屬思惟無身科竟二思惟無心開二一審心緣相四緣假合妄有六根六根四大中外合成妄有緣氣於中積聚似有緣相假名為心當文三句審心緣相四緣云云一句六根云云一句似有云云一句四緣者業識趣生於父母流愛四大精血緣因納想立己身分假合者四大現在各離所成身分和合之相實同幻化妄有六根者根依身立身緣既假根相無真此句審根生緣六根四大者指勝義浮塵二根中者勝義根乃明暗動靜妄塵所發居中之見聞覺知外者浮塵根乃蒲萄朵新卷葉之四大相合成者有於四大浮塵根與映聲映色之勝義根中外相依乃流逸攬塵具六根相用妄有緣氣者根門中外所吸之塵影鼓發之見聞覺知於中積聚者攬根門塵影知見成立緣慮意根於身內肉團空處及五門根中此句審識生緣似有緣相者有積聚之意根乃發分別之意識意根屬能緣相然此緣相本根門緣塵影氣包攬成立幻化同相非是實有但似有耳假名為心者緣慮意根乃迷情所妄認為心性者既相似有名亦假設無一真實總屬妄緣此句指本根識緣相為心緣相以見虗妄二決心無相善男子此虗妄心若無六塵則不能有四大分解無塵可得於中緣塵各歸散滅畢竟無有緣心可見當文五句決心無相善男子一句此虗云云一句四大云云一句於中云云一句畢竟云云一句此虗妄心者指似有假名之根識心若無六塵則不能有者意識分別全緣境有無塵發知即無於中所積聚之妄緣氣不得其似有之緣相立假名心此句發明無塵無心四大分解者現在相離本無和合無塵可得者無四大和合即無於能吸攬之根何有所吸攬之塵此句推明無能無塵於中緣塵者即於中積聚之緣氣各歸散滅者緣塵本迷根大吸攬妄有今審大解無根吸塵無於積聚還本各歸成於散滅此句推明無所無塵畢竟無有緣心可見者依似有相立假名心離似有之緣相更別不得所有之緣心故云畢竟無此句決明無塵無心合文上科共成思惟無心科竟前合思惟無身科攝屬離幻思惟科竟二離幻住持開二一示滅無滅善男子彼之眾生幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不滅當文五句示滅無滅善男子一句彼之云云一句幻心云云一句幻塵云云一句幻滅云云一句彼之眾生者指思惟無身心相之眾生幻身滅故者即於四大各離知身無體幻心亦滅者即緣塵散滅無心可見此句能緣幻心無所依寄幻塵亦滅者即無塵可得此句所緣幻色一路涅槃幻滅亦滅者無明惑破此句能所空華得無起滅非幻不滅者實相住持此句不動覺心清淨當前句中凡四故字俱屬推本三亦字一不字俱屬因致本此滅得此滅本此滅得此不滅也心塵幻滅之滅得於身心塵之滅者眾生分中心居身內境因心生所立照亡原相因迷惑者故今得相因開解非幻之不滅得於幻滅者最初不覺迷真非幻成幻無明無幻無明即本非幻二喻滅無滅開二一喻顯譬如磨鏡垢盡明現當文一句喻顯磨喻離幻鏡喻圓覺垢盡喻諸幻滅明現喻非幻不滅葢自性大圓鏡智常照法界隱於塵不失於塵故幻滅不滅是磨垢盡鏡光明現之義二合明善男子當知身心皆為幻垢垢相永滅十方清淨當文三句合明善男子一句當知云云一句垢相云云一句當知者應以磨鏡去垢之義知所為垢而磨滅之身心皆為幻垢者晦空暗色雜諸妄想有身心相此句示知在磨之垢垢相永滅者身心相滅斷本無明十方清淨者實相開顯平等住持此句示知所現之明葢不知身心為垢相則不知磨鏡盡垢於何盡之有其明現若其磨垢不盡而鏡明現無有是處合文上科共成喻滅無滅科竟前合示滅無滅科攝屬離幻住持科竟連合離幻思惟科管於思惟住持科竟接合修行漸次科該在示因離幻科竟綸合標果求覺科統歸修行成就科竟答所請說菩薩修行漸次思惟住持之旨二方便開悟開二一離幻方便開二一示令知幻開二一責愚迷幻開二一標顯愚迷開二初喻顯開二一喻本淨覺善男子譬如清淨摩尼寶珠映於五色隨方各現當文二句喻本淨覺善男子一句譬如云云一句清淨稱珠自相取譬覺相摩尼梵語此翻離垢稱珠自性取譬覺性映色隨現稱珠圓用取譬覺用五色