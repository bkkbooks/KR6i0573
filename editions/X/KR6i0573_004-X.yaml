body:
  text: 罽賓沙門佛陀多羅譯震旦沙門弘麗羅峯著神州沙門弘贊在犙較二顯覺絕妄開二一決疑顯覺開二一序述菩薩興問開二一序問躡次於是此序顯金剛藏菩薩從離幻開悟之始知本來成佛乃本覺開顯悲念眾生失乃本覺以有不覺然不覺非外有即迷本覺有能於本覺無有疑悔即無不覺有所興問希佛教益究竟顯覺以決生疑得住覺境二序問周三開二一序述儀音開二一序問威儀金剛藏菩薩在大眾中即從座起頂禮佛足右遶三匝長跪叉手而白佛言句釋例前二述請教益開二一慶聞現益開二一讚發生蒙大悲世尊善為一切諸菩薩眾宣揚如來圓覺清淨大陀羅尼因地法行漸次方便與諸眾生開發蒙昧當文三句讚發生蒙大悲世尊一句善為云云一句與諸云云一句次句通讚世尊所答文殊普賢普眼三章教理與諸眾生者垂教菩薩如來因行漸次方便本以遺範末世眾生開發蒙昧者聞淨覺隨順之因地法行則不蒙於因果一覺得無計妄能所墮諸邪見之昧聞諸幻盡滅之覺心不動則不蒙於順覺修習得無執幻身心空華妄相之昧聞思惟住持之離幻方便則不蒙於能修成就得無迷悶不入圓覺之昧此句端本所興疑問專為本妙覺心未成開顯之蒙昧眾生故前讚佛宣揚本以開生蒙昧今彼眾生於本覺心仍有未斷之疑還乞究竟開顯二簡現慧淨在會法眾承佛慈誨幻瞖朗然慧目清淨當文一句簡現慧淨在會法眾者同住法會眾幻瞖朗然者了達無明空華影滅慧目清淨者瞖除華滅圓覺開顯此以在會法眾皆入住三昧已永伏斷無明於本成佛覺幻瞖清淨寄簡所申疑問專為未出輪迴末世眾生除疑生信合上科文共成慶聞現益科竟二申請後益開二一陳疑本覺開二初疑妄有世尊若諸眾生本來成佛何故復有一切無明當文三句初疑妄有世尊一句若諸云云一句何故云云一句若諸句擬是何故句疑非猶云眾生若本佛即當無無明今諸眾生有其無明此則何故何故者何所由故此本成佛之眾生又為有無明之眾生此一疑問即是疑於本成佛覺但迷真原以執妄故先從妄興疑二轉疑真成若諸無明眾生本有何因緣故如來復說本來成佛當文二句轉疑真成若諸云云一句何因云云一句若諸句擬是何因句疑非猶云無明若無故起即屬本有本有無明之眾生即非本成佛之眾生此則何因緣故如來得說本來成佛求因緣故說本成佛即疑非本成佛矣此一疑問從疑妄有之所轉出者三竟疑終始十方異生本成佛道後起無明一切如來何時復生一切煩惱當文二句竟疑終始十方云云一句一切云云一句十方異生者一切眾生於無同異中熾然成異而生又諸眾生有胎卵濕化四生之異本成佛道者指佛顯說後起無明者據生現有此句疑真有終一切如來者以當生之本成佛道何時云云者以當生之後起無明此句求妄所始葢以生無無故有之無明如來無妄說之本成佛必生本成佛道如來乃得顯說無明有於後起眾生乃有煩惱此則眾生本成之佛即是今之一切如來本成之佛有後起之無明一切如來豈無復生之煩惱此一疑問從上二疑妄有真成俱難取決故乃求於終始以成兩立究本疑端則總由蒙昧本覺展轉妄度有期三惑合文妄有真成二科共成陳疑本覺科竟二請益斷疑惟願不捨無遮大慈為諸菩薩開祕密藏及為末世一切眾生得聞如是修多羅教了義法門永斷疑悔當文二句請益斷疑惟願云云一句為諸云云一句惟願者乞願於佛也不捨云云者世尊顯說眾生本來成佛圓同引住平等法會乃無遮大慈故今更請不捨此之大慈此句請佛許說開祕密藏者本成佛覺圓滿淨性法法住持為藏無壞無雜為祕密除疑生信為開如是者指所開顯之本成佛覺修多羅云云釋準前永斷疑悔者決了真妄有無終始圓明本覺淨信此句請斷所疑前合陳疑本覺科共成申請後益科竟連合慶聞現益科攝屬述請教益科竟接合序問威儀科管於序述儀音科竟二序結終始作是語已五體投地如是三請終而復始句釋例前前合序問儀音科共成序問周三科竟連合序問躡次科入總序述菩薩興問科竟二序述世尊垂答開二一長行列示開二初序讚許開二一讚請教益開二一讚教本覺爾時世尊告金剛藏菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生問於如來甚深祕密究竟方便是諸菩薩最上教誨了義大乘當文四句讚教本覺通例二句汝等云云一句是諸云云一句甚深祕密者本成佛覺無起滅性究竟方便者達妄無始知真圓常此句讚所陳疑請教最上教誨者圓明淨覺生佛平等了義大乘者成就覺心得無修證此句讚所請教彰益二讚益斷疑能使十方修學菩薩及諸末世一切眾生得決定信永斷疑悔當文二句讚益斷疑能使云云一句永斷疑悔一句能使十方云云者真妄惑破淨信斯成乃修學之通門得決定信者開悟成就信本成佛此句悟真永斷疑悔者永斷無明不迷悶覺此句除惑合文上科共成讚請教益科竟二許答囑受開二一囑令諦聽汝今諦聽當為汝說句釋例前二受教默然時金剛藏菩薩奉教歡喜及諸大眾默然而聽句釋例前合文上科共成許答囑受科竟前合讚請教益科攝屬初序讚許科竟次述正答開二一示教本覺開二一彰迷生惑開二一迷輪失覺開二一迷輪性相開二一列示開二一一切輪相善男子一切世界始終生滅前後有無聚散起止當文二句一切輪相善男子一句一切云云一句一切世界者該指情器始終者分段相生滅者壽命相前後者時位相有無者隱顯相聚散者離合相起止者作息相此十二相凡諸妄法一切皆有非見始終即見生滅非見生滅即見前後非見前後即見有無非見有無即見聚散非見聚散即見起止非見起止即見始終輪迴顯現曾無脫離此以在疑妄有真成始終三惑同此十二為相故全標指令見迷妄輪迴未可以辨圓覺二一切輪性念念相續循環往復種種取捨當文一句一切輪性念念者體性不常相續者前念未滅後念續生循環往復者攀緣無定種種取捨者愛憎立別是乃輪迴心之生住異滅性初四字生性中四字住性後四字異滅性有此之輪迴性斯有前之輪迴相前屬所相此屬能性眾生輪迴總屬此性成立即所在生之三惑亦乃取捨心未忘故爾辨於真妄有無成就終始合文上科共成列示科竟二總指皆是輪迴當文一句總指皆是者通指上文所相所性諸法皆輪迴法令見在問所惑未出輪迴前合列云科共成迷輪性相科竟二失覺法喻開二一法說未出輪迴而辨圓覺彼圓覺性即同流轉若免輪迴無有是處當文三句法說未出云云一句彼圓云云一句若免云云一句未出輪迴者指在問之妄有真成始終未離諸上性相而辨圓覺者求本成佛覺此句迷妄求真彼圓覺性者迷輪之人之本成佛性即同流轉者不得開悟成就平等清淨住持此句迷真作妄若免輪迴者設辭反顯無有是處者本理正破此句不能斷妄葢圓照覺相斯永斷無明若猶在於迷真如何得能破妄惟直同於流轉耳喻如人惑南方作北方惑未破時不見南方唯見北方在見之北方本即是南方今成見為北方是為同於流轉二喻明開二初喻開二一情流轉喻譬如動目能搖湛水又如定眼猶迴轉火當文二句情流轉喻譬如云云一句又如云云一句動目者緣照之目能搖湛水者湛水澄清由目數動如波搖蕩此句能轉彼所定眼者澄見之眼猶迴轉火者猶尚也在定之眼尚猶迴於彼之轉火葢微火環旋本無輪相定眼對之則有赤光成於輪相是乃眼光迴火相續為輪故云猶迴此句能因所轉詳二喻意立在眼目有知見之能情乃情世間正報流轉失圓覺清淨自性住持二器流轉喻雲駛月運舟行岸移亦復如是當文三句器流轉喻雲駛月運一句舟行岸移一句亦復如是一句雲駛者雲奔走之相月運者因雲奔走顯月運行夫日月繞須彌雖亦自有流轉然非妄動之相今雲駛北則見月運南雲駛西則見月流東是乃因雲之運非月自有之運此句所轉彼能舟行岸移者因舟不住見岸遷移此句所因能轉亦復如是者雲駛月運如目搖彼湛水舟行岸移如火迴於定眼此句合前喻意顯見能所詳二喻意立在雲岸無分別之所相乃器世間依報流轉失圓覺清淨自性住持於中月舟當喻能情者月明舟載具能性故合文上科共成初喻科竟次明開二一明喻流轉善男子諸旋未息彼物先住尚不可得當文二句明喻流轉善男子一句諸旋云云一句諸旋未息者有眼目動定雲岸奔移之能所未冥彼物先住者無於水火之搖迴月舟之運行尚不可得者曾未之能得無彼搖迴諸相此句發明隱彰物異覺性平等隨順諸旋又非根本輪迴尚此旋彼轉況覺於一切法平等隨順生死垢心又乃輪迴根本同為流轉足可明決故上下文有尚字何況字相為呼照二明法流轉何況輪轉生死垢心曾未清淨觀佛圓覺而不旋復當文二句明法流轉何況云云一句觀佛云云一句何況者不同彼諸旋妄性之辭生死垢心者根本無明曾未清淨者有於取捨真妄分別此句未出輪迴觀佛圓覺者本成佛覺而不旋復者即同流轉此句免輪無處葢以真妄非對待法故無并立若立有妄即無真成展轉謬亂求於終始實成流轉合文上科共成次明科竟前合初喻科攝屬喻明科竟連合法說科管於失覺法喻科竟接合迷輪性相科該在迷輪失覺科竟二結顯生惑是故汝等便生三惑當文一句結顯生惑是故者以輪迴心旋轉圓覺之故便生者因便從生乃即因緣於輪迴之心有三惑心生三惑者初惑妄有次惑真成三惑始終此葢示知三惑所生本由迷輪失覺令清淨於生死垢心出乃輪迴以入圓覺前合迷輪失覺科共成彰迷生惑科竟二顯覺斷輪開二一詳顯本覺開二一列喻明顯開二一真成無妄開二一喻顯開二一性清淨喻開二一瞖除無起善男子譬如幻瞖妄見空華幻瞖若除不可說言此瞖已滅何時更起一切諸瞖當文四句瞖除無起善男子一句譬如云云一句幻瞖若除一句不可云云一句幻瞖喻妄性空華喻妄相由有幻瞖乃見空華故瞖既除無復更起華相此句推原所起令知所除幻瞖若除者斷妄能性此句正喻不可說言此瞖已滅者此瞖即幻瞖何時更起一切諸瞖者諸瞖即空華華出於瞖之妄見故云諸瞖此句結顯二徵釋無起何以故瞖華二法非相待故當文二句徵釋無起何以故一句瞖華云云一句何以故者以何之故瞖除無華此句徵問瞖華二法者能所性相非相待故者所之華由能之瞖出非各體性相對待立得殊起滅故瞖除無華此句釋明合文上科共成性清淨喻科竟二相清淨喻開二一華滅無起亦如空華滅於空時不可說言虗空何時更起空華當文二句華滅無起亦如云云一句不可云云一句空華喻妄相滅於空時喻達本實相此句正喻不可說言云云者迷本實相乃生妄相既達實相何更有於妄相此句結顯二徵釋無起何以故空本無華非起滅故當文二句徵釋無起何以故一句空本云云一句何以故者以何之故虗空更無華起此句徵問空本無華者華出幻瞖非出虗空非起滅故者有華則有起有滅既本無華何有起滅故達本虗空永無起滅此句釋明合上科文共成相清淨喻科竟前合性清淨喻科攝屬喻顯科竟二合明生死涅槃同於起滅妙覺圓照離於華瞖當文二句合明生死云云一句妙覺云云一句生死者妄有涅槃者真成同於起滅者說妄有說真成總同空華之起滅未是達本實相清淨實相本無於華何有起滅之生死涅槃此句合明相清淨喻妙覺圓照者無所立照亡之妄能性離於華瞖者永斷無明逈絕對待葢由有華瞖乃有起滅離華瞖性何起何滅此句合明性清淨喻前合喻顯科共成真成無妄科竟是乃明顯本成佛覺不可言於妄有亦不可言於真成也二妄淨本真開二一標法開二一指相常住善男子當知虗空非是暫有亦非暫無當文二句指相常住善男子一句當知云云一句當知者令即虗空以成開悟非是暫有者虗空無所始非是暫無者虗空無所終此乃承上無於華相起滅之虗空決令當知二彰性徧滿況復如來圓覺隨順而為虗空平等本性當文一句彰性徧滿況復者尊勝之辭如來者本成佛覺乃果體妙覺圓覺隨順者徧滿十方不二隨順而為虗空平等本性者無方虗空覺所顯發此以無所始終之性徧滿平等難於標指本非暫有無之虗空引況令知合文上科共成標法科竟二示喻開二一喻顯本成善男子如銷金鑛金非銷有既已成金不重為鑛經無窮時金性不壞不應說言本非成就當文五句喻顯本成善男子一句如銷云云一句既已云云一句經無云云一句不應云云一句如銷金鑛者喻離垢幻金非銷有者銷但去鑛現金非銷成金喻佛覺本成此句喻破疑修成覺心既已成金者喻幻滅覺顯不重為鑛者喻永離諸幻此句喻破疑妄起覺心經無窮時者喻無終始金性不壞者喻無變遷此句喻破迷常住覺心不應說言本非成就者不應說以銷去鑛不重為鑛之金非本來成就之金此句喻結顯佛覺本成二合明本成如來圓覺亦復如是當文一句合明本成如來圓覺者本成佛覺亦復如是者如不壞之金性但以銷去鑛非以銷有金不可說言非本成金合文上科共成示喻科竟前合標法科攝屬妄淨本真科竟是乃明顯本成佛覺之不可言於終始也連合真成無妄科管於列喻明顯科竟二極空明顯開二一顯本清淨開二一法我二空開二一法空善男子一切如來妙圓覺心本無菩提及與涅槃當文三句法空善男子一句一切云云一句本無云云一句一切句標覺菩提者道諦涅槃者滅諦此二屬法今彰本無正顯法空二我空亦無成佛及不成佛當文一句我空成佛以菩提涅槃成不成佛以不菩提涅槃不成既菩提涅槃之本無何有以之菩提涅槃不以之菩提涅槃故無成不成之佛有成不成之佛即是因法立我今無成不成之佛則是無法無我合文上科共成法我二空科竟二因果無生無妄輪迴及非輪迴當文一句因果無生妄輪迴者六凡因果非輪迴者四聖因果今皆本無葢以有法有我則有凡聖無法無我何凡何聖凡聖法我之皆無是為清淨前合法我二空科共成顯本清淨科竟二示染迷失開二一斷滅迷失但諸聲聞所圓境界身心語言皆悉斷滅終不能至彼之親證所現涅槃當文三句斷滅迷失但諸云云一句身心云云一句終不云云一句但諸者但凡也言凡諸聲聞乃該指之辭聲聞所圓境界者境界不圓總由所立照亡失圓澄性若無明伏斷一分惑淨即一分界圓二乘人達本人空入空性圓明法中脫分段生死離三界繫縛於諸世間幽清擾動同分生機倐然隳裂為所圓之境界此句乃所證法身心語言云云者二乘破七識行蘊為身滅斷六識分別為心滅此二識乃名言境無實體性斷此二識即離名言計度為語言滅此句乃能證我終不能至云云者指迷本妙圓滿覺心彼之親證者出二乘本有之圓妙覺心此以二乘所證法我未忘猶立能所非本親證在本所有妙覺之無法無我能所俱空斯為親證二乘人證不到此所現涅槃者即寂滅現前以一切皆覺顯發一切皆清淨實相一切皆無生滅性凡在所現皆為涅槃無生無佛俱可無礙隨順彼二乘人躭空休寂以集為苦以滅為樂故終不能至彼之親證所現涅槃此句即下文如來圓覺境界句無有異同乃顯有於修證失無修證之本成佛覺旨趣二執有迷失開二一顯失何況能以有思惟心測度如來圓覺境界當文一句顯失何況云云者顯劣之辭以凡夫所有之思惟心乃輪迴根本苦集諦法二乘遠離此苦集諦乃證斷滅諦尚失於己本成佛覺況以此苦集諦之思惟心分別圓覺如何能得此中思惟心之測度即指在問之妄有真成始終三惑二喻明開二初喻如取螢火燒須彌山終不能著當文一句初喻螢火無焚燒性喻思唯心無實體相須彌梵語此翻妙高妙高山皆四寶所成喻圓覺光嚴住持終不能著者螢火不能燒一切況燒須彌極顯思惟心之無能測度圓覺境界次明以輪迴心生輪迴見入於如來大寂滅海終不能至當文一句次明輪迴心即有思惟心所謂念念相續循環取捨者輪迴見即所求之妄有真成始終三惑入於者以輪迴心見入之也如來大寂滅海者眾生本成佛覺即如來之滅度一切眾生實無一眾生得滅度之究竟覺終不能至者如螢火之不能燒於須彌也合文上科共成喻明科竟前合顯失科攝屬執有迷失科竟連合斷滅迷失科管於示染迷失科竟接合顯本清淨科該在極空明顯科竟極空云者顯本科之法我二空因果無生示染科之空有俱失皆是極圓空覺成於明顯令除三惑更綸合列喻明顯科統歸詳顯本覺科竟二結要斷輪是故我說一切菩薩及末世眾生先斷無始輪迴根本當文一句結要斷輪是故者承上之辭即列喻科之覺離華瞖虗空性之非暫有無極空科之本無法無我無生一切聖凡所執空有俱不能至大寂滅海之故先斷無始輪迴根本者斷所主宰無明之本輪迴心以不起於輪迴見則乃永除三惑成就本覺淨信前合詳顯本覺科共成顯覺斷輪科竟連合彰迷生惑科入總示教本覺科竟二示益斷疑開二一惑果迷因開二一幻無幻果開二先標所因開二一示本幻心善男子有作思惟從有心起皆是六塵妄想緣氣非實心體當文三句示本幻心善男子一句有作云云一句皆是云云一句有作思惟者分別妄識以根塵和合有非無作性從有心起者無明妄性本明照生所一念成立乃有為法此句標指諸輪迴心皆是云云者通指妄心性相不出塵想緣氣塵是照生之所想是所生之能又塵發之知是分別妄識想吸之塵是無明迷有循環往復所有妄心總此二法故云皆是緣氣釋準前非實心體者非無生滅本妙覺心全是緣氣幻影無實體性此句破明諸心幻妄起下喻意二喻成幻因已如空華當文一句喻成幻因此明非實有體之諸妄心已如空華非真因性合文上科共成先標所因科竟次示無果開二一示本違果用此思惟辨於佛境當文一句示本違果思惟全幻佛境全真用幻求真真不成幻是云本違二喻成無果猶如空華復結空果展轉妄想無有是處當文二句喻成無果猶如云云一句展轉云云一句猶如空華者喻用思惟心復結空果者喻辨於佛境此句顯違展轉妄想者空華本妄想生今求結空果更為妄想無有是處者發明無有結於空華之空果此句結明此中喻意是明用思惟心以辨佛境乃迷佛境為虗妄果故求之於空華然幾有結於空華之空果者合文上科共成次示無果科竟前合先標所因科攝屬幻無幻果科竟二幻非真因善男子虗妄浮心多諸巧見不能成就圓覺方便當文二句幻非真因善男子一句虗妄云云一句多諸巧見者展轉妄計不能成就圓覺方便者失乃因心之修習方便此以果從因結不見無果不知迷因故前示無果此決非因前合幻無幻果科共成惑果迷因科竟二斥問顯益如是分別非為正問當文一句斥問顯益如是分別者如是之惑果迷因有所分別非為正問者正問明因顯果成就修習今在所問迷惑因果非可準則以修行者特乃旁助顯益之問然唯有所顯益故前讚善唯屬乃旁助故今斥明前合惑果迷因科共成示益斷疑科竟連合示教本覺科入總長行列示科竟二重頌總挈開二一序欲重宣爾時世尊欲重宣此義而說偈言句釋例前二述說偈言開二一挈旨示教本覺開二一挈旨彰迷生惑金剛藏當知如來寂滅性未曾有終始若以輪迴心思惟即旋復但至輪迴際不能入佛海未曾有終始者決了在問第三疑之真終妄始此疑一決妄有真成之諸疑齊決以迷真終始乃不得常住覺心乃生輪迴妄見長行所示總此教理故頌重挈二挈旨顯覺斷輪譬如銷金鑛金非銷故有雖復本來金終以銷成就一成真金體不復重為鑛生死與涅槃凡夫及諸佛同為空華相二挈旨示益斷疑思惟猶幻化何況詰虗妄若能了此心然後求圓覺了此心了此虗妄心也重頌文竟前合長行共成序述世尊垂答科竟連合序述菩薩興問科入總決疑顯覺科竟言決疑者以妄有真成終始三疑不有明決則循環辨別於本成佛覺轉加迷悶無能伏斷無明開顯本覺今有此章問答則全顯性覺常住無有終始且不可言於真成況復言於妄有知妄無有即乃寂滅身心性相現前常住涅槃如來圓覺境界二示法顯覺開二一序述菩薩興問開二一序問躡次於是此序顯彌勒菩薩從輪迴心見之不能入於如來大寂滅海佛敕先斷輪迴根本乃是令翻不覺有其始覺開顯本覺悲念末世眾生恐未能知究竟斷輪妄性即究竟顯發覺心有所興問希佛教益令普通曉決志斷輪成就始覺二序問周三開二一序述儀音開二一序問威儀彌勒菩薩在大眾中即從座起頂禮佛足右遶三匝長跪叉手而白佛言句釋例前二述請教益開二一慶聞現益大悲世尊廣為菩薩開祕密藏令諸大眾深悟輪迴分別邪正能施末世一切眾生無畏道眼於大涅槃生決定信無復重隨輪轉境界起循環見當文六句慶聞現益大悲世尊一句廣為云云一句令諸云云一句能施云云一句於大云云一句無復云云一句廣為云云者指佛無遮大慈此句慶顯本覺深悟輪迴者通達輪迴性相分別邪正者不迷真妄因果此句慶翻不覺無畏道眼者知於定本成佛此句慶成始覺生決定信者永除真妄三惑此句慶悟淨覺輪轉境界者始終生滅等相循環見者思惟取捨分別此句慶入圓覺二申請後益開二一請教始覺開二一能修成就世尊若諸菩薩及末世眾生欲遊如來大寂滅海云何當斷輪迴根本當文三句能修成就世尊一句若諸云云一句此句標修云何云云一句此句問斷云何當斷者問以何故欲遊覺海當先斷乃輪迴根本此以輪迴根本屬無明不覺欲成始覺必除不覺未除不覺無於始覺恐生未知故為申問令成始覺有所能修二所修差別開二一迷悟法性開二一在迷輪性於諸輪迴有幾種性當文一句在迷輪性於諸輪迴者三界生死幾種性者成業因緣此以三界輪迴差別不一不請開示差別種性即無能知何異何同無以了悟根本輪迴得所當斷有其始覺故為申問二在悟修性修佛菩提幾等差別當文一句在悟修性修佛菩提者即修習覺心幾等差別者開悟之淺深此以斷惑開悟有初中後心之增進不明差別則無能知於究竟不二生佛有其始覺故為申問合文上科共成迷悟法性科竟二教化方便迴入塵勞當設幾種教化方便度諸眾生當文一句教化方便迴入塵勞者隨類現身同事攝化當設幾種云云者迷悟有其差別教化雖復多門然必有所當設之幾種教化方便成於究竟指歸不請開示則無能知何所方便令諸眾生斷乃輪迴根本遊於寂滅大海故為申問前合迷悟法性科共成所修差別科竟此以不迷所修之差別益徹能修之究竟成就始覺故同申問連合能修成就科攝屬請教始覺科竟二請益圓悟惟願不捨救世大悲令諸修行一切菩薩及末世眾生慧目肅清照耀心鏡圓悟如來無上知見當文四句請益圓悟惟願云云一句令諸云云一句慧目云云一句圓悟云云一句惟願不捨云云者輪迴苦果佛所悲救乃開顯本妙覺心成就始覺今更請教始覺故云不捨此句請佛許說慧目肅清者肅恭潔之義乃清明目之無於華瞖亂起滅相照耀心鏡者大圓智鏡平等清淨徧滿虗空眚目對之出生華相失本明耀清明目照則顯發清淨圓光本耀此句請示圓覺普照之寂滅無二成就始覺圓悟如來云云者究竟始覺合本妙覺無二生佛一切知見此句始覺成就有於本覺開顯前合請教始覺科共成申請後益科竟連合慶聞現益科攝屬述請教益科竟接合序問威儀科管於序述儀音科竟二序結終始作是語已五體投地如是三請終而復始句釋例前前合序述儀音科共成序問周三科竟連合序問躡次科入總序述菩薩興問科竟二序述世尊垂答開二一長行列示開二初序讚許開二一讚請教益開二一讚教始覺爾時世尊告彌勒菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生請問如來深奧祕密微妙之義當文三句讚教始覺通例二句汝等云云一句深奧者真妄根源究竟底至窮於思議祕密者真妄性相即離即即唯佛能知微者識邊際性非空非有妙者覺徧滿性即空即有此以始覺之義乃妄盡全真之義是深奧祕密微妙之義故此示讚二讚益圓悟令諸菩薩潔清慧目及令一切末世眾生永斷輪迴心悟實相具無生忍當文三句讚益圓悟令諸云云一句及令云云一句心悟云云一句潔清慧目者潔淨也乃圓照清淨覺相之離於華瞖此句慧朗永斷輪迴者破本無明此句妄淨心悟實相者始覺成就具無生忍者本覺住持此句證覺合文上科共成讚請教益科竟二許答囑受開二一囑令諦聽汝今諦聽當為汝說句釋例前二受教默然時彌勒菩薩奉教歡喜及諸大眾默然而聽句釋例前合文上科共成許答囑受科竟前合讚請教益科攝屬初序讚許科竟次述正答開二一決要斷輪開二一顯輪令斷開二一詳示輪迴開二初列輪妄善男子一切眾生從無始際由有種種恩愛貪欲故有輪迴當文二句初列輪妄善男子一句一切云云一句從無始際者無明初際由有種種者最初無明八識精性迷自心相動念生取立知見性以至六用識精對外六塵迷相生取起攀緣心麤細貪愛難於窮算故云種種恩愛者內心貪欲者外境故有輪迴者挈總輪迴從於愛欲成業故有由有四字緊相呼應明顯示人次明種性開二一彰愛根本若諸世界一切種性卵生胎生濕生化生皆因婬欲而正性命當知輪迴愛為根本當文二句彰愛根本若諸云云一句當知云云一句若諸者比喻令曉之辭世界者一切四生所托處之依報世間一切種性者一切四生立命情識即下所正之性命胎卵濕化四生該盡六道輪迴天及地獄化生鬼通胎化鬼子及地行羅剎胎生餘皆化生人具四生毗舍佉母卵生三十子常人胎生柰女從枯老柰樹中濕處生劫初人化生畜亦四生金翅鳥及龍具四生餘一切獸胎生餘鳥卵生別類濕化而生皆因婬欲者婬謂婬染愛著但是情染總名為婬即在化生亦依業染且約欲界輕重以觀地居交會夜摩相抱兜率執手化樂共笑他化相視四天王天同四洲人餘諸異類卵濕胎形心染氣傳誰離婬欲故以皆因該之而正性命者正字標根本義與下助發助字相映所謂正者乃凡事成具關要因緣主宰居正中立之稱此正字是彰能緣心皆因之婬欲是所緣境葢以一切種類受生稟命莫不三緣和合父母情境己情想同時包裹不先不後乃立身命因果雖有父母情境無己情想納受即不成就因果可見有生性命於父母婬欲時有所居正以立性命者性命指日用明了識性與一期壽命然即三緣和合之妄緣氣己分情想緣氣為性父母分情境緣氣為命人性有利鈍乃緣氣之清濁父母情境己納受時俱有情有想以己想緣納父母想境緣氣乃清以己情緣納父母情境緣氣乃濁人命之長短乃緣氣之盈虗納受父母情想時有靜念自持不即立能所發揮則氣聚而盈無靜念自持即立能所發揮則氣散而虗是故有生性命總屬己念根幹若其平日了相虗幻不妄貪欲所在納想入胎無不稟氣之清且盈者執相纏縛多妄貪欲所在納想入胎無不稟氣之濁且虗者是曰正此句指現前眾生生理當知輪迴愛為根本者於皆因婬欲而正性命以當知之也此句指令開解葢婬欲為因性命誰正非本所愛心於何有其能正者故指令開曉以見輪迴之根本二顯欲助續開二一身命因果開二一推本發愛由有諸欲助發愛性是故能令生死相續當文二句推本發愛由有云云一句是故云云一句由有諸欲者四生婬欲傳染情想以及緣塵一切生貪諸幻妄境助發愛性者引發愛心生於計取染著情想有其現行貪欲乃立身命此句推發愛因是故者是此助發愛性之故乃有眾生生死不斷輪迴成於相續此句推成愛果二釋明因果欲因愛生命因欲有眾生愛命還依欲本愛欲為因愛命為果當文六句釋明因果欲因愛生句有愛取之心乃見可欲之境此句因命因欲有句納想父母情染乃有一期身命此句果眾生愛命句納想受生以及樂欲長壽一切情見此句著果還依欲本句欲本即生欲之愛心以所愛之命全是欲境有欲即有愛相依成立者故云還依此句滋因愛欲為因句於愛生欲為因此句釋明即愛為因非別有因愛命為果句於愛立命為果此句釋明即愛為果非別有果總以顯見唯一愛心循環往復為於輪迴種性更無他物合文上科共成身命因果科竟二報境苦樂開二一別示報境開三一憎嫉業報由於欲境起諸違順境背愛心而生憎嫉造種種業是故復生地獄餓鬼當文三句憎嫉業報由於云云一句境背云云一句是故云云一句起諸違順者起是愛心分別違是非所愛欲之境順是乃所愛欲之境此句因境生心境背愛心者違於己之愛心所欲之境而生憎嫉者不愛心之所現念初務欲厭離之故憎繼思欲損害之故嫉造種種業者憎嫉心之所成立一切惡行侮慢乖惱殘毀賤辱欺詐傷奪身口意業此句因心成業是故云云者以憎業報惡趣果由因致無別異故復生者昔方脫離今又重至顯見輪迴不一往返此句隨業受報地獄餓鬼畜生三惡趣道夫具上品十惡報在地獄中品餓鬼下品畜生今在文隱沒畜生者以順辭略文故攝在獄鬼句中二捨惡業報知欲可厭愛厭業道捨惡樂善復現天人當文三句捨惡業報知欲可厭一句愛厭云云一句復現天人一句知欲可厭者知貪欲生嗔乃開障之門引業三塗為可厭惡此句起斷欲心愛厭業道者言愛於厭彼業道也乃心樂脫於苦果以厭惡業因緣為快意事此便是所潛伏之愛根捨惡樂善者捨十惡業之身三殺盜婬口四之妄言綺語惡口兩舌意三之貪嗔癡樂十善業之不殺不盜等與諸在家禁戒律儀悉止諸惡而持眾善此句勤斷欲行復現者顯在現已復隱隱已復現乃輪迴報境天人者諸天及人也若具上品十善得欲天報與定相應得色天報修四空定得無色天報若具中品十善得人道報下品得阿修羅報今不言阿修羅者文略也亦攝天人句中此句隨業受報二棄愛業報又知諸愛可厭惡故棄愛樂捨還滋愛本便現有為增上善果當文三句棄愛業報又知云云一句棄愛云云一句便現云云一句諸愛可厭惡故者由愛生欲為起貪之本愛生欲界是可厭惡此句發離愛心棄愛樂捨者棄彼愛心樂欲捨法即四禪中捨支四空中厭色緣空捨空緣識捨識依無所有捨無所有緣非有想非無想處還滋愛本者有捨不異有取總是無明知見無明為生愛之本今乃以捨為樂欲則是熏習無明長養生潤此句成滋愛行便現者即樂捨報現無別功能葢乃全因全果根愛輪迴不二種性有為者色無色界識為界性是有為界增上善果者色無色界依正殊勝從定報得過於欲天是增上善之果此句隨業受報合文上二科共成別示報境科竟二總結輪迴皆輪迴故不成聖道當文一句總結輪迴皆輪迴故者指有為之增上善果同諸苦樂報境皆無明發揮一類種性愛欲因果不成聖道者非圓覺方便是故當斷乃輪迴根本以修圓覺前合列示報境科共成報境苦樂科竟連合身命因果科攝屬顯欲助續科竟接合彰愛根本科管於次明種性科竟綸合初列輪妄科該在詳示輪迴科竟二明所當斷是故眾生欲脫生死免諸輪迴先斷貪欲及除愛渴當文二句明所當斷是故云云一句先斷云云一句是故者發愛滋愛所有因果皆屬輪迴不成聖道之故欲脫生死者悟無生忍免諸輪迴者住持實相此句標所求果先斷貪欲者絕相續因及除愛渴者刳根本性此句示所斷因葢貪欲不斷則發愛不休無能脫於生死愛渴不除則根本伏惑無能永息輪迴此則全體不覺何以有於始覺得能脫三界縛離生滅法成就圓覺平等自性是故在所當斷愛云渴者以無始愛根從無明計取棄海認漚見己不足乃生愛貪如人勞渴思飲濟活相似前合詳示斷輪科共成顯輪令斷科竟二彰化結益開二一彰化斷輪善男子菩薩變化示現世間非愛為本但以慈悲令彼捨愛假諸貪欲而入生死當文三句彰化斷輪善男子一句菩薩云云一句但以云云一句菩薩變化者迴入塵勞逐類隨形之菩薩示現世間者示現在於世間同諸眾生身命依正無有別異非愛為本者愛乃輪迴根本教化菩薩久已永斷故非以愛為根本入於塵勞此句示菩薩斷輪根本但以慈悲者起幻慧用令彼捨愛者教化眾生令知輪迴根本捨諸愛渴假諸貪欲者諸指父母貪欲指父母情染精血二滴葢菩薩入胎受身但借父母精血為四大緣種成立色身無己情想緣染婬識執持命根欲去則去欲來則來生死自在而入生死者色身四大非常住實相本生滅和合因緣菩薩知而故入以便同事攝化此句示菩薩隨緣幻智有斯彰化開示者以所問教化方便本問教化眾生斷輪迴修菩提所當設之方便故今於示斷示修之後即示以菩薩之所教化眾生者斷則唯愛根本修則唯佛菩提以彰一性因果無二斷修二結益斷輪若諸末世一切眾生能捨諸欲及除憎愛永斷輪迴勤求如來圓覺境界於清淨心便得開悟當文四句結益斷輪若諸云云一句能捨云云一句勤求云云一句於清云云一句能捨諸欲者無於發愛斷相續輪迴及除憎愛者無滋愛本斷根本輪迴此是能斷永斷輪迴則是所斷合成句理是能斷妄始覺成就勤求如來者遠離聲聞取證圓覺境界釋準前此句是由始覺究竟本覺於清淨心者平等徧滿無能所性之本成佛覺便得開悟者始本合覺淨性成就此句是得無修證有斯結益者以在問中請益一切修行圓悟如來知見而如來知見眾生本具不由外證能斷妄輪究竟即乃證真究竟可斷證雙彰亦可斷證偏顯非斷之外又別有為證者故今於斷於修各為結益令見斷即斷為修修乃修於斷此益即彼益無二理致是故欲遊如來寂滅大海必先斷乃輪迴根本葢以離斷妄處無入覺處合文上科共成彰化結益科竟前合顯輪令斷科攝屬決要斷輪科竟二教修圓覺開二一顯性差別開二一總明差別開二一由所妄顯善男子一切眾生由本貪欲發揮無明顯出五性差別不等當文三句由所妄顯善男子一句一切云云一句顯出云云一句由本貪欲者根本愛心是無明智相發揮無明者發是揭露出來揮是分布開去葢無明迷真性時業轉現相三細潛生智相未起無明體性深隱難知由本愛貪智相相續執取後乃彰顯有所無明故云發揮此句示有妄用顯有妄體為所斷妄之染污性顯出五性句是有所斷妄之染污性乃有在斷修之清淨性為於顯出差別不等後文具悉此以眾生皆證圓覺何有差別菩提之修習性故示妄顯差別一令知修佛菩提不離斷妄二令知有修菩提猶未離妄若諸妄清淨究竟始覺則悟眾生本來成佛無於修證二依能妄現依二種障而現深淺當文一句依能妄現二種障下文具悉而現深淺者現行之二障深則菩提之修習淺現行之二障淺則菩提之修習深由本無明貪欲伏斷成現是妄性功用合文上科共成總明差別科竟以有染緣性斯有淨緣性無染緣性無由立淨緣性故從妄能所而示顯現之差別性二詳列差別開二一依現業相開二初徵云何二障當文一句初徵不明二障不知在伏在斷未伏未斷之深淺故當徵顯次釋一者理障礙正知見二者事障續諸生死當文二句次釋一者云云一句二者云云一句理障者迷乃真性根本無明正知見者生本成佛圓明妙覺礙者無明分顯妙明分隱猶如華瞖非相待法此句迷智事障者迷乃實相枝末無明即諸欲境違順愛憎續諸生死者輪迴三界此句迷識合文上科共成依現業相科竟以此二障伏斷與未伏斷乃依現五性之差別業相二成別性相開二一徵釋開二初徵云何五性當文一句初徵不明所差之性相不彰能差之伏斷故當徵顯次釋開二一正因四性開二一在纏因果開二一未成果性善男子若此二障未得斷滅名未成佛當文三句未成果性善男子一句若此云云一句名未成佛一句若此者直指理障知見事障生死之辭二障未得斷滅者全體無明具足凡夫一切煩惱此句標行名未成佛者眾生本佛由事理障不成開悟如在鑛之金未銷去鑛名未成金非本無金若銷去鑛即全金現若伏斷障即佛本成故此立稱以彰生佛同性寄簡本無外道種性此句結名二未顯因性若諸眾生永捨貪欲先除事障未斷理障但能悟入聲聞緣覺未能顯住菩薩境界當文四句未顯因性若諸云云一句未斷理障一句但能云云一句未能云云一句若諸者設擬之辭永捨貪欲者斷見思惑了境虗幻無愛取心先除事障者脫三界縛離分段生死此句淺行未斷理障者未斷根本無明未能寂滅隨順此句深障但能悟入云云者以永捨貪欲則無集因除於事障乃離苦果修道證滅二乘涅槃由之成就故云悟入然於苦集為能斷於道滅為所證此則猶落修成非本成佛之無修證性故以但能寄簡彰失自性圓覺之因地法行聲聞緣覺者俱二乘名目依語發解名聲聞因緣開悟名緣覺此句與小未能顯住云云者二乘所圓境界未能至本親證所現涅槃成就寂滅現前故云未顯又寄簡二乘位中多菩薩權現隨類設化內祕高行故云未顯菩薩境界者於生死涅槃一切諸法如眼圓照之無憎愛隨順自在今此未能顯住則是理障未斷猶住無明境界此句奪大合文上科共成在纏因果科竟二出纏因果開二一成悟因性善男子若諸末世一切眾生欲泛如來大圓覺海先當發願勤斷二障二障已伏即能悟入菩薩境界當文五句成悟因性善男子一句若諸云云一句先當云云一句二障已伏一句即能云云一句欲泛云云者泛乃虗舟蕩漾隨波順流無於風濤險阻櫓楫勞動之時以喻得本如來隨順寂滅無礙自在之法界海慧此句標欲先當發願者發菩薩清淨大願求佛圓覺立正知見免誤墮彼旁小計取勤斷二障者除事理障盡斷本末無明則得人我法我俱空菩薩淨願因之成就故發願斷障連次標指發願當立志斷障當成行此句示修二障已伏者由斷根本先凋枝末無智相發揮無明細相失所潤生漸次滅絕深隱無狀乃生滅滅已當得寂滅現前未即寂滅現前之時故云伏此句顯行即能悟入云云者已滅生滅即不迷於寂滅迴光照寂究竟始覺合妙本覺成順覺行菩薩境界者一切覺境無二憎愛也此句成悟二滿足果性若事理障已永斷滅即入如來微妙圓覺滿足菩提及大涅槃當文二句滿足果性若事云云一句即入云云一句事理障已永斷滅者圓覺普照寂滅無二此句彰行即入如來者全斷是證無別功用不同菩薩猶有能悟心相乃障已永斷伏之殊分已伏猶所斷未忘故能照還立永斷則所斷全寂即能照無生故爾殊異微妙圓覺者微即一切法妙離一切相二言合句蓋於全即全離法相彰顯圓覺淨性滿足菩提者法界海慧及大涅槃者自性大定此句全彰祕藏三德徹因成就微妙圓覺者法身徹因滿足菩提者般若徹因及大涅槃者解脫徹因合文上科共成出纏因果科竟前合在纏因果科攝屬正因四性科竟二邪因一性開二一彰本正性開二一本無殊因開二一無殊證因善男子一切眾生皆證圓覺當文二句無殊證因善男子一句一切云云一句皆證圓覺者眾生本來成佛何有不證之圓覺唯眾生有皆證圓覺之證性故如來無證圓覺之證性何以故如來即是眾生既本皆證何有更證是故滿足果性唯在二障之永斷滅即斷言證是為無證是為皆證二有殊修因逢善知識依彼所作因地法行爾時修習便有頓漸當文二句有殊修因逢善云云一句爾時云云一句逢善知識者所親教師依彼所作因地法行者師所修法此句殊因爾時者從師成修之時修習便有頓漸者漸修有三乘頓修惟一乘然有漸修乃顯有頓修不然唯一乘修何頓何漸今有於頓漸則是殊因之所從始葢乃因師有非性本有此句殊果原以求佛菩提在自斷障究竟清淨非是依他有作依他作修故殊頓漸故經文中以依彼所作爾時便有名句彰顯合文上科共成本無殊因科竟葢知證因之所無殊修因之所有殊則可知有殊皆妄而本無殊之正因性了達當前二同成正果若遇如來無上菩提正修行路根無大小皆成佛果當文二句同成正果若遇云云一句根無云云一句若遇如來者慶幸之也無上菩提者入究竟覺圓滿自性正修行路者發願斷障成就開悟此句圓因根無大小者人法俱空平等清淨且無根者何有大小皆成佛果者悟本自心海慧寂滅此句圓果前合本無殊因科共成彰本正性科竟此以正性彰顯邪性由誤可知不然則本有於邪性之眾生即不得云皆本成佛之眾生矣是故世尊先此標指二顯由邪誤開二一依見墮外若諸眾生雖求善友遇邪見者未得正悟是則名為外道種性當文三句依見墮外若諸云云一句遇邪云云一句是則云云一句雖求善友者求正導師此句寄簡生因本正遇邪見者計著證取能所因果未得正悟者發邪知見違涅槃道此句依師成迷是則者指實之辭此以外道無種性執見則成邪故此指實令知邪性之所由種此句結名二歸咎邪師邪師過謬非眾生咎當文一句歸咎邪師眾生原本成佛誤逢邪師失所修證致成邪外非眾生本有自性之邪外故過謬在師而不在眾生有此歸咎益彰顯於眾生之本來成佛全無迷性但有誤修知善求師得正修行路則該果徹因無不佛之眾生矣合文上科共成顯由邪誤科竟前合彰本正性科攝屬邪因一性科竟連合正因四性科管於次釋科竟接合初徵科該在徵釋科竟二顯結是名眾生五性差別當文一句顯結是名者指上所顯之五性眾生者無明之果號五性由本貪欲所發揮之無明顯出非覺本有故今指歸差別於眾生無乃眾生之無明即無乃眾生之差別性矣是故得三無差別即乃無佛性立稱今有佛性在稱則是有眾生對顯故總五性屬本眾生前合徵釋科共成成別性相科竟連合依現業相科攝屬詳列差別科竟接合總明差別科管於顯性差別科竟二彰化結益開二一彰化成就開二一悲化成佛善男子菩薩唯以大悲方便入諸世間開發未悟乃至示現種種形相逆順境界與其同事化令成佛當文三句悲化成佛善男子一句菩薩云云一句乃至云云一句唯者獨也言獨以一乘教化眾生大悲方便者開佛知見善巧教授開發未悟者迷本妙覺未破無明之諸眾生此句化迷乃至者包攝之辭示現種種形相者逐類隨形四生九有無形不稟無相不現逆順境界者入聖而現淨為順入凡而示染為逆與其同事者同凡聖業染法淨法隨順不異以便攝化化令成佛者皆令入究竟淨覺無餘涅槃此句證覺是乃示知菩薩教化於一切眾生唯一佛道無有岐修故於示現種種上以乃至之辭包攝下以化令成佛歸結彰顯二全依淨願皆依無始清淨願力當文一句全依淨願皆依者稟形現相逆行順行同事攝化一切道中悉不外此無始清淨願力者菩薩初發心便願令一切眾生入究竟覺無於我人眾生壽者知見而此菩薩所發之心是自本覺心非因緣性故云無始此示以菩薩所持行於教化道中之能教化者乃斷盡無明以起因行葢非無明斷盡則無能發四相盡捐之清淨願力非依此願力以入一切則於逆順境界不能無礙自在非自疑畏即有誤墮大心菩薩數入生死得不疑畏又無誤墮者由於淨願成就之力合文上科共成彰化成就科竟二結益成就開二一發願求佛若諸末世一切眾生於大圓覺起增上心當發菩薩清淨大願應作是言願我今者住佛圓覺求善知識莫值外道及與二乘當文五句發願求佛若諸云云一句當發云云一句應作云云一句求善知識一句莫值云云一句起增上心者發成就覺心之得無方清淨無邊虗空無證取心此句標欲當發者應發也菩薩清淨大願釋準前以發菩薩清淨大願是究竟淨覺以斷無明永斷無明方成佛道是故當發此句示願應作是言云云者標顯所發之願令成開曉住佛圓覺者法界海慧圓照清淨得知眾生皆本成佛滿足菩薩清淨大願此句是願得所依之無取證法求善知識者求大悲導師此句是願得所師之正知見人莫值句寄簡殊修不入覺海非增上心之所希求二斷障證覺依願修行漸斷諸障障盡願滿便登解脫清淨法殿證大圓覺妙莊嚴域當文二句斷障證覺依願云云一句障盡云云一句依願修行者遠離四相證取知見漸斷諸障者理事二障次第伏斷此句悟入菩薩境界障盡願滿者永斷無明徧滿清淨便登解脫清淨法殿者一佛法界身土清淨證大圓覺妙莊嚴域者普佛法界身土清淨斯則圓滿清淨成就覺心此句即入如來境界合文上科共成結益成就科竟前合彰化成就科攝屬彰化結益科竟二科攝屬一科立目者以菩薩入塵教化本為開悟眾生眾生發願修行全由菩薩教化二本相資故經文語氣自相連屬連合顯性差別科管於教修圓覺科竟接合決要斷輪科入總長行列示科竟二重頌總挈開二一序欲重宣爾時世尊欲重宣此義而說偈言句釋例前二述說偈言開二一挈旨顯決斷輪彌勒汝當知一切諸眾生不得大解脫皆由貪欲故墮落於生死若能斷憎愛及與貪瞋癡不因差別性皆得成佛道憎愛屬現行貪瞋癡屬種子然無愛則無貪無憎則無瞋無貪瞋則無癡癡屬根本無明根本無明由現行愛憎發業貪瞋滋養熏生乃種子不斷若無現行愛憎發業貪瞋去所滋養即乃斷滅故先頌能斷於憎愛後頌及與貪瞋癡及與者由斷憎愛至及之也不因差別云云者以若能二句是永斷無明相無明永斷即成佛道更何差別性之可因長行示五性差別本由發揮無明顯出無於無明即無所顯故無可因此之頌意全彰即斷是證別無證者二挈旨教修圓覺二障永銷滅求師得正悟隨順菩提願依止大涅槃十方諸菩薩皆以大悲願示現入生死現在修行者及末世眾生勤斷諸愛見便歸大圓覺重頌文竟前合長行共成序述世尊垂答科竟連合序述菩薩興問科攝屬示法顯覺科竟言示法者以知斷于輪迴根本則無明伏斷知修性差別由本無明顯出則知本覺之全無修證不迷本覺伏斷無明斯得有其始覺以無不覺無乃不覺斯開顯於本覺成就圓滿清淨接合決疑顯覺科管於顯覺絕妄科竟言絕妄者以有本覺之決疑則無初念之不覺建立無明有始覺之示法則無後念之不覺乍起無明無明前後際斷斯乃淨覺成就得以隨順修習顯於覺以絕於妄也綸合離幻絕妄科該在行斷絕妄清淨科竟然必先有離幻之絕妄後乃顯覺者眾生迷性由迷於相故先決疑示法使離諸幻得乃遠離諸相圓照於清淨覺相後乃覺可開顯以之永斷無明成就如來因地法行是故通合四章彰科云行斷絕妄清淨言行斷者性有一切相有一切不迷一切性一切相總一覺心之所顯發無有二三幻妄能所斯則通達自性覺行正修行路貫合智斷顯真清淨科入總在斷智行清淨科竟葢以能斷智所斷行無不清淨斯成如來因地法行永斷無明究竟斷因若夫斷因不明證果難宣故有此之五章斯有下之五章在證性修清淨為徹因之斷證清淨云白如是
