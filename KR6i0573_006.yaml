body:
  text: 罽賓沙門佛陀多羅譯震旦沙門弘麗羅峯著神州沙門弘贊在犙較二圓離無礙開二一示圓離心開二一序述菩薩興問開二一序問躡次於是此序顯淨諸業障菩薩從修輪頓漸無不成菩提一切衆生皆證圓覺匪唯性具同可修成徹因該果實無不本來成佛之衆生在諸修習迷悶圓覺不究竟證者由未去所染污故不入於清淨大圓覺海有所興問希佛教益令末世衆生斷所迷證者成就夫皆證者二序問周三開二一序述儀音開二一序問威儀淨諸業障菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言句釋例前二述請教益開二一慶聞現益大悲世尊為我者輩廣説如是不思議事一切如來因地行相令諸大衆得未曾有覩見調御歷恆沙劫勤苦境界一切功用猶如一念我等菩薩深自慶慰當文五句慶聞現益大悲世尊一句為我云云一句令諸云云一句覩見云云一句我等云云一句初句讚佛二句讚法以前所聞教法總屬如來因地行相故此述讚三句得益四句覩見者觀見也調御者佛十號之一號調伏衆生咸歸一乘如調韁轡御車在道歷恆沙劫者歷恆河之沙數劫數調御衆生勤苦境界者如來調御衆生之難行能行難忍能忍境界一切功用者大悲幻智成就法行猶如一念者悲智幻現無作妙力種種變化總無動於心源故如一念此句顯所得益入大圓覺心乃不隔於今古自他故得觀見如來因行調御衆生多劫勤苦總悲智幻起無有異念深自慶慰者慶慰見如來之因行則能知所教化衆生不離性覺隨順有其無礙方便成就菩薩功用此句慶得同因如來蓋以前諸菩薩興問教法本為示益菩薩自利利他該果因行故此慶益二申請後益開二一請教迷覺世尊若此覺心本性清淨因何染污使諸衆生迷悶不入當文三句請教迷覺世尊一句若此云云一句因何云云一句若此者如此也清淨者無於生死涅槃功用修證也此句本無生佛之覺心為下問之發端因何染污者問何者是衆生之所染污使諸衆生者即所染污為之使迷悶不入者不得究竟清淨也此句正問衆生迷覺蓋以本無生佛之覺心且不得有於衆生何更得有迷悶不入之衆生此必有所染污者使之迷悶知所染污之使迷悶不入者則可得成就教化設乃方便令去所染污證入究竟淨覺是該果因行之所不可不知者故此繼問二資答結益惟願如來廣為我等開悟法性令此大衆及末世衆生作將來眼當文三句資答教益惟願世尊一句廣為云云一句令此云云一句開悟法性者示所染污之迷悶即得斷乃染污入本淨覺是為開悟此句資佛答教作將來眼者引導群盲歸趨悟剎此句結益合文上科共成申請後益科竟前合慶聞現益科攝屬述請教益科竟連合序問威儀科管於序述儀音科竟二序結終始作是語已五體投地如是三請終而復始句釋例前前合序述儀音科共成序問周三科竟連合序問躡次科入總序述菩薩興問科竟二序述世尊垂答開二一長行列示開二初序讚許開二一讚請教益爾時世尊告淨諸業障菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生咨問如來如是方便當文三句讚請教益通例二句汝等云云一句如是方便者指問迷覺為開悟之方便二許答囑受開二一囑令諦聽汝今諦聽當為汝説句釋例前二受教默然時淨諸業障菩薩奉教歡喜及諸大衆默然而聽句釋例前合文上科共成許答囑受科竟前合讚許教益科攝屬初序讚許科竟二次述正答開二一示教迷覺開二一總彰染污開二一種子無明善男子一切衆生從無始來妄想執有我人衆生及與壽命當文二句種子無明善男子一句一切云云一句從無始者無明業相無有體性本始來者無明轉現相妄想者無明智相執有者無明相續執取相我人衆生壽者無明計名字相計取名我計捨名人計取捨不及名衆生計在不及者之有存立名壽者凡此行相俱屬無明含藏種子此句全彰二現行無明開二一認妄立妄認四顛倒為實我體由此便生憎愛二境於虗妄體重執虗妄二妄相依生妄業道當文三句認妄立妄認四云云一句由此云云一句於虗云云一句四顛倒者智相續執取計名之四妄心此心迷妄失真故云顛倒為實我體者為實己之心性不悟本屬緣影全體虗幻此句立乃能心由此便生者境由心生憎愛二境者違順樂欲一切因緣此句立乃所境於虗妄體者四顛倒心重執虗妄者所憎愛境妄境由妄心生本屬虗妄何有實境今諸妄心又執此所生之妄境為於實有不斷憎愛故云重執二妄相依者境生於心心生於境交妄發生生妄業道者道路也由因之謂由於迷心故憎愛之境不寂迷境故憎愛之心不斷發揮能所成立善惡事業因緣此句能所現行為輪回因合文三句總乃無明造業相二輪妄證妄有妄業故妄見流轉厭流轉者妄見涅槃當文二句輪妄證妄有妄云云一句厭流云云一句有妄業故者推本緣因致果妄見流轉者六趣依正升沉不定然果報依正總乃色法有於苦樂由生心受用無受用心即無苦樂趣故云妄見此句成立凡染厭流轉者滅集苦諦妄見涅槃者證道滅諦然流轉果報本出妄見非實有法但當了本無生何當起於厭憎有此厭心欲成趨避故乃別立無流轉境以為涅槃是云妄見此句成立聖淨有聖凡見總乃無明業苦相合文上科共成現行無明科竟前合種子無明科攝屬總彰染污科竟答所請問之因何染污也一詳示不入開二一指故迷悶由此不能入清淨覺非覺違拒諸能入者有諸能入非覺入故是故動念及與息念皆歸迷悶當文三句指故迷悶由此云云一句非覺云云一句是故云云一句由此者由於執相立見之種現無明不能入清淨覺者種現染污離自覺性此句示本無明立所不入非覺違拒云云者覺無能所性自平等遍滿隨順於諸聖凡妄見本無出離有諸能入者六凡之分別思惟二乘之沉空滯寂非覺入故者有無俱遣是圓覺境界今執有計無總屬幻垢故非覺入此句推本執所生能不入是故者是此有能有所即非覺入之故動念者六凡執有息念者二乘偏空皆歸迷悶者究竟迷覺圓離縛脫清淨自性此句顯出迷悶二發明迷悶開二一本妄續妄開二一前示本妄何以故由有無始本起無明為己主宰一切衆生生無慧目身心等性皆是無明譬如有人不自斷命當文三句前示本妄何以故一句由有云云一句譬如云云一句何以故句徵問動息皆迷之故起下發明令見由於無明未斷之與相續無始釋準前本起無明者根本生相無明為己主宰者陀那細識含藏種子來先去後為於生死命根生無慧目者依無明主宰所生之衆生全體非覺身心等性者四大和合之身六塵緣影之心皆是無明者四大六塵依無明有故身故心總屬無明此句示衆生身心一切俱妄所有動息不離身心故成迷悶不自斷命者不自斷本無明此句喻衆生執吝身心不能遠離乃不自斷無明命根二後曉相續是故當知有愛我者我與隨順非隨順者便生憎怨為憎愛心養無明故相續求道皆不成就當文二句後曉相續是故云云一句為憎云云一句是故者以此不自斷命之故當知者應知也有愛我者有愛於我之境我與隨順者樂欲從事非隨順者非我所愛之境便生憎怨者起嗔恨心不饒益想此句令見憎愛之所由立乃本有不自斷之命為憎愛心者為由也養無明故者無明本計取性今心心憎愛乃心心計取總屬無明一類體性故成長養相續者無明相續種子起現行現行熏種子求道者求淨覺心皆不成就者不入淨覺蓋由無明相續則乃無明成就何由成於淨覺此句令見憎愛本相續於無明故迷悶於淨覺合文上科共成本妄續妄科竟二迷修迷證開二一列相覺迷開二一前列四相開二一迷識二相開二一我相開二一徵釋善男子云何我相謂諸衆生心所證者當文二句徵釋善男子一句云何我相一句徵名謂諸云云一句釋相謂諸衆生者該指聖凡心所證者證謂證取即計取為我之無明心相無論取妄取真總是一類無明真妄有二取心無二故此證取之我該括聖凡佛全標指二喻結開二初喻明善男子譬如有人百體調適忽忘我身四肢弦緩攝養乖方微加針艾則知有我是故證取方現我體當文四句喻明善男子一句譬如云云一句四肢云云一句是故云云一句百骸調適者四大守自性融布無罣礙地水火風不相陵奪之時忽忘我身者不自起於身見此句喻本無身四肢弦緩者弦急緩慢四肢失調之狀攝養乖方者方術也調復無術必求醫治微加針艾者醫治所施痛楚從生則知有我者以有其針艾之痛楚乃現受針艾之心以受針艾之心乃認在所針艾之身為是我此句喻身從證有句中知字即上心所證之心字我字即上所證者之者字是故云云者是此針艾則知有身之故謂諸衆生我相自證取心現若無證取心則無我相如不加針艾時則不知有我身故云方現此句合明前釋次包結善男子其心乃至證於如來畢竟了知清淨涅槃皆是我相當文四句包結善男子一句其心云云一句畢竟云云一句皆是我相一句其心乃至者包舉從凡至聖無量差別一切證心證於如來者以果德為邊際方能包舉未入果證一切諸心此句所證法畢竟了知云云者終底有其了知於清淨涅槃之心此句能證心皆是云云者明結上文乃至之辭包舉無盡此句歸結合文上科共成喻結科竟前合徵釋科攝屬我相科竟二人相開二一徵釋善男子云何人相謂諸衆生心悟證者句釋例前心悟證者悟於證心之是我相乃生捨證之心二喻結開二初喻明善男子悟有我者不復認我所悟非我悟亦如是悟已超過一切證者悉為人相當文四句喻明善男子一句悟有云云一句悟亦如是一句悟已云云一句悟我之不復認我者乃捨執心所悟非我者乃無執心此句就衆生常情設喻蓋凡悟有我之人則不復起認我之心唯心心欲同乎人渾全抱一人相悟亦如是者此句合喻蓋悟於證心之為我相則不復立取證心直心心趨捨渾全抱一捨心之人相與彼衆生之悟我者無異悟已超過者於悟心中超過之也即乃捨所取證之心一切證者包舉之辭從淺至深凡取證心無不棄捨悉為人相者有超過一切證之心皆是捨心故皆是人相此句承亦復如是句合明心悟證者之為相人次包結善男子其心乃至圓悟涅槃俱是我者心存少悟備殫證理皆名人相當文四句包結善男子一句其心云云一句心存云云一句皆名人相一句其心者悟心也乃至圓悟云云者包舉推極究竟明悟證於如來之畢竟了知清淨涅槃心是取證我心此句是悟於證心心存少悟者存於悟心備殫證理者備悉也殫盡也悉盡捨所取證之理此句是立捨心皆名人相者此句歸結以有能捨之心所捨之境但離我執未冥他觀是名人相合文上科共成喻結科竟前合徵釋科攝屬人相科竟連合我相科管於迷識二相科竟言迷識者證取心是無明之執取計名字語證心是無明之智相續乃無明識境故云迷識二迷智二相開二一衆生相開二一徵釋善男子云何衆生相謂諸衆生心自證悟所不及者句釋例前心自證悟者心之自證自悟諸法此出前所立之我人心相所不及者離於證悟無可得取無可得捨乃三細之業轉現相未生六粗屬根本無明大總相分故云衆生二喻結開二初喻明善男子譬如有人作如是言我是衆生則知彼人説衆生者非我非彼云何非我我是衆生則非是我云何非彼我是衆生非彼我故當文五句喻明善男子一句譬如云云一句則知云云一句云何云云一句云何云云一句譬如句正喻了達無其人我之衆生相則知句發明衆生相即是了達於無人我之心云何二句詳釋了達無我無人之所以是於衆生相我是衆生則非是我者言既見我是於衆生則即無於我顯從是衆生邊成立非我之衆生相我是衆生非彼我故者言既見是我是衆生則即非人是衆生故非彼之我顯從我是邊成立非彼之衆生相次包結善男子但諸衆生了證了悟皆為我人而我人相所不及者存有所了名衆生相當文三句包結善男子一句但諸云云一句而我云云一句了證者了所證取心了悟者了所悟證心皆為我人者了去此證悟二心以此二心之皆為我人相在證悟文中有乃至之辭屬包舉一切今以皆字承顯此句示越前二相之所了心而我人相所不及者者字即了於證悟之心此之了心是明所邊立非同取捨心屬妄能邊生故所不及存有所了者明照未寂所相森然名衆生相者所立則能生成有為法此句定相歸結合文上科共成喻結科竟前合徵釋科攝屬衆生相科竟二壽命相開二一徵釋善男子云何壽命相謂諸衆生心照清淨覺所了者一切業智所不自見猶如命根當文四句徵釋善男子一句云何壽命相一句徵相謂諸云云一句釋相猶如命根一句喻明心照清淨者了於證悟之為我人得我人相所不及之清淨此時存所了心為照清淨之心覺所了者覺照於清淨之心為所了心者字即覺字乃覺所了之覺此覺字是於覺明有明明覺之覺是八識精性一切業智者業是無明初分是衆生相智是無明中分是人我相所不自見者識精是覺明了知業智因之迷立如眼光因眼有不能回光見眼此句指明八識精性為衆生生死輪回深隱根本猶如命根者以衆生一期壽命實有為之修短者而人於修短中多不能自見如一切業智所不自見之覺明理事無異二喻結開二初喻明善男子若心照見一切覺者皆為塵垢覺所覺者不離塵故如湯消氷無別有氷知氷消者當文四句喻明善男子一句若心云云一句覺所云云一句如湯云云一句若者設語辭照見一切者照於前之證悟了三心覺者即心所立之照覺以於心有照見一切之覺此覺非本有立照則生不立照則無故云若以見出乃分外皆為塵垢者皆字是合覺於照見之一切同一體性同為塵垢此句發明明了覺心所以稱為命根指屬輪回根本者以是塵垢故覺所覺者上覺字照見心所覺者照見之一切不離塵故者覺無能所能所皆塵今有於覺所覺之能所故未離塵此句乃釋明覺者之皆為塵垢如湯消氷者喻圓照覺相永斷無明無別有氷知氷消者喻覺心成就寂滅無二無於能證所證此句喻顯覺心成就究竟清淨反顯有覺之未清淨為未離塵次包結存我覺我亦復如是當文三句包結存我一句覺我一句亦復如是一句存我者無明人我此我挾境計取方現必有所存斯有其我覺我者覺明法我此我根心智照為體但有所覺即有其我此兼舉二我者影照上文覺所覺者以所覺是我人衆生三相是照生之所是為存我覺是壽者相是明起之照是覺為我總湯所消之氷相亦復如是者如於湯之消氷當無別有氷以知消者若其別有氷知於氷消即是未消之氷此正承喻順合反見有覺之未離塵合文上科共成喻結科竟前合徵釋科攝屬壽命相科竟連合衆生相科管於迷智二相科竟言迷智者了悟心是根本無明覺了心是覺明立照立照失明無明失照乃迷覺而有於不覺故云迷智接合迷識二相科該在前列四相科竟二後責迷修善男子末世衆生不了四相雖經多劫勤苦修道但名有為終不能成一切聖果是故名為正法末世當文五句後責迷修善男子一句末世云云一句雖經云云一句終不云云一句是故云云一句不了四相者未能如湯之消氷遠離證悟了覺四心此句不斷無明雖經多劫者遠歷僧祇勤苦修道者失乃隨順但名有為者未忘能所此句相續無明終不能成云云者未獲本不生滅因地覺心無以成常住寂滅果地覺證一切聖果者圓覺為大陀羅尼門一切清淨真如菩提涅槃諸佛果德從之流出此句失覺成就是故者是此本妄續妄迷悶淨覺之故正法末世者諸佛法化於時教理行證修學具足名為正法時存教理人少行證則名末世今此圓淨覺心本一切衆生所皆證者屬乃正法以勤苦違修於皆證者遠劫無證為之末世此句申明失成聖果失自本證之果前合前列四相科共成列相覺迷科竟二指行乖證開二一修染污行開二一顯迷認我開二一非法非行開二一違涅槃法開二一彰故迷認開二一示迷何以故認一切我為涅槃故有證有悟名成就故當文三句示迷何以故一句認一云云一句有證云云一句何以故者以何故為不了於四相此句徵問一切我者證取心為我相之大總又乃兼該人相為涅槃故者以了知之清淨為涅槃之清淨故字應起句徵問示乃迷認此句迷所有證者我相心有悟者人相心名成就故者以失為得此句迷能二喻失譬如有人認賊為子其家財寶終不成就當文一句喻失認賊喻迷我人之證悟心為子喻名為涅槃成就其家喻圓覺財寶喻一切聖果終不成就喻不入淨覺合文上科共成彰故迷認科竟二推顯迷認何以故有我愛者亦愛涅槃伏我愛根為涅槃相有憎我者亦憎生死不知愛者真生死故別憎生死名不解脫當文四句推顯迷認何以故一句有我云云一句有憎云云一句名不解脫一句何以故者以何故知所為涅槃成就者是認我人相此句徵問有我愛者有我斯有愛亦愛涅槃者故乃愛於涅槃伏我愛根者愛於涅槃之心根本我相即潛生我相故曰伏為涅槃相者指乃迷認蓋涅槃本自覺相非有為性今以我出妄認故於涅槃亦有為相此句本有愛心示知迷認有憎我者有憎心之我亦憎生死者故乃憎於生死不知愛者不知於愛涅槃之心以有愛涅槃之心乃因生憎生死之念故此推原真生死者愛為輪回根本有愛即有生死故者推由迷此故乃憎彼別憎生死者不務斷於根本愛心乃願絶於虗幻果報此句本有憎心示知迷認名不解脫者纏縛愛憎非覺隨順此句結名有為前合彰故迷認科共成違涅槃法科竟二背解脫行開二一徵相云何當知法不解脫當文一句徵相此以纏縛愛憎之非解脫在當人自心深隱難知何以明辨所宜徵問二標行善男子彼末世衆生習菩提者以己微證為自清淨猶未能盡我相根本若復有人讚歎彼法即生歡喜便欲濟度若復誹謗彼所得者便生嗔恨則知我相堅固執持潛伏藏識遊戲諸根曾不間斷當文五句標行善男子一句彼末云云一句若復云云一句若復云云一句則知云云一句習菩提者求淨覺心以己微證者一念證心若有若無甚為微細為自清淨者於微證心不自知有認為清淨猶未能盡者未得無證我相根本者微證之心正是我根此句示有證取我根未盡則有愛憎現行不除若復者或有不定之辭讚歎彼法者稱譽彼所證法即生歡喜者因讚生悅便欲濟度者樂以法教彼人此句示有愛心現行誹謗彼所得者譏呵彼證便生嗔恨者怨憎前人毀己法化此句示有憎心現行則知者於愛憎現行以知之也我相堅固執持者忘我不愛忘我不憎今之愛憎兩熾皆乃堅固執持於我斯現行所愛憎以防護之潛伏藏識者含藏種子於無明八識遊戲諸根者發業潤生於見聞覺知曾不間斷者倐憎倐愛種子起現行現行熏種子無由斷妄此句示乃纏縛不成解脫合文上科共成背解脫行科竟前合違涅槃法科攝屬非法非行科竟二明結乖證善男子彼修道者不除我相是故不能入清淨覺當文三句明結乖證善男子一句彼修云云一句是故云云一句是故者是此我相不除愛憎現行長養無明之故前合非法非行科共成顯迷認我科竟二例迷餘三開二初例善男子若知我空無毀我者有我説法我未斷故衆生壽命亦復如是當文四句初例善男子一句若知云云一句有我云云一句衆生云云一句若者設比之辭知我空者悟身無體悟心無相無毀我者毀我之人蓋以人從我立既空於我何見毀之人此句示無我無人以令知有人還歸有我有我説法者因法愛憎於人之讚謗是見有我説之法故乃有其毀我之人我未斷故者以我未斷之故故乃見有我説之法此句申明有人由於有我以例迷我即乃迷人衆生壽命之亦復如是者如人之從我斷從我伏以例迷我人即乃迷衆生壽命一相迷而四相全迷也此句盡例次結善男子末世衆生説病為法是故名為可憐愍者雖勤精進增益諸病是故不能入清淨覺當文五句次結善男子一句末世云云一句是故云云一句雖勤云云一句是故云云一句説病為法者四相全無明染污認之為涅槃成就此句執妄是故者是此説病為法之故名為可憐愍者無有開悟之因此句輪妄增益諸病者長養無明此句續妄是故者是此續妄之故此句迷覺合文上科共成例迷餘三科竟前合顯迷我相科攝屬修染污行科竟二失隨順行開二一違拒自他開二一無自利行善男子末世衆生不了四相以如來解及所行處為自修行終不成就當文三句無自利行善男子一句末世云云一句以如云云一句不了四相者未斷無明此句住妄以如來解者般若智照及所行處者解脫行業為自修行者求已悟入終不成就者究竟迷悶此句失真二無利他行或有衆生未得謂得未證謂證見勝進者心生嫉妬當文二句無利他行或有云云一句見勝云云一句未得謂得者迷因修習未證謂證者迷果成就此句立我能所見勝進者成就順覺無礙修習心生嫉妬者嗔彼化行人輕己法此句於人怨憎合文上科共成違拒自他科竟二明結乖證由彼衆生未斷我愛是故不能入清淨覺當文二句明結乖證由彼云云一句是故云云一句未斷我愛者潤生無明故四相不了於他嫉妬前合違拒自他科共成失隨順行科竟連合修染污行科攝屬指行乖證科竟接合列相覺迷科管於迷修迷證科竟綸合本妄續妄科該在發明迷悶科竟貫合指故迷悶科統歸詳示不入科竟答所請問之迷悶不入也并合總彰染污科入總示教迷覺科竟二示益末世開二一教修與記開二一唯斷成修開二一求悟增病善男子末世衆生希望成道無令求悟唯益多聞增長我見當文三句求悟增病善男子一句末世云云一句無令云云一句希望成道者希冀也成道成就圓滿清淨覺心此句顯欲無令求悟者本成佛覺無可證悟有證悟心皆人我相故令無求唯益多聞者凡立悟境皆出名言戲論故唯益於多聞增長我見者計名字相本無明迷妄出生我見因緣令日滋益名言長養無明計取故成我見增長此句顯病二斷妄圓寂但當精勤降伏煩惱起大勇猛未得令得未斷令斷貪嗔愛慢諂曲嫉妬對境不生彼我恩愛一切寂滅當文四句斷妄圓寂但當云云一句起大云云一句貪嗔云云一句彼我云云一句但當者唯可如此也語氣與上文無令相呼應降伏煩惱者伏斷根本無明此句是初因修習般若起大勇猛者永斷根本無明須如人奮斷己命相似非有所激發一切不顧捨身捨命如何可得故䇿之令起未得令得者未得慧目了明四相直須令得未斷令斷者未斷證心盡除四相直須令斷此句是後行滿足菩提貪嗔愛慢者貪嗔是心愛慢由境諂曲嫉妬者諂曲從愛流嫉妬從慢滋對境不生者對可貪境而不生愛邊一切心對可嗔境而不生慢邊一切心此句是現行無明伏斷成就解脫彼我恩愛者自他境中可貪欲事一切寂滅者無自無他何恩何愛此句是現行無明永斷一路涅槃合文上科共成唯斷成修科竟二顯佛印記佛説是人漸次成就求善知識不墮邪見當文二句顯佛印記佛説云云一句求善云云一句佛説是人者佛語真實如所如説不誑不異是人修習得無迷惑漸次成就者無明本末伏斷永斷漸次功圓此句記修習功畢求善知識者求大圓覺法界海慧如來導師不墮邪見者無於證取能所明照此句記開悟圓覺前合唯斷成修科共成教修與記科竟二誡迷失覺若於所求別生憎愛則不能入清淨覺海當文二句誡迷失覺若於云云一句則不云云一句若者設悟防迷所求者清淨覺心別生憎愛者起證取心憎生死而愛涅槃此句乖因則不能入者本成佛覺無能證所證起證取愛憎即是有於能入之非覺入清淨覺海者無上法王圓滿覺心此句違果前合教修與記科共成示益末世科竟連合示教迷覺科攝屬次述正答科竟接合初序讚許科管於長行列示科竟二重頌總挈開二一序欲重宣爾時世尊欲重宣此義而説偈言句釋例前二述説偈言開二一挈旨示教迷覺開二一挈旨總彰染污淨業汝當知一切諸衆生皆由執我愛無始妄流轉二挈旨詳示不入未除四種相不得成菩提愛憎生於心諂曲存諸念是故多迷悶不能入覺城二挈旨示益末世開二一旨教修與記若能歸悟剎先去貪嗔癡法愛不存心漸次可成就我身本不有憎愛何由生此人求善友終不墮邪見二挈旨誡迷失覺所求別生心究竟非成就重頌文竟前合長行攝屬序述世尊垂答科竟連合序述菩薩興問科入總示圓離心科竟言心者以證悟了覺根本於心貪嗔愛慢現行於心言圓離者以所示教益總乃令斷此諸無明心相成就究竟修證之平等清淨二示圓離法開二一序述菩薩興問開二一序問躡次於是此序顯普覺菩薩從入清淨覺必證悟了覺之心究竟圓離斯無迷悶悲念修人所染污心本求法生不悟圓離法與求無相人則隨求生心執病為行舉心成見卒難免者有所興問希佛教益令末世衆生得能漸次成就求善知識之不墮邪見無於所求別生憎愛者二序問周三開二一序述儀音開二一序問威儀普覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言句釋例前二述請教益開二一慶聞現益大悲世尊快説禪病令諸大衆得未曾有心意蕩然獲大安隱當文四句慮聞現益大悲世尊一句快説禪病一句令諸云云一句心意云云一句快説禪病者證悟了覺之四心相是修禪者所病此句述聞得未曾有者成就淨覺此句開悟心意蕩然者永離生滅獲大安隱者常住寂滅此句除迷二申請後益開二一懷憂末世世尊末世衆生去佛漸遠賢聖隱伏邪法增熾當文三句懷憂末世世尊一句末世云云一句邪法增熾一句末世者世尊法化正像二千年後之末法萬年時世去佛漸遠者去正而像而末漸漸遠於佛在世時無由知於果德賢聖隱伏者像法千年猶多應真大心輔化時當末世衆生無於機感賢聖他方示現此界隱迹無從瞻彼因行此句憂末世之無師邪法增識者世無慧燈邪光斯熾修習法門非如來之三無漏學四決定誨長養無明貪嗔愛慢不可勝説此句憂末世之迷法二請教正覺開二一依覺修習使諸衆生求何等人依何等法行何等行當文三句依覺修習使諸云云一句依何等法一句行何等行一句初句使諸者垂教指導之意包下五求何等人者何等之人是所當求二句所求之人何等之法是所當依此二句發覺緣因三句既以求人依法復有何等之行是自所當行此句入覺修習二斷妄成就除去何病云何發心令彼群盲不墮邪見當文三句斷妄成就除去何病一句斷何染污云何發心一句成就智用令彼云云一句離諸妄見此以生無慧目之衆生凡有舉心塵勞先起苟不知所離見無以成就智用之清淨合文上科共成請教正覺科竟前合懷憂末世科攝屬申請後益科竟接合慶聞現益科管於述請教益科竟綸合序問威儀科該在序述儀音科竟二序結終始作是語已五體投地如是三請終而復始句釋例前前合序述儀音科攝屬序問周三科竟連合序問躡次科入總菩薩興問科竟二序述世尊垂答開二一長行列示開二初序讚許開二一讚請教益爾時世尊告普覺菩薩言善哉善哉善男子汝等乃能咨問如來如是修行能施末世一切衆生無畏道眼令彼衆生得成聖道當文五句讚請教益通例二句汝等云云一句能施云云一句令彼云云一句如是修行者指在問之緣因修習發心離見此句標問無畏道眼者於自於他不迷邪見此句智朗得聖道者入淨覺海圓滿菩提此句行圓二許答囑受開二一囑令諦聽汝今諦聽當為汝説句釋例前二受教默然時普覺菩薩奉教歡喜及諸大衆默然而聽句釋例前合文上科共成許答囑受科竟前合讚請教益科攝屬初序讚許科竟次述正答開二一依覺修習開二一人法正觀開二一求師頓證開二一頓證覺智開二一緣師淨覺開二一前示當求善男子末世衆生將發大心求善知識欲修行者當求一切正知見人當文三句前示當求善男子一句末世云云一句當求云云一句將發大心者將顯發己本成佛覺圓滿淨心求善知識者求圓覺友欲修行者圓成果地修證此句修人種性一切正知見者圓覺普照正遍知人此句略標師覺二後詳師覺開二一無住相心心不住相不著聲聞緣覺境界當文一句無住相心心不住相者無取覺心聲聞緣覺境界者由證取心現既無住相心何有聲聞緣覺境界故乃不著此八字即釋明心所不住之相成足句理令見師淨覺心不但無於凡情亦本無於聖解二無侵塵業雖現塵勞心恆清淨示有諸過讚歎梵行不令衆生入不律儀當文三句無侵塵業雖現云云一句示有云云一句不令云云一句雖現塵勞者現生濁世種種形類同事攝化心恆清淨者無縛脫知見此句不執幻有示有諸過者示塵勞煩惱染污淨覺讚歎梵行者稱揚清淨解脫靜慧此句開示實相不令者化導之也不律儀者見取戒取乃至治世之法俱非奢摩他行此句度生離塵住佛淨戒合文上科共成後詳師覺科竟前合前示當求科攝屬緣師淨覺科竟二成弟上慧求如是人即得成就阿耨多羅三藐三菩提當文二句成弟上慧求如是人一句即得云云一句求如是人者如是無住相無侵塵之正知見人此句緣因阿耨云云者梵語阿耨多羅此翻無上三藐此翻正等亦翻正遍三菩提此翻正覺合云無上正等正覺亦云正遍知此句致果正彌勒章所謂若遇如來無上菩提正修行路根無大小皆成佛果者前合緣師淨覺科共成頓證覺智科竟二頓證覺行開二一垂教植行開二一於自清淨開二一捐身求法末世衆生見如是人應當供養不惜身命當文二句捐身求法末世云云一句應當云云一句應當者合宜也寄簡不宜承事外道二乘之人不惜身命者尊重般若知身幻化無有真實盡情捐捨如涅槃童子之雪山捨身大品常啼之香城破骨二降伏心見彼善知識四威儀中常現清淨乃至示現種種過患心無憍慢當文三句降伏心見彼善云云一句乃至云云一句心無憍慢一句四威儀中者行住坐臥之語默動靜自修弘範常現清淨者嚴淨毗尼縛脫無礙此句於師自行示現種種過患者指諸塵勞煩惱輪回苦趣此句於師覺他心無憍者無忽易心無慢者有敬謹心此句於師所行所教之礙無礙境降伏心見不於師行之無礙而生憍能於師示之過患而除慢乃得以無憍心而不留於無礙以無慢心而不留於礙成就超過礙無礙境之自在隨順也合文上科共成於自清淨科竟二於他清淨況復摶財妻子眷屬當文一句於他清淨況復者彰易也摶財者摶聚也衆生所摶聚養資身命之具妻子眷屬者衆生所市恩纏愛之人我此皆身外之境比於身心易為清淨不以身命之難捨心見之難降故以況復顯易前合於自清淨科共成垂教植行科竟二彰益具行開二一敬田除惡若善男子於彼善友不起惡念當文一句敬田除惡若善男子者幸能之辭善友者無心相塵業之正知見人不起惡念者降伏其心圓明清淨無於憍慢不善知見二悲田興利即能究竟成就正覺心華發明照十方剎當文二句悲田興利即能云云一句滿德心華云云一句現行心華發明者圓覺慧光照十方剎者普照法界合文上科共成彰益具行科竟前合垂教植行科攝屬頓證覺行科竟連合頓證覺智科管於求師頓證科竟二擇法圓離開二一示法清淨開二一證法離病善男子彼善知識所證妙法應離四病當文二句證法離病善男子一句彼善云云一句所證妙法者圓滿淨覺應離四病者覺心非能故離作任覺心非所故離止滅此句總標後乃詳曉二離病為法開二一詳列病相開二初徵云何四病當文一句初徵次釋開二一能法二病開二一作求覺病一者作病若復有人作如是言我於本心作種種行欲求圓覺彼圓覺性非作得故説名為病當文三句作求覺病一者作病一句若復云云一句彼圓云云一句初句標病名若復者或有之辭作如是言者彼人設教之語我於本心者指六識分別作種種行者成立見聞覺知欲求圓覺者於見聞覺知成立圓覺修習此句述在彼人示作求覺彼圓覺性者平等淨性非作得故者覺非作可得之故以作乃能法覺非能法何作可得説名為病者不能得覺是名為病此句釋明作病究所迷作求覺之故乃迷五識中之同時明了識性為能作性此明了識即六識體性故指於本心作在明了位中未起攀緣分別見為清淨故欲本以成就淨覺不知此明了識精全體虗幻如何得覺二任求覺病二者任病若復有人作如是言我等今者不斷生死不求涅槃涅槃生死無起滅念任彼一切隨諸法性欲求圓覺彼圓覺性非任有故説名為病當文五句任求覺病二者任病一切若復云云一句涅槃云云一句任彼云云一句彼圓云云一句初句標病名不斷生死者謂生死本有無可斷故不求涅槃者謂涅槃本有不須求故此句彼人設教不斷不求無起滅念者無於生死起之念故不須斷無於涅槃滅之念故不用求是乃無六識分別此句彼人發明所能不斷不求任彼一切者任還也憑也乃各憑他之謂隨諸法性者生死隨其生死涅槃隨其涅槃凡各有一法即有一法之性生滅常生滅不生滅常不生滅但能隨之便成圓覺此句彼人示任求覺以不斷不求斯有所為任者故先示不斷句後示任彼句凡此三句皆彼人設教之語非任有故云云者非任生滅涅槃即能有於圓覺之故以任但無能生之所且未無能至乃生能之所尚迷不識如何有覺此句釋明任病究所迷任求覺之故乃以停六識之分別於末那七識所執外半分之六識以為諸法自有之生滅性內半分之八識以為諸法自有之不生滅性故欲圓合生死涅槃不斷不求任以入覺不知此內外分之末那全體虗幻如何得覺合文上科共成能法二病科竟二所法二病開二一止求覺病三者止病若復有人作如是言我今自心永息諸念得一切性寂然平等欲求圓覺彼圓覺性非止合故説名為病當文四句止求覺病三者止病一句若復云云一句得一云云一句彼圓云云一句初句標病名永息諸念者除滅見聞覺知明了記性此句彼人設教息滅妄心成就止相得一切性者根塵識性寂然平等者不外流逸內守幽間欲求圓覺者成就清淨此句彼人發明止成之得求於圓覺非止合故云云者非止息妄心得合入圓覺之故以止雖冥能心不立於異猶未亡所在立於同如何合一切同異所不能至之圓覺此句釋明止病究所迷止求覺之故乃於外種之半分末那捨執歸位為諸念永息內種之半分末那八識無記為諸性平等故欲止以入覺以不捨外半末那之明了不彰內半末那之無記不知此無記之八識全體無明如何得覺二滅求覺病四者滅病若復有人作如是言我今永斷一切煩惱身心畢竟空無所有何況根塵虗妄境界一切永寂欲求圓覺彼圓覺性非寂相故説名為病當文六句滅求覺病四者滅病一句若復云云一句身心云云一句何況云云一句一切云云一句彼圓云云一句初句標病名永斷一切煩惱者入元澄性如波瀾滅於諸生滅根元此句彼人示教捨我執心身心云云者出行陰區宇同分生機倐然隳裂此句彼人示煩惱斷相得人空證何況者顯示之辭根塵虗妄境界者依根塵所發之意識界蓋識發法根塵根依身立塵自心生既身心之畢竟空何根塵以發識故以何況顯示此句彼人示教獲人空證者之自離妄分別合二句總彼詳示一切煩惱之永斷清淨成就滅相一切永寂者彼人承指身心識妄之畢竟空欲求圓覺者成就清淨此句彼人發明滅成之得求於圓覺非寂相故云云者覺性之寂普照圓寂無別有相有相之寂乃晦昧無明全立所相故非淨覺此句釋明滅病究所迷滅求覺之故乃於內種末那捨執歸位無七我執之行陰盡為一切煩惱之永斷身心之畢竟空無七之為六依根為識妄之永寂全體在位無明迷為清淨覺故見實有可滅法永成晦昧斯成淨覺不知無明妄性非覺湛明性如何得覺合文上科共成所法三病科竟前合能法二病科攝屬次釋科竟連合初徵科管於詳列病相科竟二顯證清淨離四病者則知清淨當文一句顯證清淨蓋得離於四病必無明之永斷方能不於六迷作止於七迷任滅而以在位之無明迷為證性故知所證之清淨則知者指決末世衆生於法四病離不離間以驗於師之證法前合詳列病相科共成離病為法科竟連合證法離病科攝屬示法清淨科竟二別觀邪正作是觀者名為正觀若他觀者名為邪觀當文二句別觀邪正作是云云一句若他云云一句作是觀者於離四病以觀師法名為正觀者乃善求師之正知見此句示正若他觀者不知觀法離病任心橫生愛憎去就名為邪觀者迷妄求師之惡知見此句簡邪前合示清淨科共成擇法圓離科竟連合求師頓證科攝屬人法正觀科竟二自行入覺開二一事師成行開二一身心隨順開二一畢生皈命善男子末世衆生欲修行者應當盡命供養善友事善知識當文二句畢生皈命善男子一句末世云云一句欲修行者欲成就順覺修習應當盡命者莫可親近邪師唯宜盡形壽命皈依正覺供養者四事知時淨心虔供善友即善知識例釋準前此句示依正覺二如空降心彼善知識欲來親近應斷憍慢若復遠離應斷瞋恨現順逆境猶如虗空當文三句如空降心彼善云云一句若復云云一句現順云云一句初句不以來相觀如來故於知識之來親近應當斷憍慢心憍慢釋準前二句不以去相觀如來故於知識之復遠離應當斷瞋恨心無怨尤意而謂彼捨已三句達法實相故於善知識所現順己之境逆己之境皆見如空究竟清淨不生異念合文上科共成身心隨順科竟二自他平等了知身心畢竟平等與諸衆生同體無異當文二句自他平等初句不於自立身心相為畢竟平等次句不於他立身心相為自體無異此從於師降心皈命供養親近開正知見圓離四相之淨覺慧前合身心隨順科共成事師成行科竟二簡別迷覺如是修行方入圓覺當文一句簡別迷覺如是修行者如上降心皈命正知見之師成淨覺慧以修行方入圓覺者方無染污迷悶若其親近他師成立別行即迷覺入前合事師成行科共成自行入覺科竟連合人法正觀科攝屬依覺修習科竟答所請問之求人依法修行也二斷妄成就開二一除病續妄開二一推故迷覺善男子末世衆生不得成道由有無始自他憎愛一切種子故未解脫當文三句推故迷覺善男子一句末世云云一句指迷由有云云一句推故無始自他憎愛者本末無明一切種子者新熏舊熟故未解脫者由此之故未成解脫不彰解脫淨行即未成道行二顯行除病開二一人空現行若復有人觀彼怨家如己父母心無有二即除諸病當文一句人空現行怨家者起憎之境父母者起愛之境人之憎心猶愛轉成以非所愛故爾便憎今對憎境之心不二對愛境之心此非但無於憎亦無於愛憎愛俱忘現行清淨無明斷熏種子失潤得能淨妄是故諸病即除諸病者一切無明妄性也二法空現行於諸法中自他憎愛亦復如是當文一句法空現行亦復如是者合上人空現行比見於法空現行猶云若復有人觀處生死如入涅槃心無有二即除諸病合文上科共成顯行除病科竟前合推故迷覺科攝屬除病續妄科竟二發心離見開二一教所發心善男子末世衆生欲求圓覺應當發心作如是言盡於虗空一切衆生我皆令入究竟圓覺於圓覺中無取覺者除彼我人一切諸相當文四句教所發心善男子一句末世云云一句作如云云一句於圓云云一句欲求圓覺者求圓滿覺心應當發心者發度衆生之心蓋圓覺海世界無量衆生無量皆圓覺心建立不發度此諸世界之衆生共住清淨即無以究竟覺心之圓滿清淨此句指令發心作如是言者下文所言以彰言乃能顯教所以發心盡於虗空云云者圓覺法界我皆令入云云者皆令成佛圓滿覺心此句示所發之心於圓覺中者大圓覺中無取覺者無證悟了覺之四心入法空慧除彼我人云云者冥自他憎愛之妄境成解脫行此句示所度生入清淨覺之善行以成就於所發心者二決能離見如是發心不墮邪見當文一句決能離見如是者如所教之發心不墮邪見者不成旁小取證得能成就正覺合文上科共成發心離見科竟前合除病續妄科攝屬斷妄成就科竟答所請問之除病發心離見也連合依覺修習科入總長行列示科竟二重頌總挈開二一序欲重宣爾時世尊欲重宣此義而説偈言句釋例前二述説偈言開二一挈旨依覺修習開二一挈旨人法正觀普覺汝當知末世諸衆生欲求善知識應當求正見心遠二乘者法中除四病謂作止任滅長行示病一作二任三止四滅者依識後先今頌作止任滅者依識生滅以作求覺乃執六識明了是於六識計生以止求覺乃捨外半末那是於六識計滅為一類之生滅以任求覺乃執全體末那是於七識計生以滅求覺乃捨內半末那是於七識計滅為一類之生滅故此合頌二挈旨自行入覺親近無憍慢遠離無瞋恨見種種境界心當生希有還如佛出世二挈旨斷妄成就開二一挈旨除病績妄不犯非律儀戒根永清淨無憎愛現行永斷無明住佛淨戒故此挈頌二挈旨發心離見度一切衆生究竟入圓覺無彼我人相當依正智慧便得超邪見證覺般涅槃證覺般涅槃者三德妙圓也梵語般涅槃此翻入滅度覺即法身滅即解脫度即般若重頌文竟前合長行攝屬序述世尊埀答科竟連合序述菩薩興問科入總示圓離法科竟言法者以人之邪正由所證法以辨己之修行由供養正法之人以成乃得去病乃能發心入淨覺海故獨指法彰科以攝全章教理又不濫同上章旨趣前合示圓離心科共成圓離無礙科竟連合圓攝無礙科攝屬修證無礙科竟接合性證如空科管於在證性修清淨科竟蓋乃性明修成心離法妙之究竟清淨也綸合在斷智行清淨科入總明因斷證清淨科竟夫因既明果可剋證願賜如被末世衆生德本久植者共逢斯教白如是
