body:
  text: 罽賓沙門佛陀多羅譯震旦沙門弘麗羅峯著神州沙門弘贊在犙較二在證性修清淨開二一性證如空清淨開二一序述菩薩興問開二一序問躡次於是此序顯清淨慧菩薩從證因斷顯恐斷未究竟清淨之諸來法衆迷究竟證之清淨執吝己證不捨迷悶覺心有所興問希佛教益證中差別令末世衆生不迷證之差別知所究竟清淨成就徹因果證圓滿覺心二序問周三開二一序述儀音開二一序問威儀清淨慧菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言句釋例前二述請教益開二一慶聞現益大悲世尊為我等輩廣說如是不思議事本所不見本所不聞我等今者蒙佛善誘身心泰然得大饒益當文三句慶聞現益大悲世尊云云一句本所云云一句我等今者云云一句廣說者備指前聞如是不思議事者覺心性相微妙深奧不屬分別思惟塵影緣氣此句述佛顯真本所不見云云者指向幻妄根塵識界所發見聞非本見聞淨性不了覺心實相此句悲昔迷妄我等今者現前法衆同聞法時蒙佛善誘者誘引入也引入圓滿覺心究竟清淨身心泰然者泰安逸也離諸塵勞煩惱自在住持得大饒益者成就遊戲寂滅大海一切無礙此句述衆承益二申請後益開二一請教殊證願為諸來一切法衆重宣法王圓滿覺性一切衆生及諸菩薩如來世尊所證所得云何差別當文二句請教殊證願為云云一句一切云云一句諸來者在會菩薩衆生也云重宣者以在斷在證本無有二覺心成就能斷之究竟即是所證之究竟前聞教理已備彰顯最上了義究竟斷妄無有餘蘊今為斷未究竟諸來法衆免彼執證迷斷之究竟清淨因失證之究竟清淨更請宣證差別令彼知所證是何證得能知所斷是何斷以不兩迷於究竟清淨故云重宣法王準前釋圓滿覺性者無取捨得失之斷證因果此句是前請重宣圓滿以便知於證之差別所證者能心所得者所法云何差別者何為衆生之證得何為菩薩之證得何為如來世尊之證得此句是正請重宣差別以不迷於覺心圓滿二結益聞教令末世衆生聞此聖教隨順開悟漸次能入當文一句結益聞教此聖教者指請重宣之證得差別隨順者隨所證得之差別順修於圓覺菩提開悟者不迷於所未證得執吝乃所證得失本圓滿菩提漸次者次及也由衆生之證得次菩薩之證得由菩薩之證得次如來之證得能入者由如來之證得能入大圓覺海成就圓滿菩提合文上科共成申請後益科竟前合慶聞現益科攝屬述請教益科竟連合序問威儀科管於序述儀音科竟二結終始作是語已五體投地如是三請終而復始句釋例前前合序問儀音科共成序問周三科竟連合序問躡次科入總序述菩薩與問科竟二序述世尊垂答開二一長行列示開二初序讚許開二一讚請教益爾時世尊告清淨慧菩薩言善哉善哉善男子汝等乃能為末世衆生請問如來漸次差別當文三句讚請教益通例二句汝等云云一句餘釋準前二許答囑受開二一囑令諦聽汝今諦聽當為汝說句釋例前二受教默然時清淨慧菩薩奉教歡喜及諸大衆默然而聽句釋例前合文上科共成許答囑受科竟前合讚請教益科攝屬初序讚許科竟次述正答開二一示教殊證開二一圓滿覺性開二一法本平等開二一一性遍滿善男子圓覺自性非性性有循諸性起無取無證當文六句一性遍滿善男子一句圓覺自性一句非性性有一句循諸性起一句無取一句無證一句圓覺自性者自有之性非依他性此句標本非性性有者非菩薩衆生性之性有所圓覺自性此句彰離即乃性空真如不變義循諸性起者循隨也隨諸衆生性菩薩性差別起現此句顯即即乃性有真如隨緣義然唯隨緣故不變唯不變故隨緣若變則有窮盡何能遍滿隨緣在隨緣則於今現有足徵無始不變是故自覺之性不屬他有緣有於他全離全即無取者無能此句人空無證者無所此句法空亦得合五句為一句以非性性四句皆依圓覺自性顯故亦得合五句為三句圓覺句為本句非性二句為因句無取二句為果句以果者因因而至也有非性之全離因則有無取之人空果有循諸之全即因則有無證之法空果任分任合皆無失於一性遍滿義二一相寂滅開二一推本寂滅於實相中實無菩薩及諸衆生當文二句推本寂滅於實相中一句實無云云一句實相中者圓覺性中無方清淨無邊虗空之平等無二此句示乃一相實無者語實則無寄簡幻有菩薩衆生者聖凡名相以相因性有既非菩薩性衆生性所有之圓覺性此之性中何有彼諸衆生菩薩之相是故實無此句示乃寂滅以唯寂滅斯成一相故此推本二發明寂滅開二初徵釋何以故菩薩衆生皆是幻化幻化滅故無取證者當文三句徵釋何以故一句菩薩云云一句幻化云云一句何以故者此句徵問以現在有諸菩薩衆生名相今云實無故須徵明其所以無皆是幻化者菩薩衆生由無明顯出無明本幻所由顯出者即是由幻所化故云皆是此句釋明菩薩衆生名相非實所以實無幻化滅故者無明惑破菩薩衆生名相不立之時無取證者幻相無性無性之法滅則全滅無有不滅之者以能取證此句釋明非實之菩薩衆生全歸寂滅所以實無次喻合譬如眼根不自見眼性自平等無平等者當文二句喻合譬如云云一句性自云云一句譬如眼根喻實相不自見眼喻實相無二無取無證以唯實相無二更無取證故實無於菩薩衆生而皆是所幻化此句喻明全歸寂滅之菩薩衆生本一實相性自平等者一相實性無平等者無能證性此句合明以一性故一相乃實無於菩薩衆生之能證性而全歸寂滅合文上科共成發明寂滅科竟前合推本寂滅科攝屬一相寂滅科竟連合一性遍滿科管於法本平等科竟二行求隨順開二一因迷成差衆生迷倒未能除滅一切幻化於滅未滅妄功用中便顯差別當文二句因迷成差衆生云云一句於滅云云一句衆生迷倒者迷方易處之本末無明非頓破所無明同於如來之二障永斷總未能除於一切幻化此句幻垢未清淨於滅未滅者事理二障伏斷深淺妄功用中者有於修證能所便顯差別者成立菩薩衆生此句寂滅未現前二果順無二若得如來寂滅隨順實無寂滅及寂滅者當文二句果順無二若得云云一句實無云云一句若得者擬望之辭如來寂滅隨順者法界海慧圓合一切無諸生死涅槃此句斷妄究竟實無寂滅者無所證覺及寂滅者無能證覺此句覺心圓滿合文上科共成行求隨順科竟前合法本平等科攝屬圓滿覺性科竟乃答所請重宣之圓滿覺性者二差別順性開二一住礙隨順開二一解礙凡夫開二一標行開二一從迷開悟開二一迷妄耽欲善男子一切衆生從無始來由妄想我及愛我者曾不自知念念生滅故起憎愛耽著五欲當文四句迷妄耽欲善男子一句一切云云一句曾不云云一句故起云云一句妄想我者發業無明愛我者續業無明此句本具忘惑曾不自知者無因發覺念念生滅者幻心無常蓋悟心無常則不隨之輪轉未知生滅是乃執有生貪此句是無於慧照故起憎愛者迷心隨輪從違順境起計取惑耽著五欲者攀緣五塵欲境馳求忘返此句現行緣染二悟覺知勞若遇善友教令開悟淨圓覺性發明起滅即知此生性自勞慮當文四句悟覺知勞若遇善友一句教令云云一句發明起滅一句即知云云一句若遇者擬幸之辭善友者入塵教化菩薩此句發覺緣因教令開悟者菩薩教化令之開悟圓覺淨性者實相如空平等不動無諸身心幻垢能所此句示真發明起滅者輪回境界無明識心此句示妄即知此生者現前身心壽命性自勞慮者性身命種性自由也勞六根我執慮六識攀緣蓋六根性同是菩提瞪發勞相有此勞根乃生分別妄識為續業輪性不斷生死受此果報身命此句悟知生滅合文上科共成從迷開悟科竟二息勞解淨若復有人勞慮永斷得法界淨即彼淨解為自障礙故於圓覺而不自在當文三句息勞解淨若復云云一句即彼云云一句故於云云一句若者不定有復者轉至以因善友教令開悟知於生性之勞慮即可直斷無明入淨覺性今乃解淨礙覺是又一種迷端故云若復勞慮永斷者行想陰滅得法界淨者衆生濁淨此句所發解因即彼淨解者即所得之法界淨生勝解心起證取知見為自障礙者不得直斷無明入自覺性究竟清淨此句依解成障屬無明理障之有所知愚故者解自障礙之故於圓覺而不自在者自在無礙義失乃圓照無礙智光此句違因般若前合從迷開悟科共成標行科竟二結名此名凡夫隨順覺性當文一句結名此者指所得之淨所解之障名凡夫者以所淨解是行邊際未盡識陰全住無明非慧聖種故名凡夫隨順覺性者一切凡聖斷證差別起滅於覺覺不起滅於一切覺為主一切為客任所生滅寂滅皆無能動搖於覺者是故雖在凡夫乃至如來皆一於隨順所分隨順之差別則以人殊不在法殊凡夫自為凡夫之隨順乃至如來自為如來之隨順如五色映珠光珠光自一映色自殊然是色現光中非光入色內之為隨順前合標行科共成解礙凡夫科竟二覺礙菩薩開二一標行善男子一切菩薩見解為礙雖斷解礙猶住見覺覺礙為礙而不自在當文四句標行善男子一句一切云云一句雖斷云云一句覺礙云云一句見解為礙者見諸淨解心屬妄想分別不成般若無礙智光此句照性增明雖斷解礙者雖能離諸計取無解為礙猶住見覺者所見解礙之了覺心強於明照未歸圓寂此句覺未極滿覺礙者覺之明照為礙者有覺明照不無立所隱伏能心非佛境界非同異性滅非一切同異所不能至故覺之礙即為於礙而不自在者失乃寂滅無礙順行此句殊果解脫二結名此名菩薩未入地者隨順覺性當文一句結名此者指所斷之解所住之覺名菩薩者蓋已斷法界淨之解礙即是滅法界量以佛覺用為己心者故名菩薩未入地者世第一地修心迷覺中道無所名目今尚住覺故未入地隨順覺性釋例前合文標行科共成覺礙菩薩科竟二滅礙隨順開二一寂滅菩薩開二一標行開二一總彰寂滅善男子有照有覺俱名障礙是故菩薩常覺不住照與照者同時寂滅當文三句總彰寂滅善男子一句有照云云一句是故云云一句有照者覺明了知有覺者覺明明覺總乃覺未明妙立於明所故顯現有照覺俱名障礙者有覺必明有明立所失本圓覺普照寂滅無二平等隨順此句出所住覺之障礙是故者是此住覺障礙之故常覺不住者住覺即不覺成妄覺明回明向覺不住明覺則無不覺是乃常覺欲得常覺其唯不住如何不住其唯常覺指要言之無於明覺是為常覺是為不住蓋翻前之住覺而有於不住者也照與照者照即有照是所法照者即有覺是能我同時寂滅者照滅則照者亦滅照者滅則照亦滅本無二能所故滅妙同時言寂滅者覺極圓明斯無能所故非生滅之滅乃寂滅之滅此翻前之住覺失覺圓明而勝進於不住之常覺以極覺之圓明故照與照者有同時之寂滅功用在常覺不住能所寂滅特其效驗耳此句顯不住覺之寂滅二詳示寂滅開二一心行處滅開二初喻顯譬如有人自斷其首首已斷故無能斷者當文二句喻顯譬如云云一句首已云云一句自斷其首者首喻覺之明照以明照生所是迷妄依如人頭首是身命依斷首喻離於明照自斷喻常覺不住以覺住即明照立覺不住即明照寂此之明照原本即覺無別離法但覺不住斯能永離是自離自斷也故以自斷為喻此句立喻首已斷故者由首已斷之故無能斷者無自斷首之人此句顯喻以人命寄於首而命非首雖命非首然一斷其首即無更生之人彰顯覺本非明明照是顯無於明照即無明覺如人斷首即無自斷之人次合明則以礙心自滅諸礙礙已斷滅無滅礙者當文二句合明則以云云一句礙已云云一句礙心者所明照覺合喻有人之人自滅諸礙者覺除明照合喻自斷其首此句示覺伏元明以能寂滅礙已斷滅者澄元照性永離能所合喻首已斷故無滅礙者無除照覺合喻無能斷者此句示覺照冥一全彰寂滅合文上科共成心行處滅科竟蓋覺明照是真常流注滅此明覺斯入遍圓平等常住不動清淨無流逸因是為於心行處得乃寂滅二言語道斷開二初喻顯修多羅教如標月指若復見月了知所標畢竟非月當文二句喻顯修多云云一句若復見月云云一句修多羅釋準前教者稱諸契經所有句理開悟菩薩入自性覺如標月指者標月之指月喻性覺標指喻說教此句舉喻若復見月者見於所指之月當菩薩入自性覺之時了知所標者了識標月之指當菩薩通達於說教之名句文身畢竟非月者月明指暗所標之指全非月質當名句文身屬影響聲論因緣生法與自性覺之離依他無生起性真妄逈絶此句顯喻次合明一切如來種種言說開示菩薩亦復如是當文一句合明亦復如是者言說開示令悟自覺如指上之月言說句理非即自覺如指之畢竟非月是故悟心菩薩捨離言說法身合文上科共成言語道斷科竟前合心行處滅科攝屬詳示寂滅科竟連合總彰寂滅科管於標行科竟二結名此名菩薩已入地者隨順覺性當文一句結名例釋準前前合標行科共成寂滅菩薩科竟二遍滿如來開二一標行開二一總彰遍滿善男子一切障礙即究竟覺當文二句總彰遍滿善男子一句呼召與語一切云云一句圓明法性無妄可斷一切即覺覺即一切究竟不二二詳列遍滿開二一一界遍滿開二一自覺遍滿開二一三德因果得念失念無非解脫成法破法皆名涅槃智慧愚癡通為般若菩薩外道所成就法同是菩提無明真如無異境界諸戒定慧及淫怒癡俱是梵行當文六句三德因果得念云云一句成法云云一句智慧云云一句菩薩云云一句無明云云一句諸戒云云一句得念者緣念真如失念者緣念塵境無非解脫者念無自性念恆生滅念真如而不能住於真如念塵境而不能及於塵境故一因解脫此句定因成法者圓滿淨覺破法者幻滅生死皆名涅槃者淨覺平等不動生死虗妄無生故同果涅槃此句定果智慧者圓照清淨愚癡者分別能所通為般若者圓照分別無二體性總一覺明是故同因般若此句慧因菩薩外道所成就法者菩薩以出離智成就清淨外道以計取見成就染污同是菩提者離智朗真空之慧取見開幻有之光故偕果菩提此句慧果無明者衆生性真如者佛性無異境界者圓覺境界此句身因諸戒定慧者出纏身業及淫怒癡者在纏身業俱是梵行者皆無作性同體清淨此句身果二一土因果衆生國土同一法性地獄天宮皆為淨土當文二句一土因果衆生云云一句地獄云云一句衆生者情世間國土者器世間同一法性者總覺明所相待勞生四大成立無別體性此句土因言土而及衆生者依報自他共業不彰衆生清淨不見一土清淨地獄者十惡報趣天宮者十善報趣皆為淨土者夢境苦樂幻人憂喜總虗妄受無實體性故全清淨此句土果合文上科共成自覺遍滿科竟二覺他遍滿有性無性齊成佛道一切煩惱畢竟解脫當文二句覺他遍滿有性云云一句一切云云一句有性者一法界生無性者一法界土齊成佛道者無一衆生不入究竟覺無一國土不本常寂光此句圓他覺因一切煩惱者聖凡染淨知見善惡苦樂報趣畢竟解脫者同諸如來之身土因果此句圓他覺果前合自覺遍滿科共成一界遍滿科竟二多界遍滿法界海慧照了諸相猶如虗空當文一句多界遍滿法界海者大圓覺海慧者大圓覺慧圓覺海法界數量具見普眼章中照了諸相者以圓覺慧照了圓覺海之諸法界相猶如虗空者圓覺自相之清淨實相前合一界遍滿科文共成詳列遍滿科竟連合總彰遍滿科攝屬標行科竟二結名此名如來隨順覺性當文一句結名例釋準前前合標行科共成遍滿如來科竟連合寂滅菩薩科攝屬斷礙隨順科竟接合住礙隨順科管於差別順性科竟乃答所請重宣之證得差別者綸合圓滿覺性科入總示教殊證科竟二示益末世開二一直指頓證開二一標行開二一如心無生善男子但諸菩薩及末世衆生居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實當文六句如心無生善男子一句但諸云云一句居一云云一句於諸云云一句住妄云云一句於無云云一句居一切時不起妄念者常居圓明現量之中不落明了意知之地此句絶妄初始於諸妄心亦不息滅者妄心以念念生滅相續成輪一念無生斷所相續即全息滅本無所住更何有當息滅者故亦不息滅若起息滅妄心之心此之一心轉為妄依心心息滅心心相續無能息滅唯知亦不息滅是乃妙於息滅正所謂無功之功功不虗棄者此句絶妄續終了斯絶妄始終直可諸妄永斷成就始覺住妄想境不加了知者現量對境本無分別如本無於分別是曰不加有此不加即對境常寂雖住妄想境不異居淨土矣此句證真原本於無了知不辨真實者對境之現量圓光無了知性是無住本同法界海量無第二頭如己眼根不自見眼若更求所真實而明辨之即是迷頭狂走無窮妄惑從此立本矣故直示之不辨能安忍於不辨即徹本覺清淨究竟心源具無生忍力此句徹真究竟了斯原本究竟自可一真常即圓明本覺同諸如來入剎那際三昧成等正覺無或異也二聞解不疑彼諸衆生聞是法門信解受持不生驚畏當文二句聞解不疑彼諸云云一句信解云云一句初句聞法頓證次句信解頓證信者不疑修習解者明了修習受者擔荷修習持者久遠修習不生驚者無奇異心生不生畏者無艱難念起是乃宿習大乘行人獲聞本法行相合文上科共成標行科竟二結名是則名為隨順覺性當文一句結名此頓證隨順直同果行非餘修證功用不落差別位次故但以隨順覺性名之前合標行科共成直指頓證科竟二彰顯勸誘開二一彰因久植善男子汝等當知如是衆生已曾供養百千萬億恆河沙諸佛及大菩薩植衆德本當文二句彰因久植善男子一句汝等云云一句如是衆生者指信解受持隨順覺性之衆生已曾供養佛菩薩云云者大圓覺心是百千萬億恆河沙之諸佛國土諸大菩薩所共莊嚴苟非已曾供養於此諸佛菩薩何能聞斯頓證覺心法門而不生於驚畏供養者四威儀內心常清淨不生三毒不昧三寶入理事門以慧朗空以定持有遍滿圓覺平等莊嚴植衆德本者供養無量如來植無量果德供養無量菩薩植無量因德因果該徹故曰衆德二顯果現證佛說是人名為成就一切種智當文一句顯果現證佛說是人者唯佛能知能印成就一切種智者如來果智圓覺為法界海慧是一切種智今頓證隨順於覺性故名成就合文上科共成彰顯勸誘科竟前合直指頓證科攝屬示益末世科竟連合示教殊證科管於次述正答科竟接合初序讚許科入總長行列示科竟二重頌總挈開二一序欲重宣爾時世尊欲重宣此義而說偈言句釋例前二述說偈言開二一挈旨示教殊證開二一挈旨圓滿覺心清淨慧當知圓滿菩提性無取亦無證無菩薩衆生二挈旨差別順性覺與未覺時漸次有差別衆生為解礙菩薩未離覺入地永寂滅不住一切相大覺悉圓滿名為遍隨順二挈旨示益末世開二一挈旨直指頓證末世諸衆生心不生虗妄二挈旨彰顯勸誘佛說如是人現世即菩薩供養恆沙佛功德已圓滿雖有多方便皆名隨順智重頌文竟前合長行攝屬序述世尊垂答科竟連合序述菩薩與問科入總性證如空清淨科竟言性證如空者根本如來隨順之照相如虗空蓋以當章教理雖示隨順差別乃發明差別有於覺與未覺時令見圓滿覺心之無取無證究竟清淨以不迷於果性未及顯修故此專科存合下四章科屬修證成足性修清淨之徹因教理二修證無礙清淨開二一圓攝無礙開二一示圓攝行開二一序述菩薩與問開二一序問躡次於是此序顯威德自在菩薩從無差本性多方便成修不詳方便轉礙修途無以徹無修之性有所與問希佛教益令末世衆生不迷方便通達無礙成行圓攝二序問周三開二一序述儀音開二一序問威儀威德自在菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言句釋例前二述請教益開二一慶聞現益大悲世尊廣為我等分別如是隨順覺性令諸菩薩覺心光明承佛圓音不因修習而得善利當文四句慶聞現益大悲世尊一句廣為云云一句令諸云云一句承佛云云一句初句讚佛二句述聞三句顯理四句彰益光明者清淨開顯圓音者究竟開示不因修習者頓證隨順二申請後益開二一請教所行開二初喻顯世尊譬如大城外有四門隨方來者非止一路當文二句喻顯世尊一句譬如云云一句大城喻大圓覺心四門喻隨順四性隨方來者喻四性順覺非止一路者門門多途喻性性隨順各非一法此句舉喻次合明一切菩薩莊嚴佛國及成菩提非一方便當文一句合明菩薩莊嚴佛國者因行隨順合喻四門之隨方來者及成菩提者果德隨順合喻大城非一方便者種種修學法門合喻非止一路合上科文共成請教所行科竟二資答結益開二初資答惟願世尊廣為我等宣說一切方便漸次并修行人總有幾種當文三句資答惟願世尊一句廣為云云一句并修云云一句一切方便漸次者該指修學法門此句請說差別方便修行人有幾種者人以行成得修行之人總有幾種即知行之會歸此句請說圓攝成就次結益令此會菩薩及末世衆生求大乘者速得開悟遊戲如來大寂滅海當文二句結益令此云云一句速得云云一句開悟遊戲者了行圓攝無礙自在也合上科文共成資答結益科竟前合喻明方便科攝屬申請後益科竟連合慶聞現益科管於述請教益科竟接合序問威儀科該在序述儀音科竟二序結終始作是語已五體投地如是三請終而復始句釋例前前合序問儀音科共成序問周三科竟連合序問躡次科入總序述菩薩與問科竟二序述世尊垂答開二一長行列示開二初序讚許開二一讚請教益爾時世尊告威德自在菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是方便當文三句讚請教益通例二句汝等云云一句餘釋準前二許答囑受開二一囑令諦聽汝今諦聽當為汝說句釋例前二受教默然時威德自在菩薩奉教歡喜及諸大衆默然而聽句釋例前合文上科共成許答囑受科竟前合讚請教益科攝屬初序讚許科竟次述正答開二一示教所行開二一善別法行開二一推本差別開二一本覺無二善男子無上妙覺遍諸十方出生如來與一切法同體平等於諸修行實無有二當文四句本覺無二善男子一句無上云云一句出生云云一句於諸云云一句無上句示覺遍滿無二出生如來者果德本起與一切法者因行本起同體平等者因果覺行三無差別此句示覺隨順無二於諸修行者徹因該果一切修習實無有二者實則無有二蓋以遍滿隨順唯一覺故此句示修成實無二二循攝有三方便隨順其數無量圓攝所歸循性差別當有三種當文二句循攝有三方便云云一句圓攝云云一句方便無量句示在攝行圓攝者圓攝無量方便所歸者攝別入圓之行循性者隨所歸攝行性差別者攝別立別當有者以攝無量順諸行性之所應有三種者三方便門此句示所攝行合文上科共成推本差別科竟二顯行差別開三一奢摩他定開二一淨覺生定開二初淨覺行善男子若諸菩薩悟淨圓覺以淨覺心取靜為行當文三句明淨覺行善男子一句若諸云云一句以淨云云一句悟淨圓覺者悟圓明照無取捨心此句根悟圓覺以淨覺心者離於能所分別妄念取靜為行者取無能所分別之遠離動相為覺定行此句彰能定行次發定相由澄諸念覺識煩動靜慧發生身心客塵從此永滅便能內發寂靜輕安當文三句為發定相由澄云云一句身心云云一句便能云云一句由澄諸念者即上取靜以取無能所分別之遠離動相為行自乃諸念澄寂言由者起下覺識煩動之由覺識云云者覺了於識之煩動微細生滅得無隨之流轉此非澄念無能覺了故云由靜慧發生者無分別慧蓋識以分別煩動今覺於識之煩動不隨分別故乃發生此句示定由發身心客塵者地水火風見聞覺知屬明所妄能相待搖立幻化之法非常住性故云客塵從此者從於靜慧發生之地永滅者是識陰盡之超越命濁此句示定成立便能者從滅得能無二體性內發者由覺開顯非外取境寂靜者離於有為動搖得自圓寂性定輕安者平等虗空究竟不動此句云定開顯合文上科共成淨覺生定科竟二顯定結名開二一顯定彰喻由寂靜故十方世界諸如來心於中顯現如鏡中像當文三句顯定彰喻由寂靜故一句十方云云一句如鏡中像一句初句推原覺定成就十方世界者依報全彰諸如來心者正報該舉於中者於寂靜中顯現者依正由顯此句顯大圓覺定圓裹法界一切依正如鏡中像者鏡喻覺定像喻依正此句喻顯二指定結名此方便者名奢摩他當文二句指定結名此方便者句指定名奢摩他句結名奢摩他梵語此翻止即定之異名合上科文共成指定結名科竟前合淨覺生定科攝屬奢摩他定科竟二三摩鉢提慧開二一淨覺生慧開二初淨覺行善男子若諸菩薩悟淨圓覺以淨覺心知覺心性及與根塵皆因幻化即起諸幻以除幻者變化諸幻而開幻衆當文五句明淨覺行善男子一句若諸云云一句以淨云云一句即起云云一句變化云云一句若諸句根悟釋準前知覺心性者知字從淨覺生即前取靜取字同義猶云知於了覺之心性此覺心性指內心根塵指外境皆因幻化者以淨覺心中本無是諸心境體性故知今所有相皆是幻化此句知幻即起諸幻者起離幻之觀以除幻者離能幻之心此句離能幻變化諸幻者開合根塵顯現身土而開幻衆者滅度自他衆生此句離所幻次發慧相由起幻故便能內發大悲輕安當文二句為發慧相由起幻故一句便能云云一句初句推本悲智從發之由二句悲智開顯大悲者以圓覺淨性本無生佛何實有悲生之智故佛所悲生之智本對幻衆生而幻發者今乃以起幻離幻智同諸佛故爾便發輕安者幻悲起滅全無起滅究竟如空平等不動合文上科共成淨覺生慧科竟二顯慧結名開二一顯慧彰喻一切菩薩從此起行漸次增進彼觀幻者非同幻故非同幻觀皆是幻故幻相永離是諸菩薩所圓妙行如土長苗當文四句顯慧彰喻一切云云一句彼觀云云一句幻相永離一句是諸云云一句從此起行者起離幻行漸次增進者漸次得離諸幻此句示離幻彼觀幻者能離幻智非同幻故者以智屬能離非同所離之幻境非同幻觀者非同於幻之能觀智皆是幻故者有能觀智即皆是幻此句示所離蓋明釋上句有漸次之增進乃增進離於能觀智幻相永離者幻觀未離幻相猶伏觀智冥寂幻相永離此句示幻離所圓妙行者幻滅覺顯如土長苗者土喻離幻功用苗喻開顯覺心蓋覺以離幻成就如苗以出土增長此句喻顯二指慧結名此方便者名三摩鉢提當文二句指慧結名此方便者句指慧名三摩鉢提句結名三摩鉢提梵語此翻等至即慧之異名圓覺普照也合文上科共成指慧結名科竟前合淨覺生慧科攝屬三摩鉢提慧科竟三禪那中道開二一淨覺現中開二初淨覺行善男子若諸菩薩悟淨圓覺以淨覺心不取幻化及諸靜相了知身心皆為罣礙無知覺明不依諸礙當文五句明淨覺行善男子一句若諸云云一句以淨云云一句了知云云一句無知云云一句若諸句根悟釋準前不取幻化者遮照幻有及諸靜相者遮照空寂此句淨覺圓明了知者了達之知身心者根識區宇皆為罣礙者有於根識不彰寂滅此句發圓明照無知覺明者無立所之知覺明性不依諸礙者永離分別能所心性此句斷根本無明次中道相永得超過礙無礙境受用世界及與身心相在塵域如器中鍠聲出於外煩惱涅槃不相留礙便能內發寂滅輕安當文四句為中道相永得云云一句受用云云一句煩惱云云一句便能云云一句超過礙者不住煩惱超過無礙者不住涅槃此句中道成立受用者即是超過之義以得超過故得受用相在塵域者域疆界也世界身心之相在於塵內乃不出三界而出三界正是所超過之礙無礙如器中鍠者喻在塵域之世界身心相器謂金銀銅鐵瓦等器凡擊而有音者如鐘磬之類鍠是擊時器中所發鍠鍠之聲聲出於外者喻顯超出於世界身心所以得之受用此句喻明中道煩惱句合明不落二邊故乃得於身心世界有其受用蓋留煩惱即礙涅槃此則輪轉生死非可云於世界身心得乃受用留涅槃即礙煩惱此則證滅休寂不來世界身心有其受用唯今不留不礙故得受用便能句中道開顯寂滅者諸法平等無增減相輕安者如法平等虗空不動合文上科共成禪那中道科竟二顯中結名開二一法說顯中妙覺隨順寂滅境界自他身心所不能及衆生壽命皆為浮想當文二句法說顯中妙覺云云一句自他云云一句妙覺者果地覺性此句示所內發之寂滅乃如來之隨順寂滅境界以彰中道自他句示於我人衆生壽者四相究竟清淨申明寂滅境界我人見屬相分立故云不能及衆生壽命見屬見分立故云浮想二指中結名此方便者名為禪那當文二句指中結名此方便者句指於中道名為禪那句結名禪那梵語此翻靜慮即定即慧之中道義合文上科共成顯中結名科竟前合淨覺現中科攝屬禪那中道科竟連合三摩鉢提奢摩他科管於顯行差別科竟接合推本差別科該在差別法行科竟答所請說之差別方便也二圓攝修性善男子此三法門皆是圓覺親近隨順十方如來因此成佛十方菩薩種種方便一切同異皆依如是三種事業若得圓證即成圓覺當文五句圓攝修性善男子一句此三云云一句如來云云一句菩薩云云一句若得云云一句親近隨順者是能成就圓覺方便以三法門本從覺顯是乃覺之自分法行故云親近此句示三法門全依覺起如來句示三法門是果德因行菩薩句示三法門成立菩薩萬行是因行方便事業者即三法門所有行法圓證者即一即三不一不三究竟淨覺遍滿隨順即成圓覺者入寂滅大海法身果證此句極彰三法究竟通文理趣乃答所請說之圓攝成就也前合差別法行科攝屬示教所行科竟二示益勸修善男子假使有人修於聖道教化成就百千萬億阿羅漢辟支佛果不如有人聞此圓覺無礙法門一剎那頃隨順修習當文三句示益勸修善男子一句假使云云一句成多小果不如云云一句暫修圓因所以暫修圓因如此優勝者以小果迷悶圓覺此雖暫修親近圓覺故此殊勝前合示教所行科攝屬次述正答科竟連合初序讚許科入總長行列示科竟二重頌總挈開二一序欲重宣爾時世尊欲重宣此義而說偈言句釋例前二述說偈言開二一挈旨差別法行開二一挈旨推本差別威德汝當知無上大覺心本際無二相隨順諸方便其數即無量如來總開示便有三種數二挈旨顯行差別寂靜奢摩他如鏡照諸像如幻三摩提如苗漸增長禪那唯寂滅如彼器中鍠二挈旨圓攝修性三種妙法門皆是覺隨順十方諸如來及諸大菩薩因此得成道三事圓證故名究竟涅槃重頌文竟前合長行攝屬序述世尊垂答科竟連合序述菩薩興問科入總示圓攝行科竟行言所行者以當章在顯三法名相是所修行法下章二十五輪修習則是能修頓漸具足圓攝無礙清淨修習二示圓攝修開二一序述菩薩與問開二一序問躡次於是此序顯辨音菩薩從三法門圓攝無量隨順方便如斯無礙在修此三法門亦必圓攝無礙隨順修習頓漸融通有所與問希佛教益令末世衆生不於無礙行而成執礙修也二序問周三開二一序述儀音開二一序問威儀辨音菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而佛言句釋例前二述請教益開二一慶聞前法大悲世尊如是法門甚為希有當文二句慶聞前法大悲世尊一句如是云云一句如是法門者指圓攝三法甚為希有者三法乃圓覺親近隨順故云希有二申請後益開二一請教能修世尊此諸方便一切菩薩於圓覺門有幾修習當文二句請教能修世尊一句此諸云云一句此諸方便者三種法門該無量方便故云諸於圓覺門者無礙融通是圓覺之門顯今正請無礙修習有幾修習者成就圓攝必有互互融入修習法數此句請教能修圓攝二資答結益願為大衆及末世衆生方便開示令悟實相當文二句資答結益願為云云句資答令悟實相句結益言悟實相者以得修習圓攝即得三事圓證成就圓覺住持平等清淨之一切實相合文上科共成申請後益科竟前合慶聞前法科攝屬述請教益科竟連合序問威儀科管於序迷儀音科竟一序結終始作是語已五體投地如是三請終而復始句釋例前前合序問儀音科攝屬序問周三科竟連合序問躡次科入總序述菩薩與問科竟二序述世尊垂答開二一長行列示開二初序讚許開二一讚請教益爾時世尊告辨音菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生問於如來如是修習當文三句讚請教益通例二句汝等云云一句餘釋準前二許答囑受開二一囑令諦聽汝今諦聽當為汝說句釋例前二受教默然時辨音菩薩奉教歡喜及諸大衆默然而聽句釋例前合文上科共成許答囑受科竟前合讚請教益科攝屬初序讚許科竟次述正答開二一示教能修開二一總彰輪數開二一果覺無修善男子一切如來圓覺清淨本無修習及修習者當文三句果覺無修善男子一句一切云云一句本無云云一句一切句彰顯果覺本無句法我俱空二幻修成輪一切菩薩及末世衆生依於未覺幻力修習爾時便有二十五種清淨定輪當文二句幻修成輪一切云云一句爾時云云一句依於未覺者未覺即不覺乃始覺未究竟無明未永斷之地幻力修習者修心能所總屬幻有非無修證之自覺性此句示修本幻爾時者在幻修習之時便有者依幻修習還遠離幻即乃覺顯故成便有清淨定輪者三種法門本自覺性平等不動隨順淨行今交互修習此三法門頓漸融攝成輪二十五故云定輪合文上科共成總彰輪數科竟二列示輪數開二一示相開二一別躡漸輪開二一別修成就開三一修定成就開二一標行若諸菩薩唯取極靜由靜力故永斷煩惱究竟成就不起於座便入涅槃當文四句標行若諸云云一句由靜云云一句究竟成就一句不起云云一句唯取極靜者遠離生滅此句行因是所修定由靜力故者由遠離於生滅永斷煩惱者無明惑淨此句絶妄究竟成就者圓明性覺此句證真不起於座者不起法空之座乃常住定相便入涅槃者回身寂光此句行果是所成就二結名此菩薩名單修奢摩他當文二句結名此菩薩者句指人名單云云句指法有人有法是故前言依於未覺幻力修習也單修即別修合文上科共成修定成就科竟二修慧成就開二一標行若諸菩薩唯觀如幻以佛力故變化世界種種作用備行菩薩清淨妙行於陀羅尼不失寂念及諸靜慧當文四句標行若諸云云