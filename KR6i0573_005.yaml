知三法之漸次即不知三法之頓圓并昧威德辨音二菩薩興問之躡次一為請總垂教所修一為請別垂教能修共手琵琶所不容紊之節奏者因為圖顯在圖一大圓相大圓覺心也內三圓相圓合三法之頓證輪每圓相中之八圓相四層列位者單復三齊之四加漸次也八圓相有孤一重二重三中濃黑邊濃黑之差別者孤一即一法單輪重二即二法二輪重三即三法二輪濃黑者二法融攝之相中濃者一法齊二法之融攝邊濃者二法齊一法之融攝本經句理聊為象顯云爾
