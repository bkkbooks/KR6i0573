  text: 圓覺經句釋正白首卷沙門羅峰弘麗著沙門在犙弘贊較教理修多羅教如標月指指上之月大圓覺心是心也即根塵即法界絶思惟冥敷量本一切皆證而無分於諸佛衆生者也爰因迷念皆證之各各不無遂各各執有未思各各不有斯各各不無失所無證之皆證是曰無明如所皆證之無證則曰妙覺無明妙覺分名諸佛衆生立別然實無所別也無明者無皆證之明似有不有妙覺者妙無證之覺真無非無非無濫同似有妙覺無明不有原本真無無明妙覺即此迷還此悟法非相待功無兩操是故當經無明伏斷妙覺成就性相雙顯指空華比二月呼醒夢人除於夢事譬鑽火喻消氷磨明鏡垢現諸鏡光漸次非所語也究竟其須知乎括要言之於圓覺中無取覺者離彼我人衆生壽者斯則斷無明之元首潔清明之慧目涅槃自性清淨境界超過化佛幻影入住法身三昧平等本際圓滿十方不二隨順者哉云何無取則如眼光曉了前境其光圓滿之得無憎愛成就有無俱遣淨覺隨順之因地法行斯則指上之月大圓覺心得不迷悶者哉若不爾者離四病法圓三觀修了悟於名言間耳求實證於根塵之無壞雜遍滿法界自各各不有自各各不無如百千燈光照一室融布無礙者未之能也是用前陳教理以便初心宗趣教殊頓漸理別宗趣是經名為頓教宗趣迥異常途一佛因果為宗圓滿覺心為趣圓滿覺心為宗圓照覺相為趣圓照覺相為宗永斷無明為趣永斷無明為宗圓照覺相為趣一佛因果為宗者婆伽婆入於神通大光明藏三昧正受一切如來光嚴住持是諸衆生清淨覺地身心寂滅平等本際乃至云於實相中實無菩薩及諸衆生依此修行漸次增進至於佛地圓滿覺心為趣者文殊圓覺十一章展演斷證修習成就究竟清淨又圓滿覺心為宗者文殊普覺十章中所示修習成就文殊章云如法界性究竟圓滿普賢章云諸幻盡滅覺心不動普眼章云始知衆生本來成佛又云一切法性平等不壞金剛藏章云入於如來大寂滅海彌勒章云一切衆生皆證圓覺又云根無大小皆成佛果又云便登解脫清淨法殿證大圓覺妙莊嚴域清淨慧章云一切障礙即究竟覺有性無性齊成佛道威德自在章云無上妙覺遍諸十方出生如來與一切法同體平等辨音章云以圓覺慧圓合一切於諸性相無離覺性淨諸業障章云佛説是人漸次成就求善知識不墮邪見普覺章云盡於虗空一切衆生我皆令入究竟圓覺圓照覺相為趣者文殊普覺十章中所示修習覺心清淨文殊章云皆依圓照清淨覺相永斷無明方成佛道又云有無俱遣是則名為淨覺隨順普賢章云得無所離即除諸幻普眼章云譬如眼光曉了前境其光圓滿得無憎愛金剛藏章云生死涅槃同於起滅妙覺圓照離於華翳彌勒章云與其同事化令成佛皆依無始清淨願力清淨慧章云法界海會照了諸相猶如虗空威德自在章云此三法門皆是圓覺清淨隨順辨音章云一切如來圓覺清淨本無修習及修習者淨諸業障章云如湯消氷無別有氷知氷消者普覺章云當求一切正知見人心不住相不著聲聞緣覺境界又云所證妙法應離四病又云了知身心畢竟平等與諸衆生同體無異又云於圓覺中無取覺者除彼我人一切諸相及圓覺一章非彼所聞一切境界終不可取又圓照覺相為宗永斷無明為趣者文殊彌勒五章知空華無流轉木既盡火還滅磨垢盡鏡明現銷金礦復本金斷諸障證圓覺永斷無明為宗圓照覺相為趣者清淨慧普覺五章首已斷無斷者妙法門隨順覺頓覺人并法除有能入非覺入究竟覺無取覺此之宗趣蓋以法界圓同一覺十方寧有異生於無生中妄見生滅升沈流轉迷方性覺偽號衆生失本成佛可深憐憫是故諸佛以一大事因緣出現世間開示悟入圓覺自性令斷有生之妄見皆證成佛於本來是故當經一佛因果為宗然非修習覺心得成就者得所無修亦無成就無能證知諸佛世界猶如空華一切衆生皆證圓覺是故圓滿覺心為趣是覺心也如法界性遍滿一切平等不動如鏡照諸像如珠映五色在在全光一一圓映本無能所分劑邊際故極顯發而極清淨衆生迷影妄立能所斯成數量隔礙法界失本圓照自性清淨若其復本圓照離諸能所幻影像滅爾時便得無方清淨無邊虗空覺所顯發是故圓滿覺心為宗圓照覺相為趣失所圓照根本無明無明永斷即是圓照是故圓照覺相為宗永斷無明為趣不失圓照何有無明欲斷無明還須圓照是故永斷無明為宗圓照覺相為趣斯二者先後相資以法本非二者也誠如磨鏡焉垢不盡明不現明不虧垢不染若其得磨垢之方而未識全明之獲猶非所語於修習大圓覺心者是故當經有如是之宗趣章脈既明宗趣合詳章脈得十二菩薩請問世尊垂教漸次乃修習大圓覺心所不容己之指歸者夫求自性覺果不識本起覺因究竟本末隨順修習則因果乖違勤苦億劫終歸迷悶是故文殊請説如來本起清淨因地法行以及菩薩發心者終始因心之本末究竟也照覺相斷無明依因有無俱遣之隨順覺行是名如來因地法行是乃菩薩所因發心教化衆生者世尊示之詳矣然照覺相以斷無明斷無明以證實相義含而語未顯末世衆生蒙昧未解者但聞身心之如幻未聞離幻妄之身心即證性覺之清淨不無迷悶於即幻非所修離幻無所修取捨疑惑不能成法解脫是故普賢申問幻非所修幻滅無修無修不成解脫之疑請教云何修行圓覺清淨境界而一切衆生種種幻化皆生如來圓覺妙心猶如空華從空而有幻華雖滅空性不壞得承開曉末世衆生欲證圓覺不動心源一於離幻疑永決矣然務離幻須善思惟得所住持成就開悟方便若其不善思惟轉成迷悶不能入覺是故普眼申問思惟方便念身無體念心無相知於身心皆為幻垢垢相永滅十方清淨一切法性平等不壞真善思惟妙得開悟者哉世尊示之詳矣若其不善思惟以輪回心生輪回見而辨圓覺彼圓覺性即同流轉無能免於輪回不可不為末世衆生昭揭開顯也是故金剛藏陳疑申問妄有真成始終三惑伏請世尊顯貴皆是輪回思惟不能成就圓覺方便令末世衆生決信思惟離幻先斷輪回根本以求圓覺是斷輪回根本也是永斷無明之方成佛道者有所斷即有所證迷於斷即迷於證更為明決末世衆生斯決信於思惟離幻之正方便以成圓照覺相永斷無明者哉是故彌勒申問欲遊如來大寂滅海云何當斷輪回根本者蓋以決之當斷也及輪回種性者蓋以當斷之所應知也及修菩提差別者蓋以因斷之所現證也入塵教化方便者蓋以成就衆生於斷輪回修菩提同入淨覺見無不成佛之衆生斯永斷於無明而究竟性覺也輪回故不成聖道輪回因愛為根本差別性無明顯出教衆生令捨愛化成佛依淨願有斯世尊詳示末世衆生當無不務斷乃輪回根本無明以成佛道者設未底至於如來之決定境界一切煩惱畢竟解脫必有所未斷之無明然此非示斷能知要惟語證方曉是故清淨慧請重宣法王圓滿覺性在諸衆生菩薩如來證得差別冀令末世衆生知所證得以知所伏斷也淨解隨順住覺隨順滅礙隨順滿覺隨順世尊差別詳示後教末世衆生於不起不息不加不辨之法門信解受持者蓋示不落證得之差別直斷無明之圓因修習也苟圓行不彰則受持不起不息不加不辨之法門行人虞沈空寂與諸土木同倫矣是又一無明也是故威德自在申問方便之非一成悟覺海之遊戲世尊垂教以淨覺心取靜奢摩他以淨覺心觀幻三摩提以淨覺心寂滅而禪那此三法門攝無量方便要皆根本一淨覺心是淨覺心也不起不息不加不辨之所成悟者也不悟覺心難語覺行既悟覺心何乖覺行寂照同時不二隨順斯成圓覺親近修習末世衆生可無惑矣成就修習於此圓攝法門以無偏於寂照是所求入於圓覺也是故辨音申問修習之有幾二十五輪頓漸成就以及末世修習三七懺悔依結開示世尊示之詳哉依此能修圓攝無礙成就所行之圓攝無量可不當知此妙法門非一非三而即一即三乃本起圓覺自性之清淨隨順無諸能所者也無能無所何修何證可不當知修習此心之得成就者於此無修亦無成就也哉然而難言之也譬如有人不自斷命末世衆生可輒語於證悟了覺之四心相解脫清淨者哉況也四相深隱微細難知非佛世尊莫能開曉是故淨諸業障有染污迷悶不入淨覺之申問其心乃至證於如來畢竟了知清淨涅槃皆是我相乃至圓悟涅槃俱是我者心存少悟備殫證理皆名人相了證了悟皆為我人而我人相所不及者存有所了名衆生相心照清淨覺所了者一切業智所不自見猶如命根如是之證悟了覺所有心相是乃無始妄執之我人四相成於染污迷悶衆生不入淨覺者末世衆生希望成道無令求悟但當精勤降伏煩惱未斷令斷世尊其底至之言哉其決要之言哉習菩提者可以知要矣在究竟清淨於能證心矣無能心之可證者無所法之可取也不達所法圓離難語能心清淨法因人示求人依法尤要要哉是故普覺有求人依法之申問以及修行去病發心之云何者蓋自利利他因地法行之本末究竟也求正知見無住相人彼所證法應離四病之作止任滅逢是知識舍身命見斷憍慢心供養承事是云修行觀彼怨家如己父母心無有二即除諸病自他憎愛一切種子盡於虗空一切衆生皆令入究竟覺無取覺之我人諸相是所發心世尊一一詳示真不捨無遮大慈救世大悲以覺心成就修習方便因十菩薩次第興問標指當時示筏末世也哉如是修行根無大小皆成佛果夫復何疑未開曉者道場安居修觀方便新學菩薩更樂有聞是故圓覺申問備此賢善首即繼以名字奉持修習功德護持流布申問終焉是乃毋容紊之庠序者更喻明之文殊問本起之因如欲桃實枝頭索千年之核普賢決離幻之疑如示核甲坼而芽生乃桃實之自普眼請思惟方便如示潤土栽埋灌溉以時乃核甲坼之助金剛藏陳疑三惑防求桃核於土核內外理窮思惟棄栽種之事彌勒問斷修之性則示無破核出仁以俟芽生及去蝕芽之蝤與桃芳之候清淨慧請證得之差別則示紅熟之桃實裹根苗之桃核威德自在請方便之非一章次圖則示華開與華落總垂實之緣因辨音問修習之有幾則示飄風與濕雨總開落於桃華淨諸業障問染污之不入則示毋觀華貪桃實折向瓶中求老熟普覺辨人法之正覺則示老熟垂垂曾不供人咬嚼者是全根全苗之桃核也圓覺問安居之方便則示如何辨土與夫栽埋之法於此全根全苗之桃核也賢善首之名目等則謂誰家不有此桃核哉如此明示究竟教法以傳將見遍野桃芳枝枝垂實普界盡誇桃源仙境矣可不明白了然於圓覺章次哉夫自性覺心語因果則該徹語斷證則即離全該全徹全即離全者自性覺心之因果斷證也斷證因果尤非二也斷之究竟處即證之發覺心是曰該果證之究竟處無斷之最初心是曰徹因圓覺經教章次實此因果該徹斷證即離之因次也管窺偶竅其明願充如來使者植分別半偈之德本已詳章脈宣白如是猶恐科判全不符於諸疏不邀法門之信受得揚聖旨於末世因搆斯圖冀觸目者一覽即悉全經之章脈研所標科因果鋪十一章之綱斷證分十章之目智行性修列目中之數幻覺集行數之叢攝離備修數之事能所離而幻家具盡始本顯而覺微妙成如斯為行非斷行之究竟歟能所示而攝法門豐迷正彰而離深奧極如斯為修非證修之底至歟唯修之底至底至於斷之究竟也故斷有幻之能所而修有攝之能所斷有覺之本始而修有覺之迷正以無迷覺者無迷夫本覺也成正覺者圓滿